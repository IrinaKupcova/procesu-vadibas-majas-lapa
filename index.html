        function CitsPublicApprove({ token, onDone, sessionUserId, profileRole }) {
          const [preview, setPreview] = useState(null);
          const [err, setErr] = useState(null);
          const [busy, setBusy] = useState(false);
          const [rejectReason, setRejectReason] = useState("");
          const [deputyUserId, setDeputyUserId] = useState(null);
          const [deputyLoaded, setDeputyLoaded] = useState(false);
          useEffect(() => {
            if (isLocalMode() || !supabase || !sessionUserId) {
              setDeputyUserId(null);
              setDeputyLoaded(true);
              return;
            }
            let cancelled = false;
            setDeputyLoaded(false);
            if (window.SASKANOSANA?.loadState) {
              window.SASKANOSANA
                .loadState(supabase, DEFAULT_MANAGER_NAME)
                .then((st) => {
                  if (cancelled) return;
                  if (st?.error) {
                    setDeputyUserId(null);
                  } else {
                    setDeputyUserId(st.deputyUserId ?? null);
                  }
                  setDeputyLoaded(true);
                });
              return () => {
                cancelled = true;
              };
            }
            supabase
              .from("users")
              .select("*")
              .then(({ data, error }) => {
                if (cancelled) return;
                if (error) {
                  console.error(error);
                  setDeputyUserId(null);
                  setDeputyLoaded(true);
                  return;
                }
                const users = (data ?? []).map(normalizeTeamUserRecord);
                const activeDeputy = resolveActiveDeputyUser(users);
                setDeputyUserId(activeDeputy?.id ? String(activeDeputy.id) : null);
                setDeputyLoaded(true);
              });
            return () => {
              cancelled = true;
            };
          }, [sessionUserId]);
          const canApprove = Boolean(
            sessionUserId &&
              (isLocalMode() ? true : deputyLoaded) &&
              userCanApproveAbsences(profileRole ?? "user", sessionUserId, deputyUserId)
          );
          useEffect(() => {
            let cancelled = false;
            (async () => {
              if (!token) return;
              setErr(null);
              setPreview(null);
              if (isLocalMode()) {
                const rows = getLocalCitsRequests();
                const r = rows.find((x) => x.approval_token === token && x.status === "pending_manager");
                if (!r) {
                  if (!cancelled) setErr("Nederīgs vai jau apstiprināts pieprasījums.");
                  return;
                }
                if (!cancelled)
                  setPreview({
                    start_date: r.start_date,
                    end_date: r.end_date,
                    employee_name: localDisplayName(),
                    comment: r.comment || "",
                    ok: true,
                  });
                return;
              }
              if (!sessionUserId || !deputyLoaded) return;
              if (!userCanApproveAbsences(profileRole ?? "user", sessionUserId, deputyUserId)) {
                if (!cancelled)
                  setErr(
                    "Apstiprināt drīkst tikai vadītājs vai norādītais aktīvais aizvietotājs. Ielogojies ar atbilstošu kontu."
                  );
                return;
              }
              const { data, error } = await supabase.rpc("pdd_cits_preview", { p_token: token });
              if (cancelled) return;
              if (error) {
                setErr(error.message);
                return;
              }
              const row = Array.isArray(data) ? data[0] : data;
              if (!row?.ok) setErr("Nederīgs vai jau apstiprināts pieprasījums.");
              else setPreview(row);
            })();
            return () => {
              cancelled = true;
            };
          }, [token, sessionUserId, deputyLoaded, deputyUserId, profileRole]);
          async function approve() {
            if (!canApprove) {
              alert("Apstiprināt drīkst tikai vadītājs vai norādītais aktīvais aizvietotājs.");
              return;
            }
            setBusy(true);
            try {
              if (isLocalMode()) {
                const rows = getLocalCitsRequests();
                const r = rows.find((x) => x.approval_token === token && x.status === "pending_manager");
                if (!r) {
                  setErr("Nav atrasts.");
                  return;
                }
                const types = getLocalTypes();
                const cits = types.find((t) => isCitsSaskanotsTypeName(t.name));
                if (!cits) {
                  setErr("Nav veida „Cits (ar vadītāja saskaņojumu)” lokālajos datos.");
                  return;
                }
                const abs = getLocalAbsences();
                const nowIso = new Date().toISOString();
                const idx = abs.findIndex(
                  (x) =>
                    String(x.user_id) === String(r.user_id) &&
                    Number(x.type_id) === Number(cits.id) &&
                    String(x.start_date) === String(r.start_date) &&
                    String(x.end_date) === String(r.end_date) &&
                    String(x.comment ?? "") === String(r.comment ?? "") &&
                    String(x.status) === "pending"
                );
                if (idx >= 0) {
                  abs[idx] = {
                    ...abs[idx],
                    status: "approved",
                    approved_at: nowIso,
                  };
                } else {
                  abs.push({
                    id: crypto.randomUUID(),
                    user_id: r.user_id,
                    type_id: cits.id,
                    start_date: r.start_date,
                    end_date: r.end_date,
                    comment: r.comment,
                    status: "approved",
                    created_at: nowIso,
                    approved_at: nowIso,
                  });
                }
                setLocalAbsences(abs);
                setLocalCitsRequests(
                  rows.map((x) =>
                    x.approval_token === token ? { ...x, status: "approved" } : x
                  )
                );
                pushChangeLog("prombutne.cits_apstiprinats", `Cits pieprasījums ${token} apstiprināts`);
                stripCitsFromUrl();
                onDone();
                return;
              }
              const { error } = await supabase.rpc("pdd_approve_cits_token", { p_token: token });
              if (error) {
                alert(error.message);
                return;
              }
              void callPddResendApi({ action: "cits_token_approved_emails", token });
              stripCitsFromUrl();
              onDone();
            } finally {
              setBusy(false);
            }
          }
          async function reject() {
            if (!canApprove) {
              alert("Noraidīt drīkst tikai vadītājs vai norādītais aktīvais aizvietotājs.");
              return;
            }
            setBusy(true);
            try {
              if (isLocalMode()) {
                const rows = getLocalCitsRequests();
                const r = rows.find((x) => x.approval_token === token && x.status === "pending_manager");
                if (!r) {
                  setErr("Nav atrasts.");
                  return;
                }
                const reason = String(rejectReason || "").trim();
                setLocalCitsRequests(
                  rows.map((x) =>
                    x.approval_token === token
                      ? {
                          ...x,
                          status: "cancelled",
                          decision_reason: reason || null,
                          decided_at: new Date().toISOString(),
                          decided_by: sessionUserId ?? null,
                        }
                      : x
                  )
                );
                const types = getLocalTypes();
                const cits = types.find((t) => isCitsSaskanotsTypeName(t.name));
                if (cits) {
                  const abs = getLocalAbsences().filter(
                    (x) =>
                      !(
                        Number(x.type_id) === Number(cits.id) &&
                        String(x.user_id) === String(r.user_id) &&
                        String(x.start_date) === String(r.start_date) &&
                        String(x.end_date) === String(r.end_date) &&
                        String(x.comment ?? "") === String(r.comment ?? "") &&
                        String(x.status) === "pending"
                      )
                  );
                  setLocalAbsences(abs);
                }
                pushChangeLog(
                  "prombutne.cits_noraidits",
                  `${r.user_id}: ${r.start_date} — ${r.end_date}${reason ? ` (${reason})` : ""}`
                );
                stripCitsFromUrl();
                onDone();
                return;
              }
              alert("Noraidīšana tiešsaistes režīmā nav konfigurēta bez backend funkcijas.");
            } finally {
              setBusy(false);
            }
          }
          return html`
            <div class="auth-box" style=${{ maxWidth: "480px" }}>
              <h1 style=${{ fontSize: "1.15rem" }}>„Cits (ar vadītāja saskaņojumu)” — apstiprinājums</h1>
              ${err
                ? html`<p style=${{ color: "#f87171" }}>${err}</p>`
                : !preview
                  ? html`<p style=${{ color: "var(--muted)" }}>${isLocalMode() || canApprove ? "Ielādē…" : "Pārbauda tiesības…"}</p>`
                  : html`
                      <div class="stack" style=${{ gap: "0.5rem" }}>
                        <p><strong>${preview.employee_name}</strong></p>
                        <p style=${{ margin: 0, fontSize: "0.9rem" }}>
                          ${formatDateLv(preview.start_date)} — ${formatDateLv(preview.end_date)}
                        </p>
                        ${preview.comment
                          ? html`<p style=${{ margin: 0 }}>${preview.comment}</p>`
                          : null}
                        <button type="button" class="btn btn-danger" disabled=${busy || !canApprove} onClick=${approve}>
                          ${busy ? "…" : "Apstiprināt prombūtni"}
                        </button>
                        <textarea
                          class="textarea"
                          value=${rejectReason}
                          onChange=${(e) => setRejectReason(e.target.value)}
                          placeholder="Noraidījuma iemesls (pēc izvēles)"
                        />
                        <div class="row" style=${{ gap: "0.35rem", flexWrap: "wrap", alignItems: "center" }}>
                          <button type="button" class="btn btn-ghost" disabled=${busy || !canApprove} onClick=${reject}>
                            ${busy ? "…" : "Noraidīt"}
                          </button>
                          <button type="button" class="btn btn-ghost btn-small" disabled=${busy} onClick=${() => setRejectReason("")}>
                            Atcelt
                          </button>
                        </div>
                        ${!canApprove && !isLocalMode()
                          ? html`<p style=${{ margin: 0, fontSize: "0.82rem", color: "var(--muted)" }}>
                              Tikai vadītājs vai norādītais aktīvais aizvietotājs var apstiprināt.
                            </p>`
                          : null}
                      </div>
                    `}
              <button type="button" class="btn btn-ghost btn-small" style=${{ marginTop: "1rem" }} onClick=${onDone}>
                Aizvērt
              </button>
            </div>
          `;
        }

        function shortUuid(id) {
          const s = String(id || "");
          return s.length > 10 ? `${s.slice(0, 8)}…` : s || "—";
        }

        function formatDbTs(val) {
          if (val == null || val === "") return "—";
          const s = String(val);
          if (s.length >= 19 && /^\d{4}-\d{2}-\d{2}T/.test(s)) return s.replace("T", " ").slice(0, 19);
          return s;
        }

        function formatDateLv(val) {
          const s = String(val ?? "").trim();
          if (!s) return "—";
          const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s);
          if (m) return `${m[3]}.${m[2]}.${m[1]}`;
          return s;
        }

        function absenceStatusLv(st) {
          if (st === "pending") return "gaida";
          if (st === "approved") return "apstiprināts";
          if (st === "rejected") return "noraidīts";
          return st ?? "—";
        }

        function PrombutnesHistoryPanel({
          userId,
          role,
          absences,
          types,
          onRefresh,
          approverView,
          historyOpen,
          onToggleHistory,
          historyMonth,
          highlightAbsenceId,
          onClearHighlight,
          canApproveAbsences,
          sessionEmail,
        }) {
          const [editing, setEditing] = useState(null);
          const [delId, setDelId] = useState(null);
          const [rejectForId, setRejectForId] = useState(null);
          const [rejectReasonText, setRejectReasonText] = useState("");
          const [filtersOpen, setFiltersOpen] = useState(false);
          const [histPage, setHistPage] = useState(0);
          const HIST_PAGE_SIZE = 20;
          const [periodPickerOpen, setPeriodPickerOpen] = useState(false);
          // Noklusējumā — visi ieraksti no DB; „Šis mēnesis” / no–līdz var atlasīt atsevišķi.
          const [periodMode, setPeriodMode] = useState("all"); // 'month' | 'all' | 'range'
          const [periodFrom, setPeriodFrom] = useState("");
          const [periodTo, setPeriodTo] = useState("");
          const [form, setForm] = useState({ type_id: "", start_date: "", end_date: "", comment: "" });
          const [filters, setFilters] = useState({
            name: "",
            type: "",
            start: "",
            end: "",
            comment: "",
            status: "",
            rejectReason: "",
          });
          const filterNameActive = String(filters?.name ?? "").trim() !== "";
          const filterTypeActive = String(filters?.type ?? "").trim() !== "";
          const filterStartActive = String(filters?.start ?? "").trim() !== "";
          const filterEndActive = String(filters?.end ?? "").trim() !== "";
          const filterCommentActive = String(filters?.comment ?? "").trim() !== "";
          const filterStatusActive = String(filters?.status ?? "").trim() !== "";
          const filterRejectReasonActive = String(filters?.rejectReason ?? "").trim() !== "";
          function userShownFromFull(userFull) {
            const s = String(userFull ?? "").trim();
            if (!s) return "";
            const userParts = s.split(/\s+/).filter(Boolean);
            return userParts.length <= 2 ? s : `${userParts[0]} ${userParts[userParts.length - 1]}`;
          }
          function clearFilters() {
            setFilters({ name: "", type: "", start: "", end: "", comment: "", status: "", rejectReason: "" });
          }
          const myNameForFilter = useMemo(() => {
            const own = (absences ?? []).find((a) => String(a.user_id) === String(userId));
            if (own?.employee) return userShownFromFull(userDisplayName(own.employee));
            return localDisplayName();
          }, [absences, userId]);
          const myFilterActive =
            String(filters?.name ?? "").trim().toLowerCase() === String(myNameForFilter ?? "").trim().toLowerCase();
          function ensureHistoryOpen() {
            if (!historyOpen) onToggleHistory();
          }
          const periodRange = useMemo(() => {
            const V = globalThis.PDDPrombutnesVesture;
            const toYmd = typeof V?.toYmd === "function" ? V.toYmd : (x) => String(x ?? "").slice(0, 10);

            if (periodMode === "all") return null;
            if (periodMode === "month") {
              const m = historyMonth instanceof Date ? historyMonth : new Date();
              const from = format(startOfMonth(m), "yyyy-MM-dd");
              const to = format(endOfMonth(m), "yyyy-MM-dd");
              return { fromYmd: toYmd(from), toYmd: toYmd(to) };
            }
            // range
            return { fromYmd: toYmd(periodFrom), toYmd: toYmd(periodTo) };
          }, [periodMode, periodFrom, periodTo, historyMonth]);

          const periodLabelText = useMemo(() => {
            if (periodMode === "all") return "Visi periodi";
            if (periodMode === "month") {
              const m = historyMonth instanceof Date ? historyMonth : new Date();
              return format(m, "LLLL yyyy", { locale: lv });
            }
            // range
            const fromLv = periodFrom ? formatDateLv(String(periodFrom).slice(0, 10)) : "—";
            const toLv = periodTo ? formatDateLv(String(periodTo).slice(0, 10)) : "—";
            return `${fromLv}–${toLv}`;
          }, [periodMode, periodFrom, periodTo, historyMonth]);

          useEffect(() => {
            // Kad mainās mēnesis, atjaunojam range sākuma/beigu vērtības tikai ja lietotājs nav ielicis citu.
            const m = historyMonth instanceof Date ? historyMonth : new Date();
            const from = format(startOfMonth(m), "yyyy-MM-dd");
            const to = format(endOfMonth(m), "yyyy-MM-dd");
            if (!periodFrom) setPeriodFrom(from);
            if (!periodTo) setPeriodTo(to);
            // Ja mode ir month, range vērtības nav svarīgas.
          }, [historyMonth]); // eslint-disable-line react-hooks/exhaustive-deps

          useEffect(() => {
            setHistPage(0);
          }, [periodMode, periodFrom, periodTo]);
          function applyFilter(key, value) {
            setFilters((prev) => ({ ...prev, [key]: value }));
            ensureHistoryOpen();
          }
          function clearFilter(key) {
            setFilters((prev) => ({ ...prev, [key]: "" }));
          }
          function isOwnAbsence(a) {
            const uid = String(userId ?? "").trim();
            if (uid && String(a?.user_id ?? "").trim() === uid) return true;
            const em = String(sessionEmail ?? "").trim().toLowerCase();
            const ls = String(sessionStorage.getItem(LS_LOCAL_EMAIL) ?? "").trim().toLowerCase();
            const want = em || ls;
            if (want && a?.employee) {
              const uem = String(firstUserEmailField(a.employee) || userImail(a.employee) || "")
                .trim()
                .toLowerCase();
              if (uem && uem === want) return true;
            }
            const mine = String(myNameForFilter ?? "").trim().toLowerCase();
            if (mine && a?.employee) {
              const userFull = String(userDisplayName(a.employee) ?? "").trim().toLowerCase();
              const shown = String(userShownFromFull(userDisplayName(a.employee)) ?? "").trim().toLowerCase();
              if (shown && shown === mine) return true;
              if (userFull && userFull === mine) return true;
            }
            return false;
          }
          const sortedList = useMemo(() => {
            const list = approverView ? absences : absences.filter((a) => isOwnAbsence(a));
            return [...list].sort((a, b) =>
              String(b.created_at || "").localeCompare(String(a.created_at || ""))
            );
          }, [absences, approverView, userId, sessionEmail, myNameForFilter]);
          const filteredList = useMemo(() => {
            const includesMatch =
              window.PDDFiltr?.includesMatch ??
              ((value, query) => {
                const q = String(query ?? "").toLowerCase().trim();
                if (!q) return true;
                const v = String(value ?? "").toLowerCase();
                return v.includes(q);
              });
            const f = filters ?? {};
            return sortedList.filter((a) => {
              // Perioda filtrs (mēnesis / visi / no–līdz).
              // Lai izceltā rinda vienmēr būtu redzama, ja tā ir ārpus perioda — to tomēr iekļaujam.
              if (periodRange) {
                const isHighlighted = highlightAbsenceId && String(a?.id ?? "") === String(highlightAbsenceId ?? "");
                if (!isHighlighted) {
                  const V = globalThis.PDDPrombutnesVesture;
                  const toYmd = typeof V?.toYmd === "function" ? V.toYmd : (x) => String(x ?? "").slice(0, 10);
                  const aStart = toYmd(a?.start_date);
                  const aEnd = toYmd(a?.end_date);
                  const ok =
                    typeof V?.intersectsYmdRange === "function"
                      ? V.intersectsYmdRange(aStart, aEnd, periodRange.fromYmd, periodRange.toYmd)
                      : true;
                  if (!ok) return false;
                }
              }
              const userFull = userDisplayName(a.employee);
              const userShown = userShownFromFull(userFull);
              const typeName = a.type?.name ?? a.type_id ?? "";
              const statusText = isCitsSaskanotsTypeName(typeName)
                ? (a.status === "approved" ? "saskaņots" : a.status === "rejected" ? "noraidīts" : "gaida")
                : "bez saskaņošanas";
              if (f.name && !includesMatch(userShown, f.name)) return false;
              if (f.type && !includesMatch(typeName, f.type)) return false;
              if (f.start && !includesMatch(a.start_date ?? "", f.start)) return false;
              if (f.end && !includesMatch(a.end_date ?? "", f.end)) return false;
              if (f.comment && !includesMatch(a.comment ?? "", f.comment)) return false;
              if (f.status && !includesMatch(statusText, f.status)) return false;
              if (f.rejectReason && !includesMatch(extractRejectReason(a), f.rejectReason)) return false;
              return true;
            });
          }, [sortedList, filters, approverView, userId, periodRange, highlightAbsenceId]);
          useEffect(() => {

                                <td style=${{ maxWidth: "140px", wordBreak: "break-word" }}>
                                  ${maybeMark(a.comment ?? "—", filters.comment)}

                                <td>
                                  <span class=${`badge ${statusBadgeClass}`}>

                                    ? html`

                                          style=${{
                                            marginLeft: "0.5rem",
                                            display: "inline-flex",
                                            alignItems: "center",
                                            background: "rgba(220,38,38,0.12)",
                                            color: "var(--danger, #dc2626)",

                                            borderRadius: "999px",
                                            fontSize: "0.72rem",
                                            lineHeight: 1.2,
                                            verticalAlign: "text-bottom",

                                          title="Gaida apstiprinājumu"
                                        >

                                </td>
                                <td>
                                  ${isCitsType && String(a.status || "").toLowerCase() === "rejected"
                                    ? maybeMark(extractRejectReason(a) || "—", filters.rejectReason)
                                    : "—"}
                                </td>
                                ${anyActions || (isCitsType && canApproveAbsences && isPendingStatus(a.status))
                                  ? html`
                                      <td>
                                        <div
                                          class="row"
                                          style=${{
                                            flexDirection: "column",
                                            gap: "0.25rem",
                                            alignItems: "stretch",
                                          }}
                                        >
                                          ${canEdit
                                            ? html`
                                                <button
                                                  type="button"
                                                  class="btn btn-ghost btn-small"
                                                  onClick=${() => openEdit(a)}
                                                >
                                                  Labot
                                                </button>
                                              `
                                            : null}
                                          ${canDelete
                                            ? html`
                                                <button
                                                  type="button"
                                                  class="btn btn-danger btn-small"
                                                  onClick=${() => setDelId(a.id)}
                                                >
                                                  Dzēst
                                                </button>
                                              `
                                            : null}
                                          ${isCitsType && canApproveAbsences && isPendingStatus(a.status)
                                            ? html`
                                                <button
                                                  type="button"
                                                  class="btn btn-danger btn-small"
                                                  onClick=${async () => {
                                                    if (isLocalMode()) {
                                                      const rows = getLocalAbsences().map((r) =>
                                                        r.id === a.id ? { ...r, status: "approved" } : r
                                                      );
                                                      setLocalAbsences(rows);
                                                      pushChangeLog(
                                                        "prombutne.apstiprinat",
                                                        `Ieraksts ${a.id} apstiprināts`
                                                      );
                                                    } else {
                                                      const { error } = await supabase
                                                        .from("prombutnes_dati")
                                                        .update({
                                                          [ABSENCE_COLS_RUNTIME.status]: "approved",
                                                          [ABSENCE_COLS_RUNTIME.reject_reason]: null,
                                                        })
                                                        .eq("id", a.id);
                                                      if (error) {
                                                        alert(error.message);
                                                        return;
                                                      }
                                                      void callPddResendApi({
                                                        action: "cits_absence_decided",
                                                        absence_id: a.id,
                                                        decision: "approved",
                                                      });
                                                    }
                                                    onRefresh();
                                                  }}
                                                >
                                                  Apstiprināt
                                                </button>
                                                <button
                                                  type="button"
                                                  class="btn btn-ghost btn-small"

                                                >

                          })}
                        </tbody>
                      `
                    : historyOpen
                      ? html`
                          <tbody>
                            <tr>
                              <td colspan=${colCount} style=${{ color: "var(--muted)", fontStyle: "italic" }}>Nav ierakstu.</td>
                            </tr>
                          </tbody>
                        `
                      : null}
                </table>
              </div>
              ${historyOpen && historyTotal > HIST_PAGE_SIZE
                ? html`
                    <div
                      class="row"
                      style=${{
                        justifyContent: "space-between",
                        alignItems: "center",
                        marginTop: "0.65rem",
                        flexWrap: "wrap",
                        gap: "0.5rem",
                      }}
                    >
                      <span style=${{ fontSize: "0.82rem", color: "var(--muted)" }}>
                        Lapa ${historySafePage + 1} / ${historyTotalPages} · ${historyTotal} ieraksti
                      </span>
                      <div class="row" style=${{ gap: "0.35rem" }}>
                        <button
                          type="button"
                          class="btn btn-ghost btn-small"
                          disabled=${historySafePage <= 0}
                          onClick=${() => setHistPage((p) => Math.max(0, p - 1))}
                        >
                          Iepriekšējā
                        </button>
                        <button
                          type="button"
                          class="btn btn-ghost btn-small"
                          disabled=${historySafePage >= historyTotalPages - 1}
                          onClick=${() => setHistPage((p) => Math.min(historyTotalPages - 1, p + 1))}
                        >
                          Nākamā
                        </button>
                      </div>
                    </div>
                  `
                : null}
              ${editing
                ? html`
                    <div
                      style=${{
                        position: "fixed",
                        inset: 0,
                        background: "rgba(0,0,0,0.45)",
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        zIndex: 50,
                        padding: "1rem",
                      }}
                      onClick=${() => setEditing(null)}
                    >
                      <div

                        style=${{ maxWidth: "400px", width: "100%" }}
                        onClick=${(ev) => ev.stopPropagation()}
                      >
                        <h3 style=${{ margin: "0 0 0.65rem", fontSize: "1rem" }}>Labot ierakstu</h3>
                        <form class="stack" onSubmit=${saveEdit}>
                          <div class="field">
                            <label>Veids</label>
                            <select
                              class="select"
                              required
                              value=${form.type_id}
                              onChange=${(ev) => setForm((f) => ({ ...f, type_id: ev.target.value }))}
                            >
                              ${typeOptionsEdit.map(
                                (t) => html`<option key=${t.id} value=${t.id}>${t.name}</option>`
                              )}
                            </select>
                          </div>
                          <div class="row" style=${{ gap: "0.75rem" }}>
                            <div class="field" style=${{ flex: 1 }}>
                              <label>No</label>
                              <input
                                type="date"
                                class="input"
                                required
                                value=${form.start_date}
                                onChange=${(ev) => setForm((f) => ({ ...f, start_date: ev.target.value }))}
                              />
                            </div>
                            <div class="field" style=${{ flex: 1 }}>
                              <label>Līdz</label>
                              <input
                                type="date"
                                class="input"
                                required
                                value=${form.end_date}
                                onChange=${(ev) => setForm((f) => ({ ...f, end_date: ev.target.value }))}
                              />
                            </div>
                          </div>
                          <div class="field">
                            <label>Komentārs</label>
                            <textarea
                              class="textarea"
                              value=${form.comment}
                              onChange=${(ev) => setForm((f) => ({ ...f, comment: ev.target.value }))}
                            />
                          </div>
                          <div class="row">
                            <button type="submit" class="btn btn-primary btn-small">Saglabāt</button>
                            <button type="button" class="btn btn-ghost btn-small" onClick=${() => setEditing(null)}>
                              Atcelt
                            </button>
                          </div>
                        </form>
                      </div>
                    </div>
                  `
                : null}
              ${delId
                ? html`
                    <div
                      style=${{
                        position: "fixed",
                        inset: 0,
                        background: "rgba(0,0,0,0.45)",
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        zIndex: 50,
                      }}
                    >
                      <div class="list-panel" style=${{ maxWidth: "360px" }}>
                        <p>Dzēst šo ierakstu?</p>
                        <div class="row">
                          <button type="button" class="btn btn-danger btn-small" onClick=${confirmDelete}>
                            Jā, dzēst
                          </button>
                          <button type="button" class="btn btn-ghost btn-small" onClick=${() => setDelId(null)}>
                            Atcelt
                          </button>
                        </div>
                      </div>
                    </div>
                  `
                : null}
              ${rejectForId
                ? html`
                    <div
                      style=${{
                        position: "fixed",
                        inset: 0,
                        background: "rgba(0,0,0,0.45)",
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        zIndex: 50,
                        padding: "1rem",
                      }}
                    >
                      <div class="list-panel" style=${{ maxWidth: "420px", width: "100%" }}>
                        <h3 style=${{ margin: "0 0 0.65rem", fontSize: "1rem" }}>Noraidīt pieprasījumu</h3>
                        <p style=${{ margin: "0 0 0.5rem", fontSize: "0.88rem", color: "var(--muted)" }}>
                          Iemesls tiks pievienots pie komentāra / noraidījuma lauka.
                        </p>
                        <div class="field" style=${{ marginBottom: "0.85rem" }}>
                          <label>Iemesls noraidīšanai</label>
                          <textarea
                            class="textarea"
                            rows="4"
                            value=${rejectReasonText}
                            onChange=${(ev) => setRejectReasonText(ev.target.value)}
                            placeholder="Īsi apraksti iemeslu…"
                          />
                        </div>
                        <div class="row">
                          <button type="button" class="btn btn-danger btn-small" onClick=${submitRejectCits}>
                            Jā, noraidīt
                          </button>
                          <button type="button" class="btn btn-ghost btn-small" onClick=${closeRejectCits}>
                            Atcelt
                          </button>
                        </div>
                      </div>
                    </div>
                  `
                : null}
            </div>
          `;
        }

        function PrombutnesSection({
          userId,
          role,
          rawRole,
          promSub,
          setPromSub,
          onAbsencesSnapshot,
          sessionEmail,
          actorDisplayName,
        }) {
          const [month, setMonth] = useState(() => new Date());
          const [absences, setAbsences] = useState([]);
          const [typesList, setTypesList] = useState([]);
          const [teamUsers, setTeamUsers] = useState([]);
          const [deputyUserId, setDeputyUserId] = useState(null);
          const [deputyValidFrom, setDeputyValidFrom] = useState(null);
          const [deputyValidTo, setDeputyValidTo] = useState(null);
          const [approverCols, setApproverCols] = useState({
            status: COL_USER_APPROVER_STATUS,
            from: COL_USER_APPROVER_FROM,
            to: COL_USER_APPROVER_TO,
          });
          const [error, setError] = useState(null);
          const [historyOpen, setHistoryOpen] = useState(true);
          const [highlightAbsenceId, setHighlightAbsenceId] = useState(null);
          const [requestPresetDate, setRequestPresetDate] = useState("");
          const [highlightFromUrl, setHighlightFromUrl] = useState(null);
          useEffect(() => {
            if (isLocalMode()) {
              setTypesList(getLocalTypes());
              return;
            }
            supabase
              .from("prombutnes_veidi")
              .select("*")
              .order("id", { ascending: true })
              .then(({ data, error }) => {
                if (error) console.error(error);
                setTypesList((data ?? []).map(normalizeAbsenceTypeRecord));
              });
          }, []);
          const loadTeamAndDeputy = useCallback(async () => {
            if (isLocalMode()) {
              const users = (window.KOMANDA?.loadTeamUsers?.() ?? []).map((u) => ({
                ...u,
                id: String(u.id),
                // Nodrošina atslēgas UI šablonam
                [COL_USER_NAME]: u[COL_USER_NAME] ?? u.full_name ?? localDisplayName(),
                [COL_USER_AMATS]: u[COL_USER_AMATS] ?? u.Amats ?? "",
                // i-mail kolonnai (renderēšanā izmanto userImail(), bet drošībai ieliekam)
                email: u.email ?? u["e-pasts"] ?? u["i-mail"] ?? "",
              }));
              setTeamUsers(users);
              const localDeputyId = localStorage.getItem(LS_LOCAL_DEPUTY_USER_ID);
              const localFrom = localStorage.getItem(LS_LOCAL_DEPUTY_FROM);
              const localTo = localStorage.getItem(LS_LOCAL_DEPUTY_TO);
              setDeputyUserId(localDeputyId ? String(localDeputyId) : null);
              setDeputyValidFrom(localFrom || null);
              setDeputyValidTo(localTo || null);
              return;
            }
            await ensureDbReadableSession();
            let urows = null;
            let uErr = null;
            const uq1 = await supabase.from("users").select("*").order(COL_USER_NAME, { ascending: true });
            urows = uq1.data;
            uErr = uq1.error;
            if (uErr) {
              const uq2 = await supabase.from("users").select("*");
              urows = uq2.data;
              uErr = uq2.error;
            }
            if (uErr) {
              const rr = await fetchUsersDirectFromRest();
              urows = rr.data;
              uErr = rr.error;
            }
            if (uErr) {
              const pq = await supabase.from("profiles").select("*");
              urows = pq.data;
              uErr = pq.error;
            }
            if (uErr) console.error(uErr);
            const rawUsers = urows ?? [];
            const normalizedUsers = rawUsers.map(normalizeTeamUserRecord);
            setApproverCols(detectUserApproverColumns(rawUsers));
            setTeamUsers(normalizedUsers);
            if (window.SASKANOSANA?.loadState) {
              const st = await window.SASKANOSANA.loadState(supabase, DEFAULT_MANAGER_NAME);
              if (!st?.error) {
                setDeputyUserId(st.deputyUserId ?? null);
                setDeputyValidFrom(st.deputyFrom ?? null);
                setDeputyValidTo(st.deputyTo ?? null);
                return;
              }
            }
            const activeDeputy = resolveActiveDeputyUser(normalizedUsers);
            setDeputyUserId(activeDeputy?.id ? String(activeDeputy.id) : null);
            setDeputyValidFrom(activeDeputy?.[COL_USER_APPROVER_FROM] ?? null);
            setDeputyValidTo(activeDeputy?.[COL_USER_APPROVER_TO] ?? null);
          }, []);
          useEffect(() => {
            void loadTeamAndDeputy();
          }, [loadTeamAndDeputy]);
          const deputyEffectiveId = useMemo(
            () => effectiveDeputyUserId(deputyUserId, deputyValidFrom, deputyValidTo),
            [deputyUserId, deputyValidFrom, deputyValidTo]
          );
          const notifyEmail = "katrina.jirgensone@vid.gov.lv";
          const canApprove = userCanApproveAbsences(role, userId, deputyEffectiveId);
          const refresh = useCallback(async () => {
            setError(null);
            if (isLocalMode()) {
              const types = getLocalTypes();
              const tmap = new Map(types.map((t) => [t.id, t]));
              const ln2 = localDisplayName();
              const userStub = (uid) => ({
                id: uid,
                full_name: ln2,
                [COL_USER_NAME]: ln2,
                [COL_USER_IMAIL]: "demo@local",
                [COL_USER_AMATS]: "",
              });
              const list = getLocalAbsences()
                .map((r) => ({
                  ...r,
                  type: tmap.get(r.type_id) ?? null,
                  employee: userStub(r.user_id),
                  approver_user: r.approved_by ? userStub(r.approved_by) : null,
                }))
                .sort((a, b) => a.start_date.localeCompare(b.start_date));
              setAbsences(list);
              return;
            }
            await ensureDbReadableSession();
            // 1) Prombūtnes ieraksti
            const { data: rows, error: qErr } = await supabase
              .from("prombutnes_dati")
              .select("*")
              .order(ABSENCE_COLS_RUNTIME.start_date, { ascending: true });
            let absRows = rows;
            let absErr = qErr;
            if (absErr) {
              let rr = await fetchTableDirectFromRest("prombutnes_dati", {
                orderBy: ABSENCE_COLS_RUNTIME.start_date,
                ascending: true,
              });
              if (rr.error) {
                rr = await fetchTableDirectFromRest("prombutnes_dati");
              }
              absRows = rr.data;
              absErr = rr.error;
            }
            if (absErr) {
              setError(absErr.message);
              return;
            }
            // 2) Lietotāju profili
            let profs = null;
            let pErr = null;
            const pu1 = await supabase.from("users").select("*");
            profs = pu1.data;
            pErr = pu1.error;
            if (pErr) {
              const pu2 = await supabase.from("profiles").select("*");
              profs = pu2.data;
              pErr = pu2.error;
            }
            if (pErr) setError(pErr.message);
            const pmap = new Map((profs ?? []).map((p) => [String(p.id), normalizeTeamUserRecord(p)]));
            // 3) Prombūtnes veidu saraksts (kārtošanai/labeliem)
            let typesRows = null;
            let tErr = null;
            const tQ = await supabase.from("prombutnes_veidi").select("*");
            typesRows = tQ.data;
            tErr = tQ.error;
            if (tErr) {
              const tr = await fetchTableDirectFromRest("prombutnes_veidi");
              typesRows = tr.data;
              tErr = tr.error;
            }
            if (tErr) console.error(tErr);
            const tmap = new Map(
              (typesRows ?? []).map((t) => {
                const nt = normalizeAbsenceTypeRecord(t);
                return [String(nt.id), nt];
              })
            );
            // 4) Normalizējam prombūtnes datus
            const list = (absRows ?? [])
              .map((r) => {
                detectAbsenceColumnsFromRow(r);
                return normalizeAbsenceRecord(r);
              })
              .map((r) => {
                const employee = pmap.get(String(r.user_id)) ?? null;
                const dn = userDisplayName(employee);
                const employeeName =
                  dn ||
                  String(r["Vārds uzvārds"] ?? r["Vards uzvards"] ?? "").trim() ||
                  String(r.user_id ?? "").trim();
                return {
                  ...r,
                  employee: employee
                    ? { ...employee, [COL_USER_NAME]: employeeName }
                    : { id: r.user_id, [COL_USER_NAME]: employeeName },
                  type: tmap.get(String(r.type_id ?? "")) ?? null,
                  approver_user: r.approved_by ? pmap.get(String(r.approved_by)) ?? null : null,
                };
              });
            setAbsences(list);
          }, []);
          useEffect(() => {
            void refresh();
          }, [refresh]);
          useEffect(() => {
            onAbsencesSnapshot?.(absences, userId, canApprove);
          }, [absences, userId, canApprove, onAbsencesSnapshot]);

          // URL param: ?citsRow=<id> → atvērt vēsturi un izcelt konkrēto ierakstu
          useEffect(() => {
            try {
              const params = new URLSearchParams(window.location.search || "");
              const citsRow = params.get("citsRow");
              if (citsRow) {
                setPromSub("history");
                setHistoryOpen(true);
                setHighlightFromUrl(citsRow);
              }
            } catch {
              // ignore
            }
          }, []);
          const reloadUsersAndViews = useCallback(async () => {
            await loadTeamAndDeputy();
            await refresh();
          }, [loadTeamAndDeputy, refresh]);
          useEffect(() => {
            if (isLocalMode() || !supabase) return undefined;
            let debounceT = null;
            const bump = () => {
              clearTimeout(debounceT);
              debounceT = setTimeout(() => {
                void loadTeamAndDeputy();
                void refresh();
              }, 320);
            };
            const ch = supabase
              .channel("pdd-prombutnes-live")
              .on("postgres_changes", { event: "*", schema: "public", table: "prombutnes_dati" }, bump)
              .on("postgres_changes", { event: "*", schema: "public", table: "prombutnes_veidi" }, bump)
              .on("postgres_changes", { event: "*", schema: "public", table: "users" }, bump)
              .subscribe((status, err) => {
                if (status === "CHANNEL_ERROR" || status === "TIMED_OUT") {
                  console.warn("[PDD Realtime]", status, err?.message ?? err);
                }
              });
            return () => {
              clearTimeout(debounceT);
              void supabase.removeChannel(ch);
            };
          }, [loadTeamAndDeputy, refresh]);
          useEffect(() => {
            if (isLocalMode() || !supabase) return undefined;
            const pull = () => {
              if (document.visibilityState === "visible") void refresh();
            };
            window.addEventListener("focus", pull);
            document.addEventListener("visibilitychange", pull);
            return () => {
              window.removeEventListener("focus", pull);
              document.removeEventListener("visibilitychange", pull);
            };
          }, [refresh]);
          useEffect(() => {
            if (promSub === "deputy") setPromSub("calendar");
          }, [promSub, setPromSub]);
          const promSubLabel =
            promSub === "calendar"
              ? "Kalendārs"
              : promSub === "request"
                ? "Prombūtnes pieteikums"
                : promSub === "history"
                  ? "Prombūtnes vēsture"
                : promSub === "changes"
                    ? "Auditācijas vēsture"
                : promSub === "teamUsers"
                  ? "Komanda"
                  : promSub === "deputy"
                    ? "Apstiprinātāja maiņa"
                    : "";
          const headerSubLabel = promSub === "teamUsers" ? "" : promSubLabel;
          return html`
            <section class="stack" style=${{ gap: "1.25rem" }}>
              ${promSub === "teamUsers"
                ? null
                : html`
                    <div>
                      <h2 style=${{ margin: 0, fontSize: "1.15rem" }}>Prombūtnes</h2>
                      ${headerSubLabel
                        ? html`<p class="app-sub" style=${{ margin: "0.25rem 0 0" }}>${headerSubLabel}</p>`
                        : null}
                    </div>
                  `}
              ${error
                ? html`
                    <div class="banner-warn" role="alert">Kļūda: ${error}</div>
                  `
                : null}
              ${promSub === "calendar"
                ? html`
                    <div class="stack" style=${{ gap: "1rem" }}>
                      <${AbsenceCalendar}
                        month=${month}
                        onMonthChange=${setMonth}
                        absences=${absences}
                        types=${typesList}
                        caption="Komandas kalendārs. Parastie veidi reģistrējas uzreiz kā apstiprināti; „Cits (ar vadītāja saskaņojumu)” — pēc e-pasta apstiprinājuma. Spied uz krāsainās iezīmes, lai atvērtu ierakstu vēsturē."
                        onPickDay=${(d) => {
                          const ymd =
                            window.KALENDARS?.toYmd?.(d) ??
                            format(d, "yyyy-MM-dd");
                          setRequestPresetDate(ymd);
