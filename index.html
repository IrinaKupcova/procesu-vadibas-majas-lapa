<!DOCTYPE html>
<html lang="lv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PDD — Pakalpojumu dizaina daļa; prombūtnes un darba plānošana" />
    <title>PDD aplikācija</title>
    <!--
      BEZ SERVERA: atver šo failu pārlūkā (file:///…) vai kopē uz jebkuru tīmekļa vietu.
      1) Tiešsaistei: <code>TIKAI_VIENKARSI_SKATS = false</code> un projekta URL + publiskā atslēga failā. Vietējā parole: <code>LocalPasswordScreen</code>. Ātra demo: <code>TIKAI_VIENKARSI_SKATS = true</code>.
      E-pasti: <code>public.users.email</code> (sinhronizējas no auth). Edge Functions: <code>notify-cits-manager</code>, <code>notify-cits-applicant</code>, <code>notify-absence-applicant</code> — vajadzīgi <code>RESEND_API_KEY</code> un <code>RESEND_FROM</code>.
      2) Palaižot no file:// dažās vecākās sistēmās bloķē trešo pušu moduļus — tad lieto
         to pašu failu caur https (piem. GitHub Pages) vai pārlūka iestatījumos atļauj file piekļuvi.
    -->
    <style>
      :root {
        color-scheme: light dark;
        --bg: #c3f5e6;
        --surface:  #3db7bb;
        --surface2: #52b4c5;
        --border: #136e39;
        --text: #01171d;
        --muted: #020c1b;
        --accent: #5ae694;
        --accent-dim: #17acc0;
        --radius: 12px;
        font-family: "Segoe UI", system-ui, sans-serif;
        line-height: 1.5;
      }
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(1200px 600px at 10% -10%, #1e3a46 0%, transparent 55%),
          radial-gradient(900px 500px at 100% 0%, #134e4a 0%, transparent 50%), var(--bg);
        color: var(--text);
      }
      #root { min-height: 100vh; }
      button, input, select, textarea { font: inherit; }
      button { cursor: pointer; }
      .app-shell { max-width: 1200px; margin: 0 auto; padding: 1.25rem 1.25rem 3rem; }
      .app-layout {
        display: flex;
        align-items: stretch;
        min-height: 100vh;
        max-width: 1320px;
        margin: 0 auto;
      }
      .app-nav {
        flex: 0 0 200px;
        border-right: 1px solid var(--border);
        background: var(--surface);
        padding: 1rem 0.65rem;
      }
      .app-nav-inner {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        position: sticky;
        top: 1rem;
      }
      .app-nav-title {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin: 0 0 0.35rem 0.35rem;
      }
      .app-nav-link {
        display: block;
        width: 100%;
        text-align: left;
        padding: 0.5rem 0.65rem;
        border-radius: 8px;
        border: 1px solid transparent;
        background: transparent;
        color: inherit;
        font-size: 0.92rem;
      }
      .app-nav-link:hover {
        border-color: var(--border);
        background: rgba(0, 0, 0, 0.06);
      }
      .app-nav-link.active {
        background: var(--surface2);
        border-color: var(--border);
        font-weight: 600;
      }
      .app-main {
        flex: 1;
        min-width: 0;
        padding: 1.25rem 1.25rem 3rem;
      }
      @media (max-width: 720px) {
        .app-layout { flex-direction: column; }
        .app-nav {
          flex: none;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
        .app-nav-inner {
          flex-direction: row;
          flex-wrap: wrap;
          position: static;
        }
        .app-nav-link { flex: 1 1 auto; min-width: 120px; }
      }
      .app-header {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
      }
      .app-title { margin: 0; font-size: 1.35rem; font-weight: 600; }
      .app-sub { margin: 0.25rem 0 0; font-size: 0.9rem; color: var(--muted); }
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 1rem;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.1rem;
        text-align: left;
        transition: border-color 0.15s, transform 0.12s;
      }
      .card:hover { border-color: var(--accent-dim); transform: translateY(-1px); }
      .card h3 { margin: 0 0 0.35rem; font-size: 1rem; }
      .card p { margin: 0; font-size: 0.88rem; color: var(--muted); }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        padding: 0.45rem 0.9rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text);
      }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-primary {
        background: linear-gradient(180deg, #01102c, #01102c);
        border-color: #01102c;
        color: #fff;
      }
      .btn-ghost { background: transparent; }
      .btn-danger { background: #3f1515; border-color: #7f1d1d; color: #fecaca; }
      .btn-small { padding: 0.25rem 0.55rem; font-size: 0.8rem; }
      .field { display: flex; flex-direction: column; gap: 0.35rem; }
      .field label { font-size: 0.8rem; color: var(--muted); }
      .input, .select, .textarea {
        padding: 0.5rem 0.65rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
      }
      .textarea { min-height: 72px; resize: vertical; }
      .stack { display: flex; flex-direction: column; gap: 0.85rem; }
      .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
      .banner-warn {
        padding: 0.65rem 0.9rem;
        border-radius: 8px;
        background: #422006;
        border: 1px solid #854d0e;
        color: #fde68a;
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }
      .banner-deputy {
        padding: 0.65rem 0.9rem;
        border-radius: 8px;
        background: #450a0a;
        border: 1px solid #991b1b;
        color: #fecaca;
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }
      .cal-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem;
        overflow: auto;
      }
      .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(64px, 1fr));
        gap: 4px;
        min-width: 480px;
      }
      .cal-dow {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        text-align: center;
        padding: 0.25rem;
      }
      .cal-cell {
        min-height: 72px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        padding: 4px;
        font-size: 0.75rem;
      }
      .cal-cell-out { opacity: 0.45; }
      .cal-cell-today { outline: 1px solid var(--accent); }
      .cal-day-num { font-weight: 600; margin-bottom: 2px; }
      .cal-chip {
        display: block;
        border-radius: 4px;
        padding: 1px 4px;
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 0.65rem;
      }
      .list-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem;
      }
      .list-panel h2 { margin: 0 0 0.75rem; font-size: 1rem; }
      .abs-item {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.65rem;
        margin-bottom: 0.5rem;
        background: var(--bg);
      }
      .abs-item:last-child { margin-bottom: 0; }
      .badge {
        display: inline-block;
        font-size: 0.7rem;
        padding: 0.15rem 0.4rem;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .badge-pending { background: #422006; color: #fde68a; }
      .badge-approved { background: #064e3b; color: #a7f3d0; }
      .badge-rejected { background: #450a0a; color: #fecaca; }
      .auth-box {
        max-width: 380px;
        margin: 3rem auto;
        padding: 1.5rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }
      .auth-box h1 { margin: 0 0 1rem; font-size: 1.2rem; }
      .prombutnes-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(260px, 340px);
        gap: 1rem;
      }
      @media (max-width: 900px) {
        .prombutnes-grid { grid-template-columns: 1fr; }
      }
      code { background: var(--surface); padding: 0.1em 0.35em; border-radius: 4px; font-size: 0.9em; }
      .table-wrap {
        overflow-x: auto;
        margin-top: 0.5rem;
      }
      .team-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
      }
      .team-table th,
      .team-table td {
        border: 1px solid var(--border);
        padding: 0.45rem 0.55rem;
        text-align: left;
      }
      .team-table th {
        background: var(--bg);
        font-weight: 600;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
      }
      .team-table tbody tr:nth-child(even) {
        background: rgba(0, 0, 0, 0.04);
      }
      .team-users-panel {
        margin-top: 1.5rem;
      }
      .app-nav-sub {
        margin: 0.35rem 0 0 0.35rem;
        padding-left: 0.65rem;
        border-left: 2px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
      }
      .app-nav-sublink {
        font-size: 0.86rem;
        text-align: left;
        padding: 0.35rem 0.5rem;
        border-radius: 6px;
        border: none;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
      }
      .app-nav-sublink:hover {
        color: var(--text);
        background: rgba(0, 0, 0, 0.06);
      }
      .app-nav-sublink.active {
        color: var(--text);
        font-weight: 600;
        background: rgba(0, 0, 0, 0.08);
      }
      .hist-table-wrap {
        margin-top: 0.5rem;
      }
      .hist-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8rem;
      }
      .hist-table th,
      .hist-table td {
        border: 1px solid var(--border);
        padding: 0.4rem 0.45rem;
        text-align: left;
        vertical-align: top;
      }
      .hist-table th {
        background: var(--bg);
        font-weight: 600;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        color: var(--muted);
        white-space: nowrap;
      }
      .hist-table tbody tr:nth-child(even) {
        background: rgba(0, 0, 0, 0.03);
      }
      .hist-row-highlight {
        outline: 2px solid var(--accent);
        outline-offset: -2px;
        background: rgba(90, 230, 148, 0.15) !important;
      }
      .cal-chip {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <noscript><p style="padding:1rem;font-family:system-ui">Ieslēdz JavaScript.</p></noscript>
    <div id="root"></div>

    <!-- Lokālie dati + ziņas komandai (bez Supabase/API) -->
    <script src="./Komanda.js"></script>

    <script type="module">
      import React, { useState, useEffect, useCallback, useMemo } from "https://esm.sh/react@19.0.0";
      import { createRoot } from "https://esm.sh/react-dom@19.0.0/client";
      import htm from "https://esm.sh/htm@3.1.1";
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2.49.1";
      import {
        format,
        addMonths,
        eachDayOfInterval,
        endOfMonth,
        endOfWeek,
        isSameMonth,
        isToday,
        startOfMonth,
        startOfWeek,
      } from "https://esm.sh/date-fns@4.1.0";
      import { lv } from "https://esm.sh/date-fns@4.1.0/locale/lv";

      // Vietējais režīms (bez API): parole un dati pārlūkā. Mainiet paroli šeit:
      const PAGAIDU_PAROLE = "pdd";
      const LOCAL_USER_ID = "local-user-1";
      const LS_LOCAL_OK = "pdd_local_ok";
      const LS_LOCAL_NAME = "pdd_local_display_name";
      const LS_ABS = "pdd_local_absences";
      const LS_TYPES = "pdd_local_types";
      const LS_LOCAL_CITS = "pdd_local_cits_requests";
      const LS_LOCAL_DEPUTY_USER_ID = "pdd_local_deputy_user_id";
      const LS_LOCAL_DEPUTY_FROM = "pdd_local_deputy_from";
      const LS_LOCAL_DEPUTY_TO = "pdd_local_deputy_to";
      /** Pamata e-pasts paziņojumiem, kad nav aktīva aizvietotāja (saskaņā ar PDD iestatījumiem). */
      const DEFAULT_MANAGER_EMAIL = "pliada@inbox.lv";
      const DEFAULT_MANAGER_NAME = "Katrīna Jirgensone";
      /** Dropdown: nav DB p.i. — apstiprinājumi uz pamatvadītāju. */
      const DEPUTY_OPT_MANAGER = "__vaditajs__";
      /** Supabase public.users kolonnas (kā tabulas skatā). */
      const COL_USER_NAME = "Vārds uzvārds";
      const COL_USER_IMAIL = "i-mail";
      const COL_USER_AMATS = "Amats";
      const TEAM_PAGE_SIZE = 10;

      function userDisplayName(u) {
        if (!u) return "—";
        const n = u[COL_USER_NAME] ?? u.full_name;
        return (n && String(n).trim()) || "—";
      }

      function userImail(u) {
        if (!u) return "";
        // Supabase migrācijās `i-mail` bieži ir sinhronizēta no `email`, bet UI rādām kā e-pasts.
        const e = u.email ?? u[COL_USER_IMAIL];
        const s = e && String(e).trim();
        return s && s.includes("@") ? s : "";
      }

      /** true: tūlīt moduļu skats. false: tiešsaistes konts (URL+atslēga failā) vai lokālā parole. */
      const TIKAI_VIENKARSI_SKATS = true;

      // Publisko atslēgu kopē: Supabase → Project Settings → API → anon public (ne service_role).
      // Ja atslēga „pazuda” pēc rediģēšanas — ielīmē to atkal šeit (viena rinda, sākas ar eyJ…).
      const FILE_SUPABASE_URL = "https://fdnkvecgqetmwilwolgt.supabase.co";
      const FILE_SUPABASE_ANON_KEY = "YOUR_ANON_KEY";

      const LS_URL = "pdd_supabase_url";
      const LS_KEY = "pdd_supabase_anon_key";

      function loadConfig() {
        const url = FILE_SUPABASE_URL.includes("YOUR_PROJECT")
          ? localStorage.getItem(LS_URL) || FILE_SUPABASE_URL
          : FILE_SUPABASE_URL;
        const key = FILE_SUPABASE_ANON_KEY.includes("YOUR_ANON")
          ? localStorage.getItem(LS_KEY) || FILE_SUPABASE_ANON_KEY
          : FILE_SUPABASE_ANON_KEY;
        return { url, key };
      }

      function normalizeProjectUrl(url) {
        return String(url || "")
          .trim()
          .replace(/\/+$/, "");
      }

      /** Projekta adrese: https://xxxx.supabase.co (bez liekām slīpsvītrām beigās). */
      function isValidSupabaseProjectUrl(url) {
        const u = normalizeProjectUrl(url);
        return /^https:\/\/[a-z0-9][a-z0-9-]*\.supabase\.co$/i.test(u);
      }

      /** Publiskā (anon) JWT atslēga — parasti gara, sākas ar eyJ, trīs segmenti. */
      function isValidSupabaseAnonKey(key) {
        const k = String(key || "").trim().replace(/\s+/g, "");
        if (k.length < 80 || !k.startsWith("eyJ")) return false;
        const parts = k.split(".");
        return parts.length === 3 && parts[0].length > 0 && parts[1].length > 0 && parts[2].length > 0;
      }

      function configured() {
        if (TIKAI_VIENKARSI_SKATS) return false;
        const { url, key } = loadConfig();
        const u = String(url || "");
        const k = String(key || "");
        if (!u || !k) return false;
        if (u.includes("YOUR_PROJECT") || k.includes("YOUR_ANON")) return false;
        if (!isValidSupabaseProjectUrl(u)) return false;
        if (!isValidSupabaseAnonKey(k)) return false;
        return true;
      }

      const html = htm.bind(React.createElement);
      const __cfg = loadConfig();
      const supabase = configured()
        ? createClient(normalizeProjectUrl(__cfg.url), String(__cfg.key).trim().replace(/\s+/g, ""))
        : null;

      function readCitsTokenFromUrl() {
        try {
          return new URL(window.location.href).searchParams.get("cits") || "";
        } catch {
          return "";
        }
      }

      function stripCitsFromUrl() {
        try {
          const u = new URL(window.location.href);
          u.searchParams.delete("cits");
          window.history.replaceState({}, "", u.pathname + u.search + u.hash);
        } catch {
          /* ignore */
        }
      }

      function isCitsSaskanotsTypeName(name) {
        const n = String(name || "");
        return (
          /cits\s*\(\s*saskaņots\s*\)/i.test(n) ||
          /cits\s*\(\s*ar\s+saskaņojumu\s*\)/i.test(n)
        );
      }

      /** p.i. ir spēkā tikai norādītajā datumu intervālā (ieskaitot galējās dienas); tukši datumi = bez gala. */
      function effectiveDeputyUserId(rawId, validFrom, validTo) {
        if (!rawId) return null;
        const today = new Date().toISOString().slice(0, 10);
        if (validFrom && today < validFrom) return null;
        if (validTo && today > validTo) return null;
        return rawId;
      }

      async function fetchAbsenceFormUsers(supabaseClient, options) {
        const { localMode, localUser } = options;
        if (localMode) return localUser ? [localUser] : [];
        if (!supabaseClient) return [];
        const r = await supabaseClient
          .from("users")
          .select("*")
          .order(COL_USER_NAME, { ascending: true });
        if (r.error) {
          console.error(r.error);
          return [];
        }
        return r.data ?? [];
      }

      function getLocalCitsRequests() {
        return JSON.parse(localStorage.getItem(LS_LOCAL_CITS) || "[]");
      }

      function setLocalCitsRequests(rows) {
        localStorage.setItem(LS_LOCAL_CITS, JSON.stringify(rows));
      }

      function resolveNotifyEmail(teamUsers, deputyUserId) {
        if (deputyUserId && teamUsers?.length) {
          const d = teamUsers.find((u) => String(u.id) === String(deputyUserId));
          const em = userImail(d);
          if (em) return em;
        }
        return DEFAULT_MANAGER_EMAIL;
      }

      /** Gaidošo akceptu / Cits apstiprinājums: vadītājs, admin vai aktīvais Prombūtnes apstiprinātājs. */
      function userCanApproveAbsences(profileRole, sessionUserId, deputyUserId) {
        if (profileRole === "manager" || profileRole === "admin") return true;
        if (
          deputyUserId &&
          sessionUserId &&
          String(deputyUserId) === String(sessionUserId)
        )
          return true;
        return false;
      }

      function isLocalMode() {
        return !configured();
      }

      function localDisplayName() {
        if (TIKAI_VIENKARSI_SKATS) {
          return sessionStorage.getItem(LS_LOCAL_NAME) || "Komanda";
        }
        return sessionStorage.getItem(LS_LOCAL_NAME) || "PDD lietotājs";
      }

      function ensureLocalTypes() {
        if (localStorage.getItem(LS_TYPES)) return;
        const seed = [
          { id: 1, name: "Atvaļinājums", color: "#2563eb", sort_order: 1 },
          { id: 2, name: "Papildatvaļinājums", color: "#7c3aed", sort_order: 2 },
          { id: 3, name: "Komandējums", color: "#0891b2", sort_order: 3 },
          { id: 4, name: "Mācības", color: "#059669", sort_order: 4 },
          { id: 5, name: "Slimības lapa", color: "#dc2626", sort_order: 5 },
          { id: 6, name: "Neapmaksāta prombūtne", color: "#ca8a04", sort_order: 6 },
          { id: 7, name: "Cits (ar saskaņojumu)", color: "#64748b", sort_order: 7 },
        ];
        localStorage.setItem(LS_TYPES, JSON.stringify(seed));
      }

      function getLocalTypes() {
        ensureLocalTypes();
        return JSON.parse(localStorage.getItem(LS_TYPES) || "[]");
      }

      function getLocalAbsences() {
        return JSON.parse(localStorage.getItem(LS_ABS) || "[]");
      }

      function setLocalAbsences(rows) {
        localStorage.setItem(LS_ABS, JSON.stringify(rows));
      }

      function localSessionActive() {
        return sessionStorage.getItem(LS_LOCAL_OK) === "1";
      }

      function LocalPasswordScreen() {
        const [pw, setPw] = useState("");
        const [name, setName] = useState(() => sessionStorage.getItem(LS_LOCAL_NAME) || "");
        const [err, setErr] = useState(null);
        function submit(e) {
          e.preventDefault();
          setErr(null);
          if (pw !== PAGAIDU_PAROLE) {
            setErr("Nepareiza parole.");
            return;
          }
          sessionStorage.setItem(LS_LOCAL_OK, "1");
          if (name.trim()) sessionStorage.setItem(LS_LOCAL_NAME, name.trim());
          location.reload();
        }
        return html`
          <div class="auth-box" style=${{ maxWidth: "420px" }}>
            <h1>PDD — ieeja</h1>
            <p class="app-sub">Pagaidu režīms: dati tikai šajā pārlūkā.</p>
            <form class="stack" onSubmit=${submit}>
              <div class="field">
                <label for="loc-name">Vārds (kalendāram)</label>
                <input
                  id="loc-name"
                  class="input"
                  value=${name}
                  onChange=${(ev) => setName(ev.target.value)}
                  placeholder="Piemēram, Jānis"
                  autoComplete="name"
                />
              </div>
              <div class="field">
                <label for="loc-pw">Parole</label>
                <input
                  id="loc-pw"
                  type="password"
                  class="input"
                  value=${pw}
                  onChange=${(ev) => setPw(ev.target.value)}

      function useSession() {
        const [session, setSession] = useState(null);
        const [loading, setLoading] = useState(true);
        useEffect(() => {
          if (TIKAI_VIENKARSI_SKATS) {
            setSession({ user: { id: LOCAL_USER_ID, email: "local@pdd" } });
            setLoading(false);
            return;
          }
          if (isLocalMode()) {
            if (localSessionActive()) {
              setSession({ user: { id: LOCAL_USER_ID, email: "demo@local" } });
            } else {
              setSession(null);
            }
            setLoading(false);
            return;
          }
          if (!supabase) {
            setLoading(false);
            return;
          }
          let cancelled = false;
          supabase.auth.getSession().then(({ data }) => {
            if (!cancelled) {
              setSession(data.session);
              setLoading(false);
            }
          });
          const { data } = supabase.auth.onAuthStateChange((_e, next) => setSession(next));
          return () => {
            cancelled = true;
            data.subscription.unsubscribe();
          };
        }, []);
        return { session, loading };
      }

      function useProfile(userId) {
        const [profile, setProfile] = useState(null);
        const [loading, setLoading] = useState(Boolean(userId));
        useEffect(() => {
          if (!userId) {
            setProfile(null);
            setLoading(false);
            return;
          }
          if (isLocalMode()) {
            const ln = localDisplayName();
            setProfile({
              id: LOCAL_USER_ID,
              full_name: ln,
              [COL_USER_NAME]: ln,
              [COL_USER_IMAIL]: "demo@local",
              [COL_USER_AMATS]: "",
              email: null,
              role: "manager",
              created_at: null,
            });
            setLoading(false);
            return;
          }
          if (!supabase) {
            setProfile(null);
            setLoading(false);
            return;
          }
          let cancelled = false;
          setLoading(true);
          supabase
            .from("users")
            .select("*")
            .eq("id", userId)
            .maybeSingle()
            .then(({ data, error }) => {
              if (!cancelled) {
                if (error) console.error(error);
                setProfile(data ?? null);
                setLoading(false);
              }
            });
          return () => {
            cancelled = true;
          };
        }, [userId]);
        return { profile, loading };
      }

      /** Lietotājam — īsas ziņas latviski; tehniskās detaļas tikai konsolē ([auth]). */
      function authUserMessage(raw) {
        const m = raw ? String(raw).toLowerCase() : "";
        if (/signups not allowed|signup.*disabled|email signups.*disabled/i.test(m)) {
          console.error("[auth]", raw);
          return "Jaunu kontu reģistrācija šajā vidē ir izslēgta. Izmanto „Ieiet”, ja konts jau izveidots, vai sazinies ar administratoru.";
        }
        if (
          /invalid api key|invalid api|invalid jwt|jwt expired|malformed|apikey|401|403 forbidden|failed to fetch|network|load failed|err_network/i.test(
            m
          )
        ) {
          console.error("[auth]", raw);
          return (
            "Neizdevās savienoties ar datu serveri. Mēģini vēlāk vai ziņo administratoram. " +
            "Ja uzturi lapu: pārlūkā atver izstrādātāja rīkus (F12) → Console — tur ir ieraksts [auth]; bieži vaina ir nepareizā publiskajā atslēgā, citā projekta adresē, pauzētā projektā vai nepareizā vietnes adresē e-pasta apstiprinājumam."
          );
        }
        if (/invalid login|invalid credentials|wrong password|email not confirmed|email address not confirmed/i.test(m)) {
          if (/email not confirmed|not confirmed/i.test(m)) {
            return "Lūdzu vispirms apstiprini e-pastu — atver vēstuli un spied uz saites, tad mēģini ielogoties.";
          }
          return "Nepareizs e-pasts vai parole, vai konts vēl nav apstiprināts.";
        }
        if (/user already registered|already been registered|already exists/i.test(m)) {
          return "Šim e-pastam konts jau pastāv. Izmanto „Ieiet”.";
        }
        if (/password|weak|least.*6|6 characters/i.test(m)) {
          return "Parolei jābūt vismaz 6 rakstzīmēm.";
        }
        if (/rate limit|too many requests/i.test(m)) {
          return "Pārāk daudz mēģinājumu. Uzgaidi brīdi un mēģini vēlreiz.";
        }
        console.warn("[auth]", raw);
        return "Neizdevās. Mēģini vēlreiz.";
      }

      const dow = ["P", "O", "T", "C", "P", "S", "Sv"];
      function dayKey(d) {
        return format(d, "yyyy-MM-dd");
      }
      function hexToRgb(hex) {
        const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(String(hex || "").trim());
        if (!m) return { r: 100, g: 116, b: 139 };
        return { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) };
      }
      /** Katram prombūtnes veidam sava krāsa; statusam — kontūra (gaida / noraidīts). */
      function chipStyle(a) {
        const raw = a.type?.color ?? "#64748b";
        const tc = String(raw).startsWith("#") ? raw : "#64748b";
        const { r, g, b } = hexToRgb(tc);
        const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
        const fg = luminance > 0.55 ? "#0f172a" : "#f8fafc";
        if (a.status === "approved") return { background: tc, color: fg };
        if (a.status === "rejected")
          return {
            background: tc,
            color: fg,
            opacity: 0.9,
            boxShadow: "inset 0 0 0 2px rgba(153,27,27,0.95)",
            textDecoration: "line-through",
          };
        return {
          background: tc,
          color: fg,
          opacity: 0.9,
          boxShadow: "inset 0 0 0 2px rgba(217,119,6,0.95)",
        };
      }

      function AbsenceCalendar({ month, onMonthChange, absences, caption, onPickAbsence }) {
        const start = startOfWeek(startOfMonth(month), { weekStartsOn: 1 });
        const end = endOfWeek(endOfMonth(month), { weekStartsOn: 1 });
        const days = eachDayOfInterval({ start, end });
        const entriesForDay = (d) => {
          const key = dayKey(d);
          return absences.filter((a) => key >= a.start_date && key <= a.end_date);
        };
        const title = format(month, "LLLL yyyy", { locale: lv });
        return html`
          <div class="cal-wrap">
            <div class="cal-head">
              <button type="button" class="btn btn-small btn-ghost" onClick=${() => onMonthChange(addMonths(month, -1))}>
                ←
              </button>
              <strong style=${{ textTransform: "capitalize" }}>${title}</strong>
              <button type="button" class="btn btn-small btn-ghost" onClick=${() => onMonthChange(addMonths(month, 1))}>
                →
              </button>
            </div>
            ${caption
              ? html`<p style=${{ margin: "0 0 0.5rem", fontSize: "0.8rem", color: "var(--muted)", lineHeight: 1.35 }}>${caption}</p>`
              : null}
            <div class="cal-grid">
              ${dow.map(
                (l, i) => html`
                  <div key=${`dow-${i}`} class="cal-dow">${l}</div>
                `
              )}
              ${days.map((d) => {
                const inMonth = isSameMonth(d, month);
                const items = entriesForDay(d);
                return html`
                  <div
                    key=${d.toISOString()}
                    class=${`cal-cell ${!inMonth ? "cal-cell-out" : ""} ${isToday(d) ? "cal-cell-today" : ""}`}
                  >
                    <div class="cal-day-num">${format(d, "d")}</div>
                    ${items.map((a) => html`
                      <span
                        key=${a.id}
                        role="button"
                        tabindex="0"
                        class="cal-chip"
                        style=${chipStyle(a)}
                        title=${[
                          userDisplayName(a.employee) !== "—" ? userDisplayName(a.employee) : "Darbinieks",
                          a.type?.name ?? "",
                          a.status,
                          a.comment
                            ? `Komentārs: ${String(a.comment).replace(/"/g, "'")}`
                            : "",
                          onPickAbsence ? "Spied, lai atvērtu vēsturē" : "",
                        ]
                          .filter(Boolean)
                          .join(" — ")}
                        onClick=${(ev) => {
                          ev.stopPropagation();
                          onPickAbsence?.(a);
                        }}
                        onKeyDown=${(ev) => {
                          if (ev.key === "Enter" || ev.key === " ") {
                            ev.preventDefault();
                            onPickAbsence?.(a);
                          }
                        }}
                      >
                        ${(userDisplayName(a.employee).split(" ")[0] !== "—"
                          ? userDisplayName(a.employee).split(" ")[0]
                          : "?") +
                          " · " +
                          (a.type?.name ?? "")}
                      </span>
                    `)}
                  </div>
                `;
              })}
            </div>
          </div>
        `;
      }

                <select
                  id="employee"
                  class="select"
                  required
                  disabled=${!isManager}
                  value=${selectedUserId}
                  onChange=${(ev) => setSelectedUserId(ev.target.value)}
                >
                  <option value="">Izvēlies darbinieku</option>
                  ${users.map(
                    (u) => html`
                      <option key=${u.id} value=${u.id}>${formatUserSelectLabel(u)}</option>
                    `
                  )}
                </select>
                ${!isManager
                  ? html`<span style=${{ fontSize: "0.78rem", color: "var(--muted)" }}
                    >Tikai savs konts. Vadītājs var iesniegt arī citiem.</span
                  >`
                  : null}
              </div>
              <div class="field">
                <label for="ptype">Veids</label>
                <select
                  id="ptype"
                  class="select"
                  required
                  value=${typeId}
                  onChange=${(ev) => setTypeId(ev.target.value)}
                >
                  <option value="">Izvēlies veidu</option>
                  ${types.map(
                    (t) => html`
                      <option key=${t.id} value=${t.id}>${t.name}</option>
                    `
                  )}
                </select>
              </div>
              <div class="row" style=${{ gap: "0.75rem" }}>
                <div class="field" style=${{ flex: "1 1 140px" }}>
                  <label for="pstart">No</label>
                  <input
                    id="pstart"
                    type="date"
                    class="input"
                    required
                    value=${startDate}
                    onChange=${(ev) => setStartDate(ev.target.value)}
                  />
                </div>
                <div class="field" style=${{ flex: "1 1 140px" }}>
                  <label for="pend">Līdz</label>
                  <input
                    id="pend"
                    type="date"
                    class="input"
                    required
                    value=${endDate}
                    onChange=${(ev) => setEndDate(ev.target.value)}
                  />
                </div>
              </div>
              <div class="field">
                <label for="pcom">Komentārs</label>
                <textarea
                  id="pcom"
                  class="textarea"
                  placeholder="Nav obligāts"
                  value=${comment}
                  onChange=${(ev) => setComment(ev.target.value)}
                />
              </div>
              <button type="submit" class="btn btn-primary" disabled=${busy}>
                ${busy ? "Sūta…" : "Iesniegt"}
              </button>
            </form>
          </div>
        `;
      }

      /** Izvēlnēm: kā DB — Vārds uzvārds, i-mail, loma. */
      function formatUserSelectLabel(u) {
        const name = userDisplayName(u);
        const em = userImail(u);
        const role = u?.role && u.role !== "employee" ? ` · ${u.role}` : "";
        if (em) return `${name} — ${em}${role}`;
        return `${name}${role} (nav e-pasta)`;
      }

      // Komandas lietotāji: parādām tikai Vārds uzvārds, e-pasts un Amats.
      // Atbilstoši migrācijām `i-mail` tiek sinhronizēts no auth email (`users.email`),
      // bet UI mēs to rādām kā "e-pasts".
      const USER_TABLE_COL_DEFS = [
        { key: COL_USER_NAME, label: "Vārds uzvārds" },
        { key: COL_USER_IMAIL, label: "e-pasts" },
        { key: COL_USER_AMATS, label: "Amats" },
      ];

      function teamUsersTableColumns(_users) {
        const labels = Object.fromEntries(USER_TABLE_COL_DEFS.map((c) => [c.key, c.label]));
        const cols = USER_TABLE_COL_DEFS.map((c) => c.key);
        return { cols, labels };
      }

      function formatUserTableCell(key, val) {
        if (val == null || val === "") return "—";
        if ((key === "email" || key === COL_USER_IMAIL) && String(val).includes("@")) return String(val);
        if (typeof val === "string" && /^\d{4}-\d{2}-\d{2}T/.test(val)) {
          return val.replace("T", " ").slice(0, 19);
        }
        return String(val);
      }

      function buildUserRowPayload(vardUzv, imail, amats, role) {
        const v = String(vardUzv ?? "").trim();
        const i = String(imail ?? "").trim();
        const a = String(amats ?? "").trim();
        return {
          [COL_USER_NAME]: v || null,
          [COL_USER_IMAIL]: i || null,
          [COL_USER_AMATS]: a || null,
          role,
          full_name: v || null,
          email: i || null,
        };
      }

      function isValidUuid(s) {
        return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(
          String(s || "").trim()
        );
      }

      function TeamUsersDirectory({ users, canAdmin, currentUserId, onReload }) {
        const { cols, labels } = teamUsersTableColumns(users);
        const colCount = Math.max(cols.length, 1) + (canAdmin ? 1 : 0);
        const [page, setPage] = useState(0);
        const [editing, setEditing] = useState(null);
        const [form, setForm] = useState({
          vardUzv: "",
          imail: "",
          amats: "",
          role: "employee",
        });
        const [addOpen, setAddOpen] = useState(false);
        const [addForm, setAddForm] = useState({
          id: "",
          vardUzv: "",
          imail: "",
          amats: "",
          role: "employee",
        });
        const [busy, setBusy] = useState(false);
        const [delId, setDelId] = useState(null);
        const isLocalTeams = TIKAI_VIENKARSI_SKATS || !supabase;
        const currentUser = (users ?? []).find((u) => String(u.id) === String(currentUserId)) ?? (users ?? [])[0];
        const currentEmail = currentUser?.email ?? userImail(currentUser);
        const [chatToId, setChatToId] = useState(null);
        const [chatText, setChatText] = useState("");
        const [chatMsgs, setChatMsgs] = useState([]);
        const total = users?.length ?? 0;
        const totalPages = Math.max(1, Math.ceil(total / TEAM_PAGE_SIZE) || 1);
        const safePage = Math.min(page, totalPages - 1);
        const pagedUsers = (users ?? []).slice(
          safePage * TEAM_PAGE_SIZE,
          safePage * TEAM_PAGE_SIZE + TEAM_PAGE_SIZE
        );
        const rowFrom = total ? safePage * TEAM_PAGE_SIZE + 1 : 0;
        const rowTo = total ? Math.min(total, (safePage + 1) * TEAM_PAGE_SIZE) : 0;
        useEffect(() => {
          const tp = Math.max(1, Math.ceil((users?.length ?? 0) / TEAM_PAGE_SIZE) || 1);
          setPage((p) => Math.min(p, tp - 1));
        }, [users?.length]);

        useEffect(() => {
          if (!isLocalTeams) return;
          if (!users || users.length === 0) return;
          if (chatToId) return;
          const others = (users ?? []).filter((u) => String(u.id) !== String(currentUserId));
          const first = others[0] ?? null;
          if (first?.id) setChatToId(first.id);
        }, [isLocalTeams, users?.length, currentUserId, chatToId]);

        useEffect(() => {
          if (!isLocalTeams) return;
          if (!chatToId || !currentEmail) return;
          const toUser = (users ?? []).find((u) => String(u.id) === String(chatToId));
          const toEmail = toUser?.email ?? userImail(toUser);
          if (!toEmail) return;
          const key = window.KOMANDA?.conversationKey?.(currentEmail, toEmail) ?? "";
          if (!key) return;
          setChatMsgs(window.KOMANDA?.loadMessages?.(key) ?? []);
        }, [isLocalTeams, chatToId, currentEmail, users]);

        function sendChat() {
          if (!isLocalTeams) return;
          const toUser = (users ?? []).find((u) => String(u.id) === String(chatToId));
          const toEmail = toUser?.email ?? userImail(toUser);
          const text = String(chatText || "").trim();
          if (!toEmail || !text || !currentEmail) return;
          const msg = window.KOMANDA?.addMessage?.({
            fromEmail: currentEmail,
            toEmail,
            text,
            ts: new Date().toISOString(),
          });
          if (!msg) return;
          setChatText("");
          const key = window.KOMANDA?.conversationKey?.(currentEmail, toEmail) ?? "";
          if (!key) return;
          setChatMsgs(window.KOMANDA?.loadMessages?.(key) ?? []);
        }
        function openEdit(u) {
          setEditing(u.id);
          setForm({
            vardUzv: u[COL_USER_NAME] ?? u.full_name ?? "",
            imail: userImail(u),
            amats: u[COL_USER_AMATS] ?? "",
            role: u.role ?? "employee",
          });
        }
        async function saveEdit(e) {
          e.preventDefault();
          if (!editing) return;
          setBusy(true);
          try {
            const payload = buildUserRowPayload(form.vardUzv, form.imail, form.amats, form.role);
            if (TIKAI_VIENKARSI_SKATS || !supabase) {
              window.KOMANDA?.upsertTeamUser?.({ id: editing, ...payload });
              setEditing(null);
              await onReload();
              return;
            }
            const { error } = await supabase.from("users").update(payload).eq("id", editing);
            if (error) {
              alert(error.message);
              return;
            }
            setEditing(null);
            await onReload();
          } finally {
            setBusy(false);
          }
        }
        async function saveAdd(e) {
          e.preventDefault();
          const isLocal = TIKAI_VIENKARSI_SKATS || !supabase;
          const id = isLocal ? (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now())) : addForm.id.trim();
          if (!isLocal && !isValidUuid(id)) {
            alert("Lietotāja ID jābūt derīgam UUID (Supabase → Authentication → Users).");
            return;
          }
          setBusy(true);
          try {
            const payload = buildUserRowPayload(addForm.vardUzv, addForm.imail, addForm.amats, addForm.role);
            if (isLocal) {
              window.KOMANDA?.upsertTeamUser?.({ id, ...payload });
              setAddOpen(false);
              setAddForm({ id: "", vardUzv: "", imail: "", amats: "", role: "employee" });
              await onReload();
              return;
            }
            const { error } = await supabase.from("users").insert({ id, ...payload });
            if (error) {
              alert(error.message);
              return;
            }
            setAddOpen(false);
            setAddForm({ id: "", vardUzv: "", imail: "", amats: "", role: "employee" });
            await onReload();
          } finally {
            setBusy(false);
          }
        }
        async function confirmDelete() {
          if (!delId) return;
          setBusy(true);
          try {
            if (TIKAI_VIENKARSI_SKATS || !supabase) {
              window.KOMANDA?.deleteTeamUser?.(delId);
              setDelId(null);
              await onReload();
              return;
            }
            const { error } = await supabase.from("users").delete().eq("id", delId);
            if (error) {
              alert(error.message);
              return;
            }
            setDelId(null);
            await onReload();
          } finally {
            setBusy(false);
          }
        }
        return html`
          <div class="list-panel team-users-panel">
            <h2 style=${{ margin: "0 0 0.25rem", fontSize: "1rem" }}>Komandas lietotāji</h2>
            <p style=${{ margin: "0 0 0.5rem", fontSize: "0.8rem", color: "var(--muted)" }}>
              Dati no <code>public.users</code>. Sinhronizācija ar datubāzi — izmaiņas redzamas visiem (ieslēdz
              Supabase Realtime šīm tabulām: <code>users</code>, <code>prombutnes_dati</code>,
              <code>pdd_deputy_state</code>, <code>pdd_cits_requests</code>).
              ${canAdmin
                ? " Vadītājs var pievienot rindu tikai tad, ja lietotājs jau pastāv Authentication (tas pats UUID)."
                : ""}
            </p>
            ${canAdmin
              ? html`
                  <div class="row" style=${{ marginBottom: "0.65rem" }}>
                    <button type="button" class="btn btn-primary btn-small" onClick=${() => setAddOpen(!addOpen)}>
                      ${addOpen ? "Aizvērt formu" : "+ Pievienot lietotāju"}
                    </button>
                  </div>
                  ${addOpen
                    ? html`
                        <form class="stack" style=${{ marginBottom: "1rem", padding: "0.75rem", border: "1px solid var(--border)", borderRadius: "8px" }} onSubmit=${saveAdd}>
                          ${TIKAI_VIENKARSI_SKATS
                            ? null
                            : html`
                                <div class="field">
                                  <label>Lietotāja UUID (no Supabase Authentication)</label>
                                  <input
                                    class="input"
                                    required
                                    placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
                                    value=${addForm.id}
                                    onChange=${(ev) => setAddForm((f) => ({ ...f, id: ev.target.value }))}
                                  />
                                </div>
                              `}
                          <div class="field">
                            <label>Vārds uzvārds</label>
                            <input
                              class="input"
                              value=${addForm.vardUzv}
                              onChange=${(ev) => setAddForm((f) => ({ ...f, vardUzv: ev.target.value }))}
                            />
                          </div>
                          <div class="field">
                            <label>e-pasts</label>
                            <input
                              class="input"
                              type="email"
                              value=${addForm.imail}
                              onChange=${(ev) => setAddForm((f) => ({ ...f, imail: ev.target.value }))}
                            />
                          </div>
                          <div class="field">
                            <label>Amats</label>
                            <input
                              class="input"
                              value=${addForm.amats}
                              onChange=${(ev) => setAddForm((f) => ({ ...f, amats: ev.target.value }))}
                            />
                          </div>
                          <div class="field">
                            <label>Loma</label>
                            <select
                              class="select"
                              value=${addForm.role}
                              onChange=${(ev) => setAddForm((f) => ({ ...f, role: ev.target.value }))}
                            >
                              <option value="employee">employee</option>
                              <option value="manager">manager</option>
                              <option value="admin">admin</option>
                            </select>
                          </div>
                          <button type="submit" class="btn btn-primary btn-small" disabled=${busy}>Saglabāt DB</button>
                        </form>
                      `
                    : null}
                `
              : null}
            <div class="table-wrap">
              <table class="team-table">
                <thead>
                  <tr>
                    ${cols.map((key) => html`<th key=${key}>${labels[key] ?? key}</th>`)}
                    ${canAdmin ? html`<th>Darbības</th>` : null}
                  </tr>
                </thead>
                <tbody>
                  ${users?.length
                    ? pagedUsers.map((u) => html`
                        <tr key=${u.id}>
                          ${cols.map((key) => {
                            const cellVal = key === COL_USER_IMAIL ? userImail(u) : u[key];
                            return html`<td key=${key}>${formatUserTableCell(key, cellVal)}</td>`;
                          })}
                          ${canAdmin
                            ? html`
                                <td>
                                  <div class="row" style=${{ gap: "0.25rem" }}>
                                    <button type="button" class="btn btn-ghost btn-small" onClick=${() => openEdit(u)}>
                                      Labot
                                    </button>
                                    <button
                                      type="button"
                                      class="btn btn-danger btn-small"
                                      disabled=${String(u.id) === String(currentUserId)}
                                      title=${String(u.id) === String(currentUserId) ? "Nevar dzēst pašam sev" : ""}
                                      onClick=${() => setDelId(u.id)}
                                    >
                                      Dzēst
                                    </button>
                                  </div>
                                </td>
                              `
                            : null}
                        </tr>
                      `)
                    : html`
                        <tr>
                          <td colspan=${colCount}>Nav datu.</td>
                        </tr>
                      `}
                </tbody>
              </table>
            </div>
            ${isLocalTeams
              ? html`
                  <div class="list-panel" style=${{
                    marginTop: "0.9rem",
                    padding: "0.9rem",
                  }}>
                    <h2 style=${{ margin: "0 0 0.6rem", fontSize: "1rem" }}>Ziņu apmaiņa</h2>
                    <div class="row" style=${{ marginBottom: "0.6rem", gap: "0.75rem" }}>
                      <div class="field" style=${{ flex: "1 1 280px" }}>
                        <label>Adresāts</label>
                        <select
                          class="select"
                          value=${chatToId ?? ""}
                          onChange=${(ev) => setChatToId(ev.target.value || null)}
                        >
                          ${(
                            users ?? []
                          ).filter((u) => String(u.id) !== String(currentUserId)).map((u) => {
                            const em = u.email ?? userImail(u);
                            return html`<option key=${u.id} value=${u.id}>${u["Vārds uzvārds"] ?? u.full_name ?? "—"} · ${em}</option>`;
                          })}
                        </select>
                      </div>
                    </div>

                    <div
                      style=${{
                        maxHeight: "220px",
                        overflow: "auto",
                        padding: "0.6rem",
                        background: "var(--bg)",
                        border: "1px solid var(--border)",
                        borderRadius: "10px",
                        marginBottom: "0.6rem",
                      }}
                    >
                      ${
                        chatMsgs.length === 0
                          ? html`<p style=${{ margin: 0, color: "var(--muted)", fontStyle: "italic" }}>Nav ziņu.</p>`
                          : chatMsgs.map((m) => {
                              const isMe = m.fromEmail === currentEmail;
                              return html`
                                <div style=${{
                                  marginBottom: "0.55rem",
                                  textAlign: isMe ? "right" : "left",
                                }}>
                                  <div style=${{
                                    fontSize: "0.78rem",
                                    color: "var(--muted)",
                                    marginBottom: "0.15rem",
                                  }}>
                                    ${isMe ? "Tu" : "No"}: ${m.fromEmail}
                                  </div>
                                  <div style=${{
                                    display: "inline-block",
                                    padding: "0.45rem 0.6rem",
                                    borderRadius: "10px",
                                    background: isMe ? "rgba(56,189,248,0.16)" : "rgba(148,163,184,0.10)",
                                    border: `1px solid ${isMe ? "rgba(56,189,248,0.35)" : "var(--border)"}`,
                                    whiteSpace: "pre-wrap",
                                  }}>
                                    ${m.text}
                                  </div>
                                  <div style=${{
                                    fontSize: "0.7rem",
                                    color: "var(--muted)",
                                    marginTop: "0.15rem",
                                  }}>
                                    ${m.ts ? String(m.ts).replace("T", " ").slice(0, 16) : ""}
                                  </div>
                                </div>
                              `;
                            })
                      }
                    </div>

                    <div class="stack">
                      <textarea
                        class="textarea"
                        value=${chatText}
                        onChange=${(ev) => setChatText(ev.target.value)}
                        placeholder="Ieraksti ziņu…"
                      />
                      <div class="row" style=${{ justifyContent: "flex-end" }}>
                        <button type="button" class="btn btn-primary" disabled=${!chatText || !chatToId} onClick=${sendChat}>
                          Sūtīt
                        </button>
                      </div>
                    </div>
                  </div>
                `
              : null}
            ${total > TEAM_PAGE_SIZE
              ? html`
                  <div
                    class="row"
                    style=${{ justifyContent: "space-between", alignItems: "center", marginTop: "0.65rem", flexWrap: "wrap", gap: "0.5rem" }}
                  >
                    <span style=${{ fontSize: "0.82rem", color: "var(--muted)" }}>
                      Rindas ${rowFrom}–${rowTo} no ${total} · lapa ${safePage + 1} / ${totalPages}
                    </span>
                    <div class="row" style=${{ gap: "0.35rem" }}>
                      <button
                        type="button"
                        class="btn btn-ghost btn-small"
                        disabled=${safePage <= 0 || busy}
                        onClick=${() => setPage((p) => Math.max(0, p - 1))}
                      >
                        Iepriekšējā
                      </button>
                      <button
                        type="button"
                        class="btn btn-ghost btn-small"
                        disabled=${safePage >= totalPages - 1 || busy}
                        onClick=${() => setPage((p) => Math.min(totalPages - 1, p + 1))}
                      >
                        Nākamā
                      </button>
                    </div>
                  </div>
                `
              : total
                ? html`<p style=${{ margin: "0.55rem 0 0", fontSize: "0.82rem", color: "var(--muted)" }}>Kopā ${total} rindas.</p>`
                : null}
            ${editing
              ? html`
                  <div
                    style=${{
                      position: "fixed",
                      inset: 0,
                      background: "rgba(0,0,0,0.45)",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      zIndex: 50,
                      padding: "1rem",
                    }}
                    onClick=${() => setEditing(null)}
                  >
                    <div class="list-panel" style=${{ maxWidth: "400px", width: "100%" }} onClick=${(ev) => ev.stopPropagation()}>
                      <h3 style=${{ margin: "0 0 0.65rem", fontSize: "1rem" }}>Labot lietotāju</h3>
                      <form class="stack" onSubmit=${saveEdit}>
                        <div class="field">
                          <label>Vārds uzvārds</label>
                          <input
                            class="input"
                            value=${form.vardUzv}
                            onChange=${(ev) => setForm((f) => ({ ...f, vardUzv: ev.target.value }))}
                          />
                        </div>
                        <div class="field">
                            <label>e-pasts</label>
                          <input
                            class="input"
                            type="email"
                            value=${form.imail}
                            onChange=${(ev) => setForm((f) => ({ ...f, imail: ev.target.value }))}
                          />
                        </div>
                        <div class="field">
                          <label>Amats</label>
                          <input
                            class="input"
                            value=${form.amats}
                            onChange=${(ev) => setForm((f) => ({ ...f, amats: ev.target.value }))}
                          />
                        </div>
                        <div class="field">
                          <label>Loma</label>
                          <select
                            class="select"
                            value=${form.role}
                            onChange=${(ev) => setForm((f) => ({ ...f, role: ev.target.value }))}
                          >
                            <option value="employee">employee</option>
                            <option value="manager">manager</option>
                            <option value="admin">admin</option>
                          </select>
                        </div>
                        <div class="row">
                          <button type="submit" class="btn btn-primary btn-small" disabled=${busy}>Saglabāt</button>
                          <button type="button" class="btn btn-ghost btn-small" onClick=${() => setEditing(null)}>
                            Atcelt
                          </button>
                        </div>
                      </form>
                    </div>
                  </div>
                `
              : null}
            ${delId
              ? html`
                  <div
                    style=${{
                      position: "fixed",
                      inset: 0,
                      background: "rgba(0,0,0,0.45)",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      zIndex: 50,
                      padding: "1rem",
                    }}
                    onClick=${() => setDelId(null)}
                  >
                    <div class="list-panel" style=${{ maxWidth: "380px", width: "100%" }} onClick=${(ev) => ev.stopPropagation()}>
                      <p style=${{ margin: "0 0 0.75rem" }}>
                        Dzēst ierakstu no <code>users</code>? Auth konts paliek — vajadzības gadījumā dzēš arī no
                        Supabase Authentication.
                      </p>
                      <div class="row">
                        <button type="button" class="btn btn-danger btn-small" disabled=${busy} onClick=${confirmDelete}>
                          Jā, dzēst
                        </button>
                        <button type="button" class="btn btn-ghost btn-small" onClick=${() => setDelId(null)}>Nē</button>
                      </div>
                    </div>
                  </div>
                `
              : null}
          </div>
        `;
      }

      function DeputyDelegePanel({
        teamUsers,
        deputyUserId,
        deputyValidFrom,
        deputyValidTo,
        onDeputyChange,
        currentUserId,
      }) {
        const [sel, setSel] = useState(() => (deputyUserId ? String(deputyUserId) : DEPUTY_OPT_MANAGER));
        const [periodFrom, setPeriodFrom] = useState(deputyValidFrom ?? "");
        const [periodTo, setPeriodTo] = useState(deputyValidTo ?? "");
        const [busy, setBusy] = useState(false);
        const [msg, setMsg] = useState(null);
        useEffect(() => {
          setSel(deputyUserId ? String(deputyUserId) : DEPUTY_OPT_MANAGER);
          setPeriodFrom(deputyValidFrom ?? "");
          setPeriodTo(deputyValidTo ?? "");
        }, [deputyUserId, deputyValidFrom, deputyValidTo]);
        async function persist(nextId, fromStr, toStr) {
          setBusy(true);
          setMsg(null);
          try {
            if (isLocalMode()) {
              if (nextId) localStorage.setItem(LS_LOCAL_DEPUTY_USER_ID, nextId);
              else localStorage.removeItem(LS_LOCAL_DEPUTY_USER_ID);
              if (fromStr) localStorage.setItem(LS_LOCAL_DEPUTY_FROM, fromStr);
              else localStorage.removeItem(LS_LOCAL_DEPUTY_FROM);
              if (toStr) localStorage.setItem(LS_LOCAL_DEPUTY_TO, toStr);
              else localStorage.removeItem(LS_LOCAL_DEPUTY_TO);
              await onDeputyChange();
              setMsg(
                nextId
                  ? "Apstiprinātājs un periods saglabāti (vietējais režīms)."
                  : "Atiestatīts uz pamatvadītāju (vietējais režīms)."
              );
              return;
            }
            const { error } = await supabase
              .from("pdd_deputy_state")
              .update({
                deputy_user_id: nextId,
                deputy_valid_from: fromStr || null,
                deputy_valid_to: toStr || null,
                updated_by: currentUserId,
                updated_at: new Date().toISOString(),
              })
              .eq("id", 1);
            if (error) {
              setMsg(error.message);
              return;
            }
            await onDeputyChange();
            setMsg(
              nextId
                ? "Apstiprinātājs saglabāts — apstiprinājumi un „Cits (ar saskaņojumu)” uz izvēlētā e-pastu norādītajā periodā."
                : "Atiestatīts uz pamatvadītāju."
            );
          } finally {
            setBusy(false);
          }
        }
        async function saveForm(e) {
          e.preventDefault();
          const isMgrOpt = sel === DEPUTY_OPT_MANAGER;
          const nextId = isMgrOpt ? null : sel;
          const fromStr = isMgrOpt ? "" : periodFrom.trim();
          const toStr = isMgrOpt ? "" : periodTo.trim();
          if (!isMgrOpt) {
            if (!fromStr || !toStr) {
              alert("Apstiprinātāja termiņš ir obligāts: norādi datumus „no” un „līdz”.");
              return;
            }
            if (fromStr > toStr) {
              alert("Datums „no” nevar būt pēc „līdz”.");
              return;
            }
          }
          await persist(nextId, fromStr, toStr);
        }

              izvēlei obligāts derīguma periods. Pēc <code>līdz</code> datuma beigām sistēma automātiski atiestata uz

      function CitsPublicApprove({ token, onDone, sessionUserId, profileRole }) {
        const [preview, setPreview] = useState(null);
        const [err, setErr] = useState(null);
        const [busy, setBusy] = useState(false);
        const [deputyUserId, setDeputyUserId] = useState(null);
        const [deputyLoaded, setDeputyLoaded] = useState(false);
        useEffect(() => {
          if (isLocalMode() || !supabase || !sessionUserId) {
            setDeputyUserId(null);
            setDeputyLoaded(true);
            return;
          }
          let cancelled = false;
          setDeputyLoaded(false);
          supabase
            .from("pdd_deputy_state")
            .select("deputy_user_id, deputy_valid_from, deputy_valid_to")
            .eq("id", 1)
            .maybeSingle()
            .then(({ data, error }) => {
              if (cancelled) return;
              if (error) console.error(error);
              const eff = effectiveDeputyUserId(
                data?.deputy_user_id ?? null,
                data?.deputy_valid_from ?? null,
                data?.deputy_valid_to ?? null
              );
              setDeputyUserId(eff);
              setDeputyLoaded(true);
            });
          return () => {
            cancelled = true;
          };
        }, [sessionUserId]);
        const canApprove = isLocalMode()
          ? TIKAI_VIENKARSI_SKATS || localSessionActive()
          : Boolean(
              sessionUserId &&
                deputyLoaded &&
                userCanApproveAbsences(profileRole ?? "employee", sessionUserId, deputyUserId)
            );
        useEffect(() => {
          let cancelled = false;
          (async () => {
            if (!token) return;
            setErr(null);
            setPreview(null);
            if (isLocalMode()) {
              const rows = getLocalCitsRequests();
              const r = rows.find((x) => x.approval_token === token && x.status === "pending_manager");
              if (!r) {
                if (!cancelled) setErr("Nederīgs vai jau apstiprināts pieprasījums.");
                return;
              }
              if (!cancelled)
                setPreview({
                  start_date: r.start_date,
                  end_date: r.end_date,
                  employee_name: localDisplayName(),
                  comment: r.comment || "",
                  ok: true,
                });
              return;
            }
            if (!sessionUserId || !deputyLoaded) return;
            if (!userCanApproveAbsences(profileRole ?? "employee", sessionUserId, deputyUserId)) {
              if (!cancelled)
                setErr(
                  "Apstiprināt drīkst tikai vadītājs, administrators vai norādītais Prombūtnes apstiprinātājs. Ielogojies ar atbilstošu kontu."
                );
              return;
            }
            const { data, error } = await supabase.rpc("pdd_cits_preview", { p_token: token });
            if (cancelled) return;
            if (error) {
              setErr(error.message);
              return;
            }
            const row = Array.isArray(data) ? data[0] : data;
            if (!row?.ok) setErr("Nederīgs vai jau apstiprināts pieprasījums.");
            else setPreview(row);
          })();
          return () => {
            cancelled = true;
          };
        }, [token, sessionUserId, deputyLoaded, deputyUserId, profileRole]);
        async function approve() {
          if (!canApprove) {
            alert("Apstiprināt drīkst tikai vadītājs, administrators vai Prombūtnes apstiprinātājs.");
            return;
          }
          setBusy(true);
          try {
            if (isLocalMode()) {
              const rows = getLocalCitsRequests();
              const r = rows.find((x) => x.approval_token === token && x.status === "pending_manager");
              if (!r) {
                setErr("Nav atrasts.");
                return;
              }
              const types = getLocalTypes();
              const cits = types.find((t) => isCitsSaskanotsTypeName(t.name));
              if (!cits) {
                setErr("Nav veida „Cits (ar saskaņojumu)” lokālajos datos.");
                return;
              }
              const abs = getLocalAbsences();
              abs.push({
                id: crypto.randomUUID(),
                user_id: r.user_id,
                type_id: cits.id,
                start_date: r.start_date,
                end_date: r.end_date,
                comment: r.comment,
                status: "approved",
                created_at: new Date().toISOString(),
                approved_at: new Date().toISOString(),
              });
              setLocalAbsences(abs);
              setLocalCitsRequests(
                rows.map((x) =>
                  x.approval_token === token ? { ...x, status: "approved" } : x
                )
              );
              stripCitsFromUrl();
              onDone();
              return;
            }
            const { error } = await supabase.rpc("pdd_approve_cits_token", { p_token: token });
            if (error) {
              alert(error.message);
              return;
            }
            const { error: nErr } = await supabase.functions.invoke("notify-cits-applicant", {
              body: { p_token: token },
            });
            if (nErr) console.warn("[notify-cits-applicant]", nErr);
            stripCitsFromUrl();
            onDone();
          } finally {
            setBusy(false);
          }
        }
        return html`
          <div class="auth-box" style=${{ maxWidth: "480px" }}>
            <h1 style=${{ fontSize: "1.15rem" }}>„Cits (ar saskaņojumu)” — apstiprinājums</h1>
            ${err
              ? html`<p style=${{ color: "#f87171" }}>${err}</p>`
              : !preview
                ? html`<p style=${{ color: "var(--muted)" }}>${isLocalMode() || canApprove ? "Ielādē…" : "Pārbauda tiesības…"}</p>`
                : html`
                    <div class="stack" style=${{ gap: "0.5rem" }}>
                      <p><strong>${preview.employee_name}</strong></p>
                      <p style=${{ margin: 0, fontSize: "0.9rem" }}>
                        ${preview.start_date} — ${preview.end_date}
                      </p>
                      ${preview.comment
                        ? html`<p style=${{ margin: 0 }}>${preview.comment}</p>`
                        : null}
                      <button type="button" class="btn btn-primary" disabled=${busy || !canApprove} onClick=${approve}>
                        ${busy ? "…" : "Apstiprināt prombūtni"}
                      </button>
                      ${!canApprove && !isLocalMode()
                        ? html`<p style=${{ margin: 0, fontSize: "0.82rem", color: "var(--muted)" }}>
                            Tikai vadītājs, administrators vai Prombūtnes apstiprinātājs var apstiprināt.
                          </p>`
                        : null}
                    </div>
                  `}
            <button type="button" class="btn btn-ghost btn-small" style=${{ marginTop: "1rem" }} onClick=${onDone}>
              Aizvērt
            </button>
          </div>
        `;
      }

      function shortUuid(id) {
        const s = String(id || "");
        return s.length > 10 ? `${s.slice(0, 8)}…` : s || "—";
      }

      function formatDbTs(val) {
        if (val == null || val === "") return "—";
        const s = String(val);
        if (s.length >= 19 && /^\d{4}-\d{2}-\d{2}T/.test(s)) return s.replace("T", " ").slice(0, 19);
        return s;
      }

      function absenceStatusLv(st) {
        if (st === "pending") return "gaida";
        if (st === "approved") return "apstiprināts";
        if (st === "rejected") return "noraidīts";
        return st ?? "—";
      }
