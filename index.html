<!DOCTYPE html>
<html lang="lv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PDD — Pakalpojumu dizaina daļa; prombūtnes un darba plānošana" />
    <title>PDD aplikācija</title>
    <!--
      BEZ SERVERA: atver šo failu pārlūkā (file:///…) vai kopē uz jebkuru tīmekļa vietu.
      1) Tiešsaistei: <code>TIKAI_VIENKARSI_SKATS = false</code> un projekta URL + publiskā atslēga failā. Vietējā parole: <code>LocalPasswordScreen</code>. Ātra demo: <code>TIKAI_VIENKARSI_SKATS = true</code>.
      2) Palaižot no file:// dažās vecākās sistēmās bloķē trešo pušu moduļus — tad lieto
         to pašu failu caur https (piem. GitHub Pages) vai pārlūka iestatījumos atļauj file piekļuvi.
    -->
    <style>
      :root {
        color-scheme: light dark;
        --bg: #a4eed8;
        --surface:  #0a9297;
        --surface2: #32dd5d;
        --border: #0e5029;
        --text: #01171d;
        --muted: #020c1b;
        --accent: #5ae694;
        --accent-dim: #17c07f;
        --radius: 12px;
        font-family: "Segoe UI", system-ui, sans-serif;
        line-height: 1.5;
      }
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(1200px 600px at 10% -10%, #1e3a46 0%, transparent 55%),
          radial-gradient(900px 500px at 100% 0%, #134e4a 0%, transparent 50%), var(--bg);
        color: var(--text);
      }
      #root { min-height: 100vh; }
      button, input, select, textarea { font: inherit; }
      button { cursor: pointer; }
      .app-shell { max-width: 1200px; margin: 0 auto; padding: 1.25rem 1.25rem 3rem; }
      .app-header {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
      }
      .app-title { margin: 0; font-size: 1.35rem; font-weight: 600; }
      .app-sub { margin: 0.25rem 0 0; font-size: 0.9rem; color: var(--muted); }
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 1rem;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.1rem;
        text-align: left;
        transition: border-color 0.15s, transform 0.12s;
      }
      .card:hover { border-color: var(--accent-dim); transform: translateY(-1px); }
      .card h3 { margin: 0 0 0.35rem; font-size: 1rem; }
      .card p { margin: 0; font-size: 0.88rem; color: var(--muted); }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        padding: 0.45rem 0.9rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text);
      }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-primary {
        background: linear-gradient(180deg, #01102c, #01102c);
        border-color: #01102c;
        color: #fff;
      }
      .btn-ghost { background: transparent; }
      .btn-danger { background: #3f1515; border-color: #7f1d1d; color: #fecaca; }
      .btn-small { padding: 0.25rem 0.55rem; font-size: 0.8rem; }
      .field { display: flex; flex-direction: column; gap: 0.35rem; }
      .field label { font-size: 0.8rem; color: var(--muted); }
      .input, .select, .textarea {
        padding: 0.5rem 0.65rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
      }
      .textarea { min-height: 72px; resize: vertical; }
      .stack { display: flex; flex-direction: column; gap: 0.85rem; }
      .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
      .banner-warn {
        padding: 0.65rem 0.9rem;
        border-radius: 8px;
        background: #422006;
        border: 1px solid #854d0e;
        color: #fde68a;
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }
      .banner-deputy {
        padding: 0.65rem 0.9rem;
        border-radius: 8px;
        background: #450a0a;
        border: 1px solid #991b1b;
        color: #fecaca;
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }
      .cal-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem;
        overflow: auto;
      }
      .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(64px, 1fr));
        gap: 4px;
        min-width: 480px;
      }
      .cal-dow {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        text-align: center;
        padding: 0.25rem;
      }
      .cal-cell {
        min-height: 72px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        padding: 4px;
        font-size: 0.75rem;
      }
      .cal-cell-out { opacity: 0.45; }
      .cal-cell-today { outline: 1px solid var(--accent); }
      .cal-day-num { font-weight: 600; margin-bottom: 2px; }
      .cal-chip {
        display: block;
        border-radius: 4px;
        padding: 1px 4px;
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 0.65rem;
      }
      .list-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem;
      }
      .list-panel h2 { margin: 0 0 0.75rem; font-size: 1rem; }
      .abs-item {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.65rem;
        margin-bottom: 0.5rem;
        background: var(--bg);
      }
      .abs-item:last-child { margin-bottom: 0; }
      .badge {
        display: inline-block;
        font-size: 0.7rem;
        padding: 0.15rem 0.4rem;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .badge-pending { background: #422006; color: #fde68a; }
      .badge-approved { background: #064e3b; color: #a7f3d0; }
      .badge-rejected { background: #450a0a; color: #fecaca; }
      .auth-box {
        max-width: 380px;
        margin: 3rem auto;
        padding: 1.5rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }
      .auth-box h1 { margin: 0 0 1rem; font-size: 1.2rem; }
      .prombutnes-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(260px, 340px);
        gap: 1rem;
      }
      @media (max-width: 900px) {
        .prombutnes-grid { grid-template-columns: 1fr; }
      }
      code { background: var(--surface); padding: 0.1em 0.35em; border-radius: 4px; font-size: 0.9em; }
    </style>
  </head>
  <body>
    <noscript><p style="padding:1rem;font-family:system-ui">Ieslēdz JavaScript.</p></noscript>
    <div id="root"></div>

    <script type="module">
      import React, { useState, useEffect, useCallback, useMemo } from "https://esm.sh/react@19.0.0";
      import { createRoot } from "https://esm.sh/react-dom@19.0.0/client";
      import htm from "https://esm.sh/htm@3.1.1";
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2.49.1";
      import {
        format,
        addMonths,
        eachDayOfInterval,
        endOfMonth,
        endOfWeek,
        isSameMonth,
        isToday,
        startOfMonth,
        startOfWeek,
      } from "https://esm.sh/date-fns@4.1.0";
      import { lv } from "https://esm.sh/date-fns@4.1.0/locale/lv";

      // Vietējais režīms (bez API): parole un dati pārlūkā. Mainiet paroli šeit:
      const PAGAIDU_PAROLE = "pdd";
      const LOCAL_USER_ID = "local-user-1";
      const LS_LOCAL_OK = "pdd_local_ok";
      const LS_LOCAL_NAME = "pdd_local_display_name";
      const LS_ABS = "pdd_local_absences";
      const LS_TYPES = "pdd_local_types";
      const LS_LOCAL_CITS = "pdd_local_cits_requests";
      const LS_LOCAL_DEPUTY_USER_ID = "pdd_local_deputy_user_id";
      const DEFAULT_MANAGER_EMAIL = "katrina.jirgensone@vid.gov.lv";

      /** true: tūlīt moduļu skats. false: tiešsaistes konts (URL+atslēga failā) vai lokālā parole. */
      const TIKAI_VIENKARSI_SKATS = false;

      // Publisko atslēgu kopē: Supabase → Project Settings → API → anon public (ne service_role).
      // Ja atslēga „pazuda” pēc rediģēšanas — ielīmē to atkal šeit (viena rinda, sākas ar eyJ…).
      const FILE_SUPABASE_URL = "https://fdnkvecgqetmwilwolgt.supabase.co";
      const FILE_SUPABASE_ANON_KEY = "YOUR_ANON_KEY";

      const LS_URL = "pdd_supabase_url";
      const LS_KEY = "pdd_supabase_anon_key";

      function loadConfig() {
        const url = FILE_SUPABASE_URL.includes("YOUR_PROJECT")
          ? localStorage.getItem(LS_URL) || FILE_SUPABASE_URL
          : FILE_SUPABASE_URL;
        const key = FILE_SUPABASE_ANON_KEY.includes("YOUR_ANON")
          ? localStorage.getItem(LS_KEY) || FILE_SUPABASE_ANON_KEY
          : FILE_SUPABASE_ANON_KEY;
        return { url, key };
      }

      function normalizeProjectUrl(url) {
        return String(url || "")
          .trim()
          .replace(/\/+$/, "");
      }

      /** Projekta adrese: https://xxxx.supabase.co (bez liekām slīpsvītrām beigās). */
      function isValidSupabaseProjectUrl(url) {
        const u = normalizeProjectUrl(url);
        return /^https:\/\/[a-z0-9][a-z0-9-]*\.supabase\.co$/i.test(u);
      }

      /** Publiskā (anon) JWT atslēga — parasti gara, sākas ar eyJ, trīs segmenti. */
      function isValidSupabaseAnonKey(key) {
        const k = String(key || "").trim().replace(/\s+/g, "");
        if (k.length < 80 || !k.startsWith("eyJ")) return false;
        const parts = k.split(".");
        return parts.length === 3 && parts[0].length > 0 && parts[1].length > 0 && parts[2].length > 0;
      }

      function configured() {
        if (TIKAI_VIENKARSI_SKATS) return false;
        const { url, key } = loadConfig();
        const u = String(url || "");
        const k = String(key || "");
        if (!u || !k) return false;
        if (u.includes("YOUR_PROJECT") || k.includes("YOUR_ANON")) return false;
        if (!isValidSupabaseProjectUrl(u)) return false;
        if (!isValidSupabaseAnonKey(k)) return false;
        return true;
      }

      const html = htm.bind(React.createElement);
      const __cfg = loadConfig();
      const supabase = configured()
        ? createClient(normalizeProjectUrl(__cfg.url), String(__cfg.key).trim().replace(/\s+/g, ""))
        : null;

      function readCitsTokenFromUrl() {
        try {
          return new URL(window.location.href).searchParams.get("cits") || "";
        } catch {
          return "";
        }
      }

      function stripCitsFromUrl() {
        try {
          const u = new URL(window.location.href);
          u.searchParams.delete("cits");
          window.history.replaceState({}, "", u.pathname + u.search + u.hash);
        } catch {
          /* ignore */
        }
      }

      function isCitsSaskanotsTypeName(name) {
        return /cits\s*\(\s*saskaņots\s*\)/i.test(String(name || ""));
      }

      async function fetchAbsenceFormUsers(supabaseClient, options) {
        const { localMode, localUser } = options;
        if (localMode) return localUser ? [localUser] : [];
        if (!supabaseClient) return [];
        const r = await supabaseClient
          .from("users")
          .select("id, full_name, email")
          .order("full_name", { ascending: true });
        if (r.error) {
          console.error(r.error);
          return [];
        }
        return r.data ?? [];
      }

      function getLocalCitsRequests() {
        return JSON.parse(localStorage.getItem(LS_LOCAL_CITS) || "[]");
      }

      function setLocalCitsRequests(rows) {
        localStorage.setItem(LS_LOCAL_CITS, JSON.stringify(rows));
      }

      function resolveNotifyEmail(teamUsers, deputyUserId) {
        if (deputyUserId && teamUsers?.length) {
          const d = teamUsers.find((u) => String(u.id) === String(deputyUserId));
          if (d?.email && String(d.email).includes("@")) return String(d.email).trim();
        }
        return DEFAULT_MANAGER_EMAIL;
      }

      /** Gaidošo akceptu / Cits apstiprinājums: vadītājs, admin vai aktuālais p.i. */
      function userCanApproveAbsences(profileRole, sessionUserId, deputyUserId) {
        if (profileRole === "manager" || profileRole === "admin") return true;
        if (
          deputyUserId &&
          sessionUserId &&
          String(deputyUserId) === String(sessionUserId)
        )
          return true;
        return false;
      }

      function isLocalMode() {
        return !configured();
      }

      function localDisplayName() {
        if (TIKAI_VIENKARSI_SKATS) {
          return sessionStorage.getItem(LS_LOCAL_NAME) || "Komanda";
        }
        return sessionStorage.getItem(LS_LOCAL_NAME) || "PDD lietotājs";
      }

      function ensureLocalTypes() {
        if (localStorage.getItem(LS_TYPES)) return;
        const seed = [
          { id: 1, name: "Atvaļinājums", color: "#2563eb", sort_order: 1 },
          { id: 2, name: "Papildatvaļinājums", color: "#7c3aed", sort_order: 2 },
          { id: 3, name: "Komandējums", color: "#0891b2", sort_order: 3 },
          { id: 4, name: "Mācības", color: "#059669", sort_order: 4 },
          { id: 5, name: "Slimības lapa", color: "#dc2626", sort_order: 5 },
          { id: 6, name: "Neapmaksāta prombūtne", color: "#ca8a04", sort_order: 6 },
          { id: 7, name: "Cits (saskaņots)", color: "#64748b", sort_order: 7 },
        ];
        localStorage.setItem(LS_TYPES, JSON.stringify(seed));
      }

      function getLocalTypes() {
        ensureLocalTypes();
        return JSON.parse(localStorage.getItem(LS_TYPES) || "[]");
      }

      function getLocalAbsences() {
        return JSON.parse(localStorage.getItem(LS_ABS) || "[]");
      }

      function setLocalAbsences(rows) {
        localStorage.setItem(LS_ABS, JSON.stringify(rows));
      }

      function localSessionActive() {
        return sessionStorage.getItem(LS_LOCAL_OK) === "1";
      }

      function LocalPasswordScreen() {
        const [pw, setPw] = useState("");
        const [name, setName] = useState(() => sessionStorage.getItem(LS_LOCAL_NAME) || "");
        const [err, setErr] = useState(null);
        function submit(e) {
          e.preventDefault();
          setErr(null);
          if (pw !== PAGAIDU_PAROLE) {
            setErr("Nepareiza parole.");
            return;
          }
          sessionStorage.setItem(LS_LOCAL_OK, "1");
          if (name.trim()) sessionStorage.setItem(LS_LOCAL_NAME, name.trim());
          location.reload();
        }
        return html`
          <div class="auth-box" style=${{ maxWidth: "420px" }}>
            <h1>PDD — ieeja</h1>
            <p class="app-sub">Pagaidu režīms: dati tikai šajā pārlūkā.</p>
            <form class="stack" onSubmit=${submit}>
              <div class="field">
                <label for="loc-name">Vārds (kalendāram)</label>
                <input
                  id="loc-name"
                  class="input"
                  value=${name}
                  onChange=${(ev) => setName(ev.target.value)}
                  placeholder="Piemēram, Jānis"
                  autoComplete="name"
                />
              </div>
              <div class="field">
                <label for="loc-pw">Parole</label>
                <input
                  id="loc-pw"
                  type="password"
                  class="input"
                  value=${pw}
                  onChange=${(ev) => setPw(ev.target.value)}
                  placeholder="Noklusējums: pdd"
                  required
                  autoComplete="current-password"
                />
              </div>
              ${err ? html`<p style=${{ color: "var(--danger, #f87171)", margin: 0 }}>${err}</p>` : null}
              <button type="submit" class="btn btn-primary">Ieiet</button>
            </form>
            <p style=${{ fontSize: "0.8rem", color: "var(--muted)", marginTop: "1rem" }}>
              Noklusējuma parole ir <code>pdd</code> — nomaini to konstantē
              <code>PAGAIDU_PAROLE</code> šajā HTML.
            </p>
            <details style=${{ marginTop: "0.85rem", fontSize: "0.8rem", color: "var(--muted)" }}>
              <summary style=${{ cursor: "pointer" }}>Problēmas ar tiešsaistes pieslēgšanos?</summary>
              <p style=${{ marginTop: "0.5rem" }}>
                Ja iepriekš saglabāta nepareiza projekta adrese vai atslēga, atver pārlūka izstrādātāja rīkus
                (F12) → Application → Local Storage, dzēs ierakstus
                <code>pdd_supabase_url</code> un <code>pdd_supabase_anon_key</code>, tad pārlādē lapu. Pēc tam
                jābūt derīgai adresei <code>https://…supabase.co</code> un garai publiskajai atslēgai lapas
                konfigurācijā vai GitHub izvietošanā.
              </p>
            </details>
          </div>
        `;
      }

      function useSession() {
        const [session, setSession] = useState(null);
        const [loading, setLoading] = useState(true);
        useEffect(() => {
          if (TIKAI_VIENKARSI_SKATS) {
            setSession({ user: { id: LOCAL_USER_ID, email: "local@pdd" } });
            setLoading(false);
            return;
          }
          if (isLocalMode()) {
            if (localSessionActive()) {
              setSession({ user: { id: LOCAL_USER_ID, email: "demo@local" } });
            } else {
              setSession(null);
            }
            setLoading(false);
            return;
          }
          if (!supabase) {
            setLoading(false);
            return;
          }
          let cancelled = false;
          supabase.auth.getSession().then(({ data }) => {
            if (!cancelled) {
              setSession(data.session);
              setLoading(false);
            }
          });
          const { data } = supabase.auth.onAuthStateChange((_e, next) => setSession(next));
          return () => {
            cancelled = true;
            data.subscription.unsubscribe();
          };
        }, []);
        return { session, loading };
      }

      function useProfile(userId) {
        const [profile, setProfile] = useState(null);
        const [loading, setLoading] = useState(Boolean(userId));
        useEffect(() => {
          if (!userId) {
            setProfile(null);
            setLoading(false);
            return;
          }
          if (isLocalMode()) {
            setProfile({
              id: LOCAL_USER_ID,
              full_name: localDisplayName(),
              role: "manager",
            });
            setLoading(false);
            return;
          }
          if (!supabase) {
            setProfile(null);
            setLoading(false);
            return;
          }
          let cancelled = false;
          setLoading(true);
          supabase
            .from("users")
            .select("*")
            .eq("id", userId)
            .maybeSingle()
            .then(({ data, error }) => {
              if (!cancelled) {
                if (error) console.error(error);
                setProfile(data ?? null);
                setLoading(false);
              }
            });
          return () => {
            cancelled = true;
          };
        }, [userId]);
        return { profile, loading };
      }

      /** Lietotājam — īsas ziņas latviski; tehniskās detaļas tikai konsolē ([auth]). */
      function authUserMessage(raw) {
        const m = raw ? String(raw).toLowerCase() : "";
        if (/signups not allowed|signup.*disabled|email signups.*disabled/i.test(m)) {
          console.error("[auth]", raw);
          return "Jaunu kontu reģistrācija šajā vidē ir izslēgta. Izmanto „Ieiet”, ja konts jau izveidots, vai sazinies ar administratoru.";
        }
        if (
          /invalid api key|invalid api|invalid jwt|jwt expired|malformed|apikey|401|403 forbidden|failed to fetch|network|load failed|err_network/i.test(
            m
          )
        ) {
          console.error("[auth]", raw);
          return (
            "Neizdevās savienoties ar datu serveri. Mēģini vēlāk vai ziņo administratoram. " +
            "Ja uzturi lapu: pārlūkā atver izstrādātāja rīkus (F12) → Console — tur ir ieraksts [auth]; bieži vaina ir nepareizā publiskajā atslēgā, citā projekta adresē, pauzētā projektā vai nepareizā vietnes adresē e-pasta apstiprinājumam."
          );
        }
        if (/invalid login|invalid credentials|wrong password|email not confirmed|email address not confirmed/i.test(m)) {
          if (/email not confirmed|not confirmed/i.test(m)) {
            return "Lūdzu vispirms apstiprini e-pastu — atver vēstuli un spied uz saites, tad mēģini ielogoties.";
          }
          return "Nepareizs e-pasts vai parole, vai konts vēl nav apstiprināts.";
        }
        if (/user already registered|already been registered|already exists/i.test(m)) {
          return "Šim e-pastam konts jau pastāv. Izmanto „Ieiet”.";
        }
        if (/password|weak|least.*6|6 characters/i.test(m)) {
          return "Parolei jābūt vismaz 6 rakstzīmēm.";
        }
        if (/rate limit|too many requests/i.test(m)) {
          return "Pārāk daudz mēģinājumu. Uzgaidi brīdi un mēģini vēlreiz.";
        }
        console.warn("[auth]", raw);
        return "Neizdevās. Mēģini vēlreiz.";
      }

      function AuthScreen() {
        const [mode, setMode] = useState("signin");
        const [email, setEmail] = useState("");
        const [password, setPassword] = useState("");
        const [busy, setBusy] = useState(false);
        const [message, setMessage] = useState(null);
        async function onSubmit(e) {
          e.preventDefault();
          setMessage(null);
          if (!supabase) {
            setMessage("Pieteikšanās šobrīd nav pieejama.");
            return;
          }
          setBusy(true);
          try {
            if (mode === "signup") {
              const { error } = await supabase.auth.signUp({
                email: email.trim(),
                password,
                options: {
                  emailRedirectTo: window.location.origin + window.location.pathname,
                },
              });
              if (error) setMessage(authUserMessage(error.message));
              else
                setMessage(

      const dow = ["P", "O", "T", "C", "P", "S", "Sv"];
      function dayKey(d) {
        return format(d, "yyyy-MM-dd");
      }
      function chipStyle(a) {
        if (a.status === "approved")
          return { background: a.type?.color ?? "#34d399", color: "#0f172a" };
        if (a.status === "rejected") return { background: "#7f1d1d", color: "#fecaca" };
        return { background: "#854d0e", color: "#fef3c7" };

      function AbsenceCalendar({ month, onMonthChange, absences }) {
        const start = startOfWeek(startOfMonth(month), { weekStartsOn: 1 });
        const end = endOfWeek(endOfMonth(month), { weekStartsOn: 1 });
        const days = eachDayOfInterval({ start, end });
        const entriesForDay = (d) => {
          const key = dayKey(d);
          return absences.filter((a) => key >= a.start_date && key <= a.end_date);
        };
        const title = format(month, "LLLL yyyy", { locale: lv });
        return html`
          <div class="cal-wrap">
            <div class="cal-head">
              <button type="button" class="btn btn-small btn-ghost" onClick=${() => onMonthChange(addMonths(month, -1))}>
                ←
              </button>
              <strong style=${{ textTransform: "capitalize" }}>${title}</strong>
              <button type="button" class="btn btn-small btn-ghost" onClick=${() => onMonthChange(addMonths(month, 1))}>
                →
              </button>
            </div>
            <div class="cal-grid">
              ${dow.map(
                (l, i) => html`
                  <div key=${`dow-${i}`} class="cal-dow">${l}</div>
                `
              )}
              ${days.map((d) => {
                const inMonth = isSameMonth(d, month);
                const items = entriesForDay(d);
                return html`
                  <div
                    key=${d.toISOString()}
                    class=${`cal-cell ${!inMonth ? "cal-cell-out" : ""} ${isToday(d) ? "cal-cell-today" : ""}`}
                  >
                    <div class="cal-day-num">${format(d, "d")}</div>
                    ${items.map((a) => html`
                      <span
                        key=${a.id}
                        class="cal-chip"
                        style=${chipStyle(a)}
                        title=${`${a.employee?.full_name ?? "Darbinieks"} — ${a.type?.name ?? ""} (${a.status})`}
                      >
                        ${(a.employee?.full_name?.split(" ")[0] ?? "?") + " · " + (a.type?.name ?? "")}
                      </span>
                    `)}
                  </div>
                `;
              })}
            </div>
          </div>
        `;
      }

      function CitsPublicApprove({ token, onDone, sessionUserId, profileRole }) {
        const [preview, setPreview] = useState(null);
        const [err, setErr] = useState(null);
        const [busy, setBusy] = useState(false);
        const [deputyUserId, setDeputyUserId] = useState(null);
        const [deputyLoaded, setDeputyLoaded] = useState(false);
        useEffect(() => {
          if (isLocalMode() || !supabase || !sessionUserId) {
            setDeputyUserId(null);
            setDeputyLoaded(true);
            return;
          }
          let cancelled = false;
          setDeputyLoaded(false);
          supabase
            .from("pdd_deputy_state")
            .select("deputy_user_id")
            .eq("id", 1)
            .maybeSingle()
            .then(({ data, error }) => {
              if (cancelled) return;
              if (error) console.error(error);
              setDeputyUserId(data?.deputy_user_id ?? null);
              setDeputyLoaded(true);
            });
          return () => {
            cancelled = true;
          };
        }, [sessionUserId]);
        const canApprove = isLocalMode()
          ? TIKAI_VIENKARSI_SKATS || localSessionActive()
          : Boolean(
              sessionUserId &&
                deputyLoaded &&
                userCanApproveAbsences(profileRole ?? "employee", sessionUserId, deputyUserId)
            );
        useEffect(() => {
          let cancelled = false;
          (async () => {
            if (!token) return;
            setErr(null);
            setPreview(null);
            if (isLocalMode()) {
              const rows = getLocalCitsRequests();
              const r = rows.find((x) => x.approval_token === token && x.status === "pending_manager");
              if (!r) {
                if (!cancelled) setErr("Nederīgs vai jau apstiprināts pieprasījums.");
                return;
              }
              if (!cancelled)
                setPreview({
                  start_date: r.start_date,
                  end_date: r.end_date,
                  employee_name: localDisplayName(),
                  comment: r.comment || "",
                  ok: true,
                });
              return;
            }
            if (!sessionUserId || !deputyLoaded) return;
            if (!userCanApproveAbsences(profileRole ?? "employee", sessionUserId, deputyUserId)) {
              if (!cancelled)
                setErr(
                  "Apstiprināt drīkst tikai vadītājs, administrators vai aktuālais p.i. Ielogojies ar atbilstošu kontu."
                );
              return;
            }
            const { data, error } = await supabase.rpc("pdd_cits_preview", { p_token: token });
            if (cancelled) return;
            if (error) {
              setErr(error.message);
              return;
            }
            const row = Array.isArray(data) ? data[0] : data;
            if (!row?.ok) setErr("Nederīgs vai jau apstiprināts pieprasījums.");
            else setPreview(row);
          })();
          return () => {
            cancelled = true;
          };
        }, [token, sessionUserId, deputyLoaded, deputyUserId, profileRole]);
        async function approve() {
          if (!canApprove) {
            alert("Apstiprināt drīkst tikai vadītājs, administrators vai aktuālais p.i.");
            return;
          }
          setBusy(true);
          try {
            if (isLocalMode()) {
              const rows = getLocalCitsRequests();
              const r = rows.find((x) => x.approval_token === token && x.status === "pending_manager");
              if (!r) {
                setErr("Nav atrasts.");
                return;
              }
              const types = getLocalTypes();
              const cits = types.find((t) => isCitsSaskanotsTypeName(t.name));
              if (!cits) {
                setErr("Nav veida „Cits (saskaņots)” lokālajos datos.");
                return;
              }
              const abs = getLocalAbsences();
              abs.push({
                id: crypto.randomUUID(),
                user_id: r.user_id,
                type_id: cits.id,
                start_date: r.start_date,
                end_date: r.end_date,
                comment: r.comment,
                status: "approved",
                created_at: new Date().toISOString(),
                approved_at: new Date().toISOString(),
              });
              setLocalAbsences(abs);
              setLocalCitsRequests(
                rows.map((x) =>
                  x.approval_token === token ? { ...x, status: "approved" } : x
                )
              );
              stripCitsFromUrl();
              onDone();
              return;
            }
            const { error } = await supabase.rpc("pdd_approve_cits_token", { p_token: token });
            if (error) {
              alert(error.message);
              return;
            }
            stripCitsFromUrl();
            onDone();
          } finally {
            setBusy(false);
          }
        }
        return html`
          <div class="auth-box" style=${{ maxWidth: "480px" }}>
            <h1 style=${{ fontSize: "1.15rem" }}>„Cits (saskaņots)” — apstiprinājums</h1>
            ${err
              ? html`<p style=${{ color: "#f87171" }}>${err}</p>`
              : !preview
                ? html`<p style=${{ color: "var(--muted)" }}>${isLocalMode() || canApprove ? "Ielādē…" : "Pārbauda tiesības…"}</p>`
                : html`
                    <div class="stack" style=${{ gap: "0.5rem" }}>
                      <p><strong>${preview.employee_name}</strong></p>
                      <p style=${{ margin: 0, fontSize: "0.9rem" }}>
                        ${preview.start_date} — ${preview.end_date}
                      </p>
                      ${preview.comment
                        ? html`<p style=${{ margin: 0 }}>${preview.comment}</p>`
                        : null}
                      <button type="button" class="btn btn-primary" disabled=${busy || !canApprove} onClick=${approve}>
                        ${busy ? "…" : "Apstiprināt prombūtni"}
                      </button>
                      ${!canApprove && !isLocalMode()
                        ? html`<p style=${{ margin: 0, fontSize: "0.82rem", color: "var(--muted)" }}>
                            Tikai vadītājs, administrators vai p.i. var apstiprināt.
                          </p>`
                        : null}
                    </div>
                  `}
            <button type="button" class="btn btn-ghost btn-small" style=${{ marginTop: "1rem" }} onClick=${onDone}>
              Aizvērt
            </button>
          </div>
        `;
      }

        const [form, setForm] = useState({ type_id: "", start_date: "", end_date: "", comment: "" });
        const list = approverView ? absences : absences.filter((a) => a.user_id === userId);
        function openEdit(a) {
          setEditing(a.id);
          setForm({
            type_id: String(a.type_id),
            start_date: a.start_date,
            end_date: a.end_date,
            comment: a.comment || "",
          });
        }
        async function saveEdit(e) {
          e.preventDefault();
          if (!editing) return;
          if (isLocalMode()) {
            const rows = getLocalAbsences().map((r) =>
              r.id === editing
                ? {
                    ...r,
                    type_id: Number(form.type_id),
                    start_date: form.start_date,
                    end_date: form.end_date,
                    comment: form.comment.trim() || null,
                  }
                : r
            );
            setLocalAbsences(rows);
            setEditing(null);
            onRefresh();
            return;
          }
          const { error } = await supabase
            .from("prombutnes_dati")
            .update({
              type_id: Number(form.type_id),
              start_date: form.start_date,
              end_date: form.end_date,
              comment: form.comment.trim() || null,
            })
            .eq("id", editing);
          if (error) alert(error.message);
          else {
            setEditing(null);
            onRefresh();
          }

        async function confirmDelete() {
          if (!delId) return;
          if (isLocalMode()) {
            setLocalAbsences(getLocalAbsences().filter((r) => r.id !== delId));
            setDelId(null);
            onRefresh();
            return;

            onRefresh();

      function ManagerApprovals({ currentUserId, onChanged }) {
        const [pending, setPending] = useState([]);
        const [busyId, setBusyId] = useState(null);
        async function load() {
          if (isLocalMode()) {
            const types = getLocalTypes();
            const tmap = new Map(types.map((t) => [t.id, t]));
            const list = getLocalAbsences()
              .filter((r) => r.status === "pending")
              .map((r) => ({
                ...r,
                type: tmap.get(r.type_id) ?? null,
                employee: { id: r.user_id, full_name: localDisplayName() },
              }))
              .sort((a, b) => (b.created_at || "").localeCompare(a.created_at || ""));
            setPending(list);
            return;
          }
          const { data: rows, error } = await supabase
            .from("prombutnes_dati")
            .select("*, type:prombutnes_veidi(*)")
            .eq("status", "pending")
            .order("created_at", { ascending: false });
          if (error) {
            console.error(error);
            return;
          }
          const { data: profs } = await supabase.from("users").select("id, full_name");
          const pmap = new Map((profs ?? []).map((p) => [p.id, p]));
          const list = (rows ?? []).map((r) => ({
            ...r,
            type: r.type,
            employee: pmap.get(r.user_id) ?? null,
          }));
          setPending(list);
        }
        useEffect(() => {
          void load();
        }, []);
        async function settle(id, status) {
          setBusyId(id);
          try {
            if (isLocalMode()) {
              const rows = getLocalAbsences().map((r) =>
                r.id === id
                  ? {
                      ...r,
                      status,
                      approved_by: currentUserId,
                      approved_at: new Date().toISOString(),
                    }
                  : r
              );
              setLocalAbsences(rows);
            } else {
              const { error } = await supabase
                .from("prombutnes_dati")
                .update({
                  status,
                  approved_by: currentUserId,
                  approved_at: new Date().toISOString(),
                })
                .eq("id", id);
              if (error) {
                alert(error.message);
                return;
              }
            }
            await load();
            onChanged();
          } finally {
            setBusyId(null);
          }
        }
        if (pending.length === 0) {
          return html`
            <div class="list-panel">
              <h2>Gaidošie akcepti</h2>
              <p style=${{ margin: 0, color: "var(--muted)" }}>Nav gaidošu iesniegumu.</p>
            </div>
          `;
        }
        return html`
          <div class="list-panel">
            <h2>Gaidošie akcepti</h2>
            ${pending.map(
              (a) => html`
                <div key=${a.id} class="abs-item">
                  <div class="row" style=${{ justifyContent: "space-between", marginBottom: "0.35rem" }}>
                    <strong>${a.employee?.full_name ?? a.user_id}</strong>
                    <span class="badge badge-pending">Gaida</span>
                  </div>
                  <div style=${{ fontSize: "0.85rem", color: "var(--muted)" }}>
                    ${a.type?.name} · ${a.start_date} — ${a.end_date}
                  </div>
                  ${a.comment ? html`<p style=${{ margin: "0.35rem 0 0", fontSize: "0.88rem" }}>${a.comment}</p>` : null}
                  <div class="row" style=${{ marginTop: "0.55rem" }}>
                    <button
                      type="button"
                      class="btn btn-small btn-primary"
                      disabled=${busyId === a.id}
                      onClick=${() => settle(a.id, "approved")}
                    >
                      Apstiprināt
                    </button>
                    <button
                      type="button"
                      class="btn btn-small btn-danger"
                      disabled=${busyId === a.id}
                      onClick=${() => settle(a.id, "rejected")}
                    >
                      Noraidīt
                    </button>
                  </div>
                </div>
              `
            )}
          </div>
        `;
      }

      function PrombutnesSection({ userId, role, onBack }) {
        const [month, setMonth] = useState(() => new Date());
        const [absences, setAbsences] = useState([]);
        const [typesList, setTypesList] = useState([]);
        const [teamUsers, setTeamUsers] = useState([]);
        const [deputyUserId, setDeputyUserId] = useState(null);
        const [error, setError] = useState(null);
        useEffect(() => {
          if (isLocalMode()) {
            setTypesList(getLocalTypes());
            return;
          }
          supabase
            .from("prombutnes_veidi")
            .select("*")
            .order("sort_order", { ascending: true })
            .then(({ data, error }) => {
              if (error) console.error(error);
              setTypesList(data ?? []);
            });
        }, []);
        const loadTeamAndDeputy = useCallback(async () => {
          if (isLocalMode()) {
            setTeamUsers([
              {
                id: LOCAL_USER_ID,
                full_name: localDisplayName(),
                email: "demo@local",
              },
            ]);
            setDeputyUserId(localStorage.getItem(LS_LOCAL_DEPUTY_USER_ID) || null);
            return;
          }
          const { data: urows, error: uErr } = await supabase
            .from("users")
            .select("id, full_name, email")
            .order("full_name", { ascending: true });
          if (uErr) console.error(uErr);
          setTeamUsers(urows ?? []);
          const { data: drow, error: dErr } = await supabase
            .from("pdd_deputy_state")
            .select("deputy_user_id")
            .eq("id", 1)
            .maybeSingle();
          if (dErr) console.error(dErr);
          setDeputyUserId(drow?.deputy_user_id ?? null);
        }, []);
        useEffect(() => {
          void loadTeamAndDeputy();
        }, [loadTeamAndDeputy]);
        const notifyEmail = useMemo(
          () => resolveNotifyEmail(teamUsers, deputyUserId),
          [teamUsers, deputyUserId]
        );
        const deputyDisplayName = useMemo(() => {
          if (!deputyUserId || !teamUsers.length) return null;
          return teamUsers.find((u) => String(u.id) === String(deputyUserId))?.full_name ?? null;
        }, [deputyUserId, teamUsers]);
        const refresh = useCallback(async () => {
          setError(null);
          if (isLocalMode()) {
            const types = getLocalTypes();
            const tmap = new Map(types.map((t) => [t.id, t]));
            const list = getLocalAbsences()
              .map((r) => ({
                ...r,
                type: tmap.get(r.type_id) ?? null,
                employee: { id: r.user_id, full_name: localDisplayName() },
              }))
              .sort((a, b) => a.start_date.localeCompare(b.start_date));
            setAbsences(list);
            return;
          }
          const { data: rows, error: qErr } = await supabase
            .from("prombutnes_dati")
            .select("*, type:prombutnes_veidi(*)")
            .order("start_date", { ascending: true });
          if (qErr) {
            setError(qErr.message);
            return;
          }
          const { data: profs, error: pErr } = await supabase.from("users").select("id, full_name");
          if (pErr) setError(pErr.message);
          const pmap = new Map((profs ?? []).map((p) => [p.id, p]));
          const list = (rows ?? []).map((r) => ({
            ...r,
            type: r.type,
            employee: pmap.get(r.user_id) ?? null,
          }));
          setAbsences(list);
        }, []);
        useEffect(() => {
          void refresh();
        }, [refresh]);
        const isManager = role === "manager" || role === "admin";
        const canApprove = userCanApproveAbsences(role, userId, deputyUserId);
        return html`
          <section class="stack" style=${{ gap: "1.25rem" }}>
            <div class="row" style=${{ justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <h2 style=${{ margin: 0, fontSize: "1.15rem" }}>Prombūtnes</h2>
                <p class="app-sub" style=${{ margin: "0.25rem 0 0" }}>Kalendārs un saskaņošana.</p>
              </div>
              <button type="button" class="btn btn-ghost" onClick=${onBack}>← Atpakaļ uz moduļiem</button>
            </div>
            ${deputyUserId
              ? html`
                  <div class="banner-deputy" role="status">
                    <strong>Uzmanību:</strong> šobrīd vadītāja pienākumu izpildītājs (p.i.) ir
                    <strong> ${deputyDisplayName ?? "izvēlēta persona"}</strong>. Apstiprinājumi un „Cits
                    (saskaņots)” paziņojumi tiek sūtīti uz <strong>${notifyEmail}</strong>.
                  </div>
                `
              : null}
            ${error
              ? html`
                  <div class="banner-warn" role="alert">Kļūda: ${error}</div>
                `
              : null}
            <${TeamUsersList} users=${teamUsers} />
            <div class="prombutnes-grid">
              <${AbsenceCalendar} month=${month} onMonthChange=${setMonth} absences=${absences} />
              <div class="stack" style=${{ gap: "0.85rem" }}>
                <${AbsenceRequestForm}
                  userId=${userId}
                  role=${role}
                  onCreated=${() => void refresh()}
                />
                ${isManager
                  ? html`<${DeputyDelegePanel}
                      teamUsers=${teamUsers}
                      deputyUserId=${deputyUserId}
                      onDeputyChange=${loadTeamAndDeputy}
                      currentUserId=${userId}
                    />`
                  : null}
                <${CitsSaskanotsForm}
                  userId=${userId}
                  onCreated=${() => void refresh()}
                  notifyEmail=${notifyEmail}
                />
              </div>
            </div>
            ${canApprove ? html`<${ManagerApprovals} currentUserId=${userId} onChanged=${() => void refresh()} />` : null}
            <${AbsenceRecordsPanel}
              userId=${userId}
              absences=${absences}
              types=${typesList}
              onRefresh=${refresh}
              approverView=${canApprove}
            />
          </section>
        `;
      }

                      <span style=${{ color: "var(--muted)", fontSize: "0.9rem" }}>
                        ${profile?.full_name ?? session.user.email}
                        ${profile?.role === "manager" || profile?.role === "admin" ? " · vadītājs" : ""}
                      </span>
                      <button type="button" class="btn btn-ghost btn-small" onClick=${signOut}>Iziet</button>
                    </div>
                  `}
            </header>
            ${view === "home"
              ? html`<${Dashboard} onOpenPrombutnes=${() => setView("prombutnes")} />`
              : html`
                  <${PrombutnesSection}
                    userId=${session.user.id}
                    role=${profile?.role ?? "employee"}
                    onBack=${() => setView("home")}
                  />
                `}
          </div>
        `;
      }

      createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
