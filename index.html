        function pickByAliases(obj, aliases, fallback = null) {
          if (!obj || !aliases?.length) return fallback;
          const entries = Object.entries(obj);
          for (const alias of aliases) {
            const wanted = String(alias).toLowerCase().trim();
            const hit = entries.find(([k]) => String(k).toLowerCase().trim() === wanted);
            if (hit && hit[1] != null) return hit[1];
          }
          return fallback;
        }

        function normalizeAliasKey(s) {
          return String(s ?? "")
            .toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/\s+/g, " ")
            .trim();
        }

        function detectUserApproverColumns(usersLike) {
          const rows = Array.isArray(usersLike) ? usersLike : [];
          const keys = new Set();
          for (const u of rows) {
            if (!u || typeof u !== "object") continue;
            for (const k of Object.keys(u)) keys.add(k);
          }
          const all = Array.from(keys);
          const findByAliases = (aliases, fallback) => {
            const normAliases = aliases.map(normalizeAliasKey);
            const hit = all.find((k) => normAliases.includes(normalizeAliasKey(k)));
            return hit || fallback;

        async function insertWithColumnPruning(table, initialPayload, opts = {}, maxTries = 8) {
          let payload = { ...initialPayload };
          const userId = opts?.userId ?? null;
          const userName = String(opts?.userName ?? "").trim();
          const startDate = opts?.startDate ?? null;
          let lastErr = null;
          for (let i = 0; i < maxTries; i += 1) {
            const { error } = await supabase.from(table).insert(payload);
            if (!error) return null;
            lastErr = error;
            const msg = String(error?.message ?? "");

            // Ja kļūda par UUID sintaksi un payload satur vārdu, pārslēdzam uz userId.
            if (/invalid input syntax for type uuid/i.test(msg) && userId && userName) {
              const invalidUuidMatch = msg.match(/type uuid:\s*"([^"]+)"/i);
              const invalidValue = invalidUuidMatch?.[1] ? String(invalidUuidMatch[1]).trim() : null;
              let changed = false;
              for (const k of Object.keys(payload)) {
                const v = String(payload[k] ?? "").trim();
                const lk = String(k).toLowerCase();
                if (
                  v &&
                  !isUuidLike(v) &&
                  (v === userName || v === invalidValue || looksLikeNameRefKey(k))
                ) {
                  payload[k] = userId;
                  changed = true;
                }
              }
              if (changed) continue;
            }

            // Ja FK kļūda uz "Vārds uzvārds", šī kolonna tavā DB ir reference uz users.id (UUID).
            if (/foreign key constraint.*prombutnes_dati_.*vārds uzvārds.*_fkey/i.test(msg) && userId) {
              let changed = false;
              for (const k of Object.keys(payload)) {
                const lk = String(k).toLowerCase();
                if (lk.includes("vārds uzvārds") || lk.includes("vards uzvards")) {
                  payload[k] = userId;
                  changed = true;
                }
              }
              if (!changed && !("Vārds uzvārds" in payload)) {
                payload["Vārds uzvārds"] = userId;
                changed = true;
              }
              if (changed) continue;
            }

            // Ja NOT NULL kļūda par Sakuma_datums / sakuma_datums, ieliekam startDate.
            if (/null value in column "sakuma_datums"/i.test(msg) && startDate) {
              payload.sakuma_datums = startDate;
              continue;
            }
            if (/null value in column "Sakuma_datums"/i.test(msg) && startDate) {
              payload.Sakuma_datums = startDate;
              continue;
            }

            const missingCol = missingColumnFromError(error);
            if (!missingCol) return error;
            const keys = Object.keys(payload);
            const hitKey = keys.find((k) => String(k).toLowerCase() === missingCol.toLowerCase());
            if (!hitKey) return error;
            delete payload[hitKey];
            // Neatstājam tukšu payload, citādi inserts nav jēgpilns.
            if (Object.keys(payload).length === 0) return error;
          }
          return lastErr;
        }

          // Edge atgriež { success: true, skipped: true } ja „nav Cits” — e-pasts netika sūtīts, nedrīkst uzskatīt par OK.
          if (body.skipped === true) return false;
          return body.success === true || body.ok === true;
        }

        /** Tikai viens URL — citādi pārlūks mēģina arī nedepployotus slug (404 OPTIONS → „Failed to fetch”). */

        async function callSendPddEmail({ name, veids, type }) {
          if (TIKAI_VIENKARSI_SKATS || isLocalMode() || !supabase) return { skipped: true };
          const cfg = loadConfig();
          const apiKey = sanitizeHttpHeaderValue(cfg.key || "");
          if (!apiKey) return { ok: false, reason: "missing_anon_key", fnUrl: "" };
          const baseFromClient = String(supabase?.supabaseUrl || "").replace(/\/+$/, "");
          const baseFromFile = normalizeProjectUrl(cfg.url || "");
          const fnUrl =
            (baseFromClient && /^https:\/\/[a-z0-9][a-z0-9-]*\.supabase\.co$/i.test(baseFromClient)
              ? `${baseFromClient}/functions/v1/sendEmail`
              : "") || getSendPddEmailFnUrl();
          if (!fnUrl) return { ok: false, reason: "missing_fn_url", fnUrl: "" };

          let accessToken = await getAccessTokenForFunctions();
          accessToken = sanitizeHttpHeaderValue(accessToken);

          const emailPayload = {
            name,
            veids,
            ...(String(type || "").trim() ? { type: String(type).trim() } : {}),
          };

          async function tryFetchWithBearer(url, bearer) {
            const b = sanitizeHttpHeaderValue(bearer);
            const r = await fetch(url, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                apikey: apiKey,
                Authorization: "Bearer " + b,
              },
              body: JSON.stringify(emailPayload),
            });
            const txt = await r.text();
            let j = null;
            try {
              j = txt ? JSON.parse(txt) : null;
            } catch {
              j = { parse_error: true, raw: txt };
            }
            if (isSendPddEmailResponseOk(j, r.ok)) {
              return { ok: true, status: r.status, body: j, fnUrl: url };
            }
            return { ok: false, status: r.status, body: j, raw: txt, fnUrl: url };
          }

          const fetchUrls = getEdgeFnCandidateUrls(fnUrl);
          const failures = [];
          // 1) Publishable/anon kā Bearer — atbilst Supabase „Verify JWT with legacy secret” + Invoke paraugam.
          for (const u of fetchUrls) {
            try {
              const out = await tryFetchWithBearer(u, apiKey);
              if (out.ok) return out;
              failures.push({
                via: "fetch_publishable_bearer",
                target: u,
                status: out.status,
                body: out.body || out.raw || null,
              });
              console.warn("[send-pdd-email fetch]", u, out.status, out.raw || out.body);
            } catch (e) {
              failures.push({ via: "fetch_publishable_bearer", target: u, error: String(e?.message || e) });
              console.warn("[send-pdd-email fetch]", u, e);
            }
          }
          // 2) Lietotāja / anon sesijas JWT
          if (accessToken) {
            for (const u of fetchUrls) {
              try {
                const out = await tryFetchWithBearer(u, accessToken);
                if (out.ok) return out;
                failures.push({ via: "fetch_session_jwt", target: u, status: out.status, body: out.body || out.raw || null });
                console.warn("[send-pdd-email fetch]", u, out.status, out.raw || out.body);
              } catch (e) {
                failures.push({ via: "fetch_session_jwt", target: u, error: String(e?.message || e) });
                console.warn("[send-pdd-email fetch]", u, e);
              }
            }
          } else {
            failures.push({
              via: "note",
              message:
                "Nav sesijas JWT (eyJ…). Ja Edge Function prasa Bearer, izmanto publishable atslēgu abos headeros vai ieslēdz Anonymous sign-ins.",
            });
          }

          const slugM = String(fnUrl || "").match(/\/functions\/v1\/([^/?#]+)/i);
          const invokeNames = slugM ? [slugM[1]] : ["sendEmail"];
          const invokeHeaderVariants = [
            {
              via: "invoke_bearer_publishable",
              headers: { Authorization: "Bearer " + apiKey, apikey: apiKey },
            },
            { via: "invoke_default_session", headers: null },
          ];
          if (accessToken) {
            invokeHeaderVariants.splice(1, 0, {
              via: "invoke_bearer_session_jwt",
              headers: { Authorization: "Bearer " + accessToken, apikey: apiKey },
            });
          }
          for (const fnName of invokeNames) {
            for (const hv of invokeHeaderVariants) {
              try {
                const invokeOpts = { body: emailPayload };
                if (hv.headers) invokeOpts.headers = { ...hv.headers };
                const { data, error } = await supabase.functions.invoke(fnName, invokeOpts);
                if (!error && isSendPddEmailResponseOk(data, true)) {
                  return { ok: true, status: 200, body: data, fnUrl };
                }
                failures.push({
                  via: hv.via,
                  target: fnName,
                  status: error?.context?.status,
                  error: error ? String(error?.message || error) : null,
                  body: data || null,
                });
                if (error) console.warn("[send-pdd-email invoke]", hv.via, fnName, error.message || error, error);
                if (!error && data) {
                  console.warn("[send-pdd-email invoke]", hv.via, fnName, "non-ok body", data);
                }
              } catch (e) {
                failures.push({ via: hv.via, target: fnName, error: String(e?.message || e) });
                console.warn("[send-pdd-email invoke]", hv.via, fnName, e);
              }
            }
          }
          return { ok: false, reason: "all_email_function_attempts_failed", fnUrl, body: { failures } };
        }

            headers["Prefer"] = "return=representation";
          }
          try {
            const resp = await fetch(url, {
              method,
              headers,
              body: payload ? JSON.stringify(payload) : undefined,
            });
            if (!resp.ok) {
              const txt = await resp.text();
              return { error: new Error(txt || `HTTP ${resp.status}`) };

              body = bodyText ? JSON.parse(bodyText) : null;

              body = null;

        function isCitsSaskanotsTypeName(name) {
          const raw = String(name || "");
          const n = raw
            .toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "");
          // Elastīga atpazīšana: jebkurš "cits" + "saskan..." nosaukums iet caur saskaņošanu.
          if (n.includes("cits") && n.includes("saskan")) return true;
          return (
            /cits\s*\(\s*saka?nots\s*\)/i.test(n) ||
            /cits\s*\(\s*vajag\s+vaditaja\s+sakanojumu\s*\)/i.test(n) ||
            /cits\s*\(\s*ar\s+sakanu?osanu\s*\)/i.test(n) ||
            /cits\s*\(\s*ar\s+sakanojumu\s*\)/i.test(n)
          );

        function resolveActiveDeputyUser(teamUsers, todayStr = new Date().toISOString().slice(0, 10)) {
          function toIsoDate(raw) {
            const s = String(raw ?? "").trim();
            if (!s) return "";
            // yyyy-mm-dd
            let m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s);
            if (m) return `${m[1]}-${m[2]}-${m[3]}`;
            // dd/mm/yyyy
            m = /^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);
            if (m) return `${m[3]}-${m[2]}-${m[1]}`;
            // dd.mm.yyyy
            m = /^(\d{2})\.(\d{2})\.(\d{4})$/.exec(s);
            if (m) return `${m[3]}-${m[2]}-${m[1]}`;
            return s;
          }
          const list = Array.isArray(teamUsers) ? teamUsers : [];
          const manager = resolveManagerUser(list);
          const todayIso = toIsoDate(todayStr);
          return (
            list.find((u) => {
              if (manager && String(u.id) === String(manager.id)) return false;
              if (normalizeApproverMode(u?.[COL_USER_APPROVER_STATUS]) !== "period") return false;
              const fromIso = toIsoDate(u?.[COL_USER_APPROVER_FROM] ?? u?.approver_period_from ?? "");
              const toIso = toIsoDate(u?.[COL_USER_APPROVER_TO] ?? u?.approver_period_to ?? "");
              if (!fromIso || !toIso) return false;
              return fromIso <= todayIso && todayIso <= toIso;
            }) ?? null
          );
        }

          }
          if (teamUsers?.length) {

          }
          return DEFAULT_MANAGER_EMAIL;

          const manager = resolveManagerUser(list);

        function getLocalTypes() {
          ensureLocalTypes();

          if (!Array.isArray(rows)) return [];
          const normalized = rows.map((t) => {
            const n = String(t?.name ?? "");
            if (/^cits\s*\(\s*saskaņots\s*\)$/i.test(n)) {
              return { ...t, name: "Cits (ar vadītāja saskaņojumu)" };
            }
            return t;
          });
          if (JSON.stringify(normalized) !== JSON.stringify(rows)) {
            localStorage.setItem(LS_TYPES, JSON.stringify(normalized));
          }
          return normalized;
        }

        function getLocalAbsences() {
          const rows = JSON.parse(localStorage.getItem(LS_ABS) || "[]");
          if (!Array.isArray(rows) || rows.length === 0) return Array.isArray(rows) ? rows : [];

          // Retention: dzēšam prombūtnes, kuras beigušās senāk par 3 mēnešiem.
          try {
            const cutoff = format(subMonths(new Date(), 3), "yyyy-MM-dd");
            const kept = rows.filter((r) => {
              const end = String(r?.end_date ?? "");
              if (!end) return true;
              return end >= cutoff;
            });
            if (kept.length !== rows.length) localStorage.setItem(LS_ABS, JSON.stringify(kept));
            return kept;
          } catch {
            return rows;
          }
        }

        function setLocalAbsences(rows) {
          localStorage.setItem(LS_ABS, JSON.stringify(rows));
        }

        function useSession() {
          const [session, setSession] = useState(null);
          const [loading, setLoading] = useState(true);
          useEffect(() => {
            if (TIKAI_VIENKARSI_SKATS) {
              ensureLocalAdminSession();
              const uid = getStickyAuthValue(LS_LOCAL_USER_ID) || LOCAL_USER_ID;
              const em = getStickyAuthValue(LS_LOCAL_EMAIL) || "local@pdd";
              setSession({ user: { id: uid, email: em } });
              setLoading(false);
              return;
            }
            if (isLocalMode()) {
              ensureLocalAdminSession();
              if (localSessionActive()) {
                const uid = getStickyAuthValue(LS_LOCAL_USER_ID) || LOCAL_USER_ID;
                const em = getStickyAuthValue(LS_LOCAL_EMAIL) || "demo@local";
                setSession({ user: { id: uid, email: em } });
              } else {
                setSession(null);
              }
              setLoading(false);
              return;
            }
            if (localSessionActive()) {
              const uid = getStickyAuthValue(LS_LOCAL_USER_ID) || LOCAL_USER_ID;
              const em = getStickyAuthValue(LS_LOCAL_EMAIL) || "demo@local";
              setSession({ user: { id: uid, email: em } });
              setLoading(false);
              return;
            }
            if (!supabase) {
              setLoading(false);
              return;
            }
            let cancelled = false;
            supabase.auth.getSession().then(({ data }) => {
              if (!cancelled) {
                setSession(data.session);
                setLoading(false);
              }
            });
            const { data } = supabase.auth.onAuthStateChange((_e, next) => setSession(next));
            return () => {
              cancelled = true;
              data.subscription.unsubscribe();
            };
          }, []);
          return { session, loading };
        }

        function useProfile(userId, sessionEmail) {
          const [profile, setProfile] = useState(null);
          const [loading, setLoading] = useState(Boolean(userId));
          useEffect(() => {
            if (!userId) {
              setProfile(null);
              setLoading(false);
              return;
            }
            if (isLocalMode()) {
              const ln = localDisplayName();
              const uid = getStickyAuthValue(LS_LOCAL_USER_ID) || LOCAL_USER_ID;
              const users = window.KOMANDA?.loadTeamUsers?.() ?? [];
              const me = (Array.isArray(users) ? users : []).find((u) => String(u.id) === String(uid)) ?? null;
              setProfile({
                id: uid,
                full_name: me?.full_name ?? me?.[COL_USER_NAME] ?? ln,
                [COL_USER_NAME]: me?.[COL_USER_NAME] ?? me?.full_name ?? ln,
                [COL_USER_IMAIL]: me?.[COL_USER_IMAIL] ?? me?.email ?? getStickyAuthValue(LS_LOCAL_EMAIL) ?? "",
                [COL_USER_AMATS]: me?.[COL_USER_AMATS] ?? me?.Amats ?? "",
                email: me?.email ?? getStickyAuthValue(LS_LOCAL_EMAIL) ?? null,
                raw_role: me?.role ?? null,
                [COL_USER_ROLE]: userRoleValue(me),
                role: userRoleValue(me),
                created_at: null,
              });
              setLoading(false);
              return;
            }
            if (!supabase) {
              setProfile(null);
              setLoading(false);
              return;
            }
            let cancelled = false;
            setLoading(true);
            (async () => {
              await ensureDbReadableSession();
              const q1 = await supabase.from("users").select("*").eq("id", userId).maybeSingle();
              let data = q1.data;
              let error = q1.error;
              if (error) {
                const q2 = await supabase.from("profiles").select("*").eq("id", userId).maybeSingle();
                data = q2.data;
                error = q2.error;
              }
              // Ja auth uid nav tas pats, kas users.id (piem., anon sesija), mēģinām atrast profilu pēc e-pasta.
              if (!data && sessionEmail) {
                const em = String(sessionEmail || "").trim().toLowerCase();
                if (em) {
                  const byEmail = await supabase
                    .from("users")
                    .select("*")
                    .ilike("email", em)
                    .limit(1)
                    .maybeSingle();
                  if (!byEmail.error && byEmail.data) {
                    data = byEmail.data;
                    error = null;
                  }
                }
              }
              if (!cancelled) {
                if (error) console.error(error);
                if (!data) {
                  setProfile(null);
                } else {
                  const rid = data?.id;
                  const merged = {
                    ...data,
                    id: rid != null && String(rid).trim() !== "" ? rid : userId,
                  };
                  setProfile(normalizeTeamUserRecord(merged));
                }
                setLoading(false);
              }
            })();
            return () => {
              cancelled = true;
            };
          }, [userId, sessionEmail]);
          return { profile, loading };
        }

        /** Lietotājam — īsas ziņas latviski; tehniskās detaļas tikai konsolē ([auth]). */
        function authUserMessage(raw) {
          const m = raw ? String(raw).toLowerCase() : "";
          if (/signups not allowed|signup.*disabled|email signups.*disabled/i.test(m)) {
            console.error("[auth]", raw);
            return "Jaunu kontu reģistrācija šajā vidē ir izslēgta. Izmanto „Ieiet”, ja konts jau izveidots, vai sazinies ar administratoru.";
          }
          if (
            /invalid api key|invalid api|invalid jwt|jwt expired|malformed|apikey|401|403 forbidden|failed to fetch|network|load failed|err_network/i.test(
              m
            )
          ) {
            console.error("[auth]", raw);
            return (
              "Neizdevās savienoties ar datu serveri. Mēģini vēlāk vai ziņo administratoram. " +
              "Ja uzturi lapu: pārlūkā atver izstrādātāja rīkus (F12) → Console — tur ir ieraksts [auth]; bieži vaina ir nepareizā publiskajā atslēgā, citā projekta adresē, pauzētā projektā vai nepareizā vietnes adresē e-pasta apstiprinājumam."
            );
          }
          if (/invalid login|invalid credentials|wrong password|email not confirmed|email address not confirmed/i.test(m)) {
            if (/email not confirmed|not confirmed/i.test(m)) {
              return "Lūdzu vispirms apstiprini e-pastu — atver vēstuli un spied uz saites, tad mēģini ielogoties.";
            }
            return "Nepareizs e-pasts vai konts vēl nav apstiprināts.";
          }
          if (/user already registered|already been registered|already exists/i.test(m)) {
            return "Šim e-pastam konts jau pastāv. Izmanto „Ieiet”.";
          }
          if (/rate limit|too many requests/i.test(m)) {
            return "Pārāk daudz mēģinājumu. Uzgaidi brīdi un mēģini vēlreiz.";
          }
          console.warn("[auth]", raw);
          return "Neizdevās. Mēģini vēlreiz.";
        }

        function AuthScreen() {
          const [email, setEmail] = useState("");
          const [busy, setBusy] = useState(false);
          const [message, setMessage] = useState(null);
          async function onSubmit(e) {
            e.preventDefault();
            setMessage(null);
            if (!supabase) {
              setMessage("Pieteikšanās šobrīd nav pieejama.");
              return;
            }
            setBusy(true);
            try {
              const entered = String(email || "").trim().toLowerCase();
              if (!entered || !entered.includes("@")) {
                setMessage("Ievadi korektu darba e-pastu.");
                return;
              }
              let uid = "";
              const { data: rpcRows, error: rpcErr } = await supabase.rpc("pdd_lookup_user_by_email", {
                p_email: entered,
              });
              if (!rpcErr && Array.isArray(rpcRows) && rpcRows.length > 0) {
                const r0 = rpcRows[0];
                uid = String(r0?.user_id ?? r0?.pdd_lookup_user_by_email ?? "").trim();
              }
              if (!uid) {
                const { data, error } = await supabase.from("users").select("*");
                if (error) {
                  setMessage(authUserMessage(error.message));
                  return;
                }
                const list = Array.isArray(data) ? data : [];
                const user =
                  list.find(
                    (u) => String(u?.email ?? u?.["i-mail"] ?? u?.["e-mail"] ?? u?.["e-pasts"] ?? "").trim().toLowerCase() === entered
                  ) ?? null;
                if (!user) {
                  if (rpcErr) {
                    setMessage(
                      authUserMessage(rpcErr.message) +
                        "\n\nJa esi administrators: palaid Supabase SQL skriptu `pdd_lookup_user_by_email` (migration)."
                    );
                  } else {
                    setMessage("Šis e-pasts nav atrasts Komandas tabulā.");
                  }
                  return;
                }
                uid = String(user.id);
              }
              setStickyAuthValue(LS_LOCAL_OK, "1");
              setStickyAuthValue(LS_LOCAL_USER_ID, uid);
              setStickyAuthValue(LS_LOCAL_EMAIL, entered);
              location.reload();
            } finally {
              setBusy(false);
            }
          }
          return html`
            <div class="auth-box">
              <h1>PDD — Pieslēgšanās</h1>
              <p style=${{ margin: "0 0 1rem", fontSize: "0.88rem", color: "var(--muted)" }}>
                Tikai <strong>darba e-pasts</strong>. Parole nav nepieciešama.
              </p>
              <form class="stack" onSubmit=${onSubmit}>
                <div class="field">
                  <label for="email">E-pasts</label>
                  <input
                    id="email"
                    type="email"
                    class="input"
                    required
                    value=${email}
                    onChange=${(ev) => setEmail(ev.target.value)}
                    autoComplete="email"
                  />
                </div>
                <button type="submit" class="btn btn-primary" disabled=${busy}>
                  ${busy ? "…" : "Ieiet"}
                </button>
              </form>
              ${message
                ? html`<p style=${{ marginTop: "1rem", color: "var(--muted)", whiteSpace: "pre-wrap" }}>${message}</p>`
                : null}
            </div>
          `;
        }

        function AktualitatesVestureView() {
          const [rows, setRows] = useState(undefined);
          const [err, setErr] = useState(null);
          useEffect(() => {
            globalThis.PDDSodien?.ensureSodienAktStyleOnce?.();
          }, []);
          const refresh = useCallback(async () => {
            const V = globalThis.PDDSodien;
            const sb = globalThis.__PDD_SUPABASE__;
            if (!V?.fetchAllAktualitatesFromSupabase || !sb || TIKAI_VIENKARSI_SKATS || isLocalMode()) {
              const raw = Array.isArray(V?.loadAktualitates?.()) ? V.loadAktualitates() : [];
              const sorted = [...raw].sort((a, b) =>
                String(b?.created_at ?? "").localeCompare(String(a?.created_at ?? ""))
              );
              setRows(sorted);
              setErr(null);
              return;
            }
            try {
              await ensureDbReadableSession();
              const list = await V.fetchAllAktualitatesFromSupabase(sb);
              setRows(list);
              setErr(null);
            } catch (e) {
              setErr(e?.message || String(e));
              setRows([]);
            }
          }, []);
          useEffect(() => {
            void refresh();
          }, [refresh]);
          useEffect(() => {
            const sb = globalThis.__PDD_SUPABASE__;
            if (!sb || isLocalMode() || TIKAI_VIENKARSI_SKATS) return undefined;
            let ch = null;
            let cancelled = false;
            (async () => {
              try {
                const V = globalThis.PDDSodien;
                if (V?.primeAktualitatesTable) await V.primeAktualitatesTable(sb);
                if (cancelled) return;
                const tbl = globalThis.__PDD_AKTUALITATES_TABLE__;
                if (!tbl) return;
                ch = sb
                  .channel("pdd-aktualitates-history")
                  .on("postgres_changes", { event: "*", schema: "public", table: tbl }, () => void refresh())
                  .subscribe((status, er) => {
                    if (status === "CHANNEL_ERROR" || status === "TIMED_OUT") {
                      console.warn("[PDD Aktualitātes Realtime]", status, er?.message ?? er);
                    }
                  });
              } catch (e) {
                console.warn("[PDD Aktualitātes Realtime]", e);
              }
            })();
            return () => {
              cancelled = true;
              if (ch) void sb.removeChannel(ch);
            };
          }, [refresh]);
          const todayIso = useMemo(() => new Date().toISOString().slice(0, 10), []);
          function formatLvDate(iso) {
            const s = String(iso || "").trim();

                ? html`<p style=${{ color: "var(--muted)" }}>Ielādē…</p>`
                : rows.length === 0
                  ? html`<p style=${{ color: "var(--muted)" }}>Vēl nav ierakstu.</p>`
                  : html`
                      <div class="stack" style=${{ gap: "0.65rem", minWidth: 0, maxWidth: "100%", width: "100%", boxSizing: "border-box" }}>
                        ${rows.map((x) => {
                          const active = !x.end || x.end >= todayIso;
                          return html`

                              key=${x.id}
                              style=${{
                                border: "1px solid var(--border)",
                                borderRadius: "10px",

                                  marginBottom: "0.4rem",
                                }}
                              >
                                <span style=${{ fontSize: "0.82rem", color: "var(--muted)" }}>
                                  ${formatLvDate(x.start)} — ${formatLvDate(x.end)}
                                </span>
                                ${active
                                  ? html`<span style=${{ fontSize: "0.75rem", fontWeight: 600, color: "#047857" }}>Aktīvs</span>`
                                  : html`<span style=${{ fontSize: "0.75rem", color: "var(--muted)" }}>Periods beidzies</span>`}
                              </div>

          const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(String(hex || "").trim());
          if (!m) return { r: 100, g: 116, b: 139 };

          const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
          const fg = luminance > 0.55 ? "#0f172a" : "#f8fafc";
          if (a.status === "approved") return { background: tc, color: fg };
          if (a.status === "rejected")

            function normTime(s) {
              const str = String(s ?? "").trim();
              const m = /^(\d{1,2}):(\d{2})(?::\d{2})?$/.exec(str);
              if (!m) return "";
              const hh = String(m[1]).padStart(2, "0");
              const mm = String(m[2]).padStart(2, "0");
              return `${hh}:${mm}`;
            }

            const from = normTime(a?.laiks_no ?? a?.Laiks_no);
            const to = normTime(a?.laiks_lidz ?? a?.Laiks_lidz);
            if (from && to) return `Laikā no ${from} līdz ${to}`;
            if (from && !to) return `Laikā no ${from}`;
            if (!from && to) return `Laikā līdz ${to}`;

            // Fallback: ja vēl ir tikai komentāra prefikss (vecā datu forma).
            const m = /^(Laika|Laikā)\s+no\s+(\d{1,2}:\d{2})\s+(līdz|lidz)\s+(\d{1,2}:\d{2})\b/i.exec(c);
            if (m) {
              const f = normTime(m[2]);
              const t = normTime(m[3]);
              if (f && t) return `Laikā no ${f} līdz ${t}`;
            }
            return "";
          }
          const entriesForDay = (d) => {
            const key = dayKey(d);
            return absences.filter((a) => {
              const s = String(a?.start_date ?? "").slice(0, 10);
              const e = String(a?.end_date ?? "").slice(0, 10);
              if (!s || !e) return false;
              if (!(key >= s && key <= e)) return false;

                return String(a?.status ?? "").trim().toLowerCase() === "approved";

                                  onPickDay(d);

                                Pieteikt
                              </button>
                            `
                          : null}
                      </div>
                      ${items.map((a) => {

                        const periodLabel = isCitsType ? extractCitsPeriodLabelLv(a) : "";
                        const notAllDay = Boolean(periodLabel) && String(periodLabel).toLowerCase() !== "visa diena";
                        const pendingMark = (() => {
                          const fn = globalThis.PDDPrombutnesVesture?.isPendingCitsAbsence;
                          const base = typeof fn === "function" ? Boolean(fn(a)) : false;
                          const typeName = a?.type?.name ?? "";
                          const st = String(a?.status ?? "").trim().toLowerCase();
                          const isCitsResolved =
                            isCitsSaskanotsTypeName(typeName) ||

                          return base || fallback;
                        })();
                        return html`
                          <span
                            key=${a.id}
                            role="button"
                            tabindex="0"
                            class="cal-chip"
                            style=${chipStyle(a)}
                            title=${[
                              userDisplayName(a.employee) || "Darbinieks",
                              a.type?.name ?? "",
                              a.status,
                              a.comment
                                ? `Komentārs: ${String(a.comment).replace(/"/g, "'")}`

                            ${userDisplayName(a.employee) || "?"}
                            · ${a.type?.name ?? ""}${
                              isCitsType && periodLabel
                                ? html`
                                    ${notAllDay
                                      ? html`
                                          <svg
                                            width="14"
                                            height="14"
                                            viewBox="0 0 24 24"
                                            fill="none"
                                            stroke="currentColor"
                                            stroke-width="2"

                                            style=${{ marginLeft: "0.5rem", marginRight: "-0.1rem", verticalAlign: "text-bottom" }}

                            }

                                  <span

                                      alignItems: "center",
                                      background: "rgba(220,38,38,0.12)",

                                    title="Gaida apstiprinājumu"
                                  >
                                    Gaida apstiprinājumu
                                  </span>
                                `
                              : null}
                          </span>
                        `;
                      })}
                    </div>
                  `;
                })}
              </div>
            </div>
          `;
        }

                ];
              } else if (uid) {
                const byId = safeList.findIndex((u) => String(u.id) === uid);
                if (byId < 0 && emailKey) {
                  const byEm = safeList.findIndex(
                    (u) => String(userImail(u) ?? "").trim().toLowerCase() === emailKey
                  );
                  if (byEm >= 0) {
                    const row = safeList[byEm];
                    const dbName = String(userDisplayName(row) ?? "").trim();
                    const label = dbName || nm;
                    const merged = normalizeTeamUserRecord({
                      ...row,
                      id: uid,
                      full_name: label,
                      [COL_USER_NAME]: label,
                    });
                    safeList = [merged, ...safeList.filter((_, i) => i !== byEm)];
                  } else {
                    safeList = [
                      normalizeTeamUserRecord({
                        id: uid,
                        full_name: nm,
                        [COL_USER_NAME]: nm,
                        [COL_USER_IMAIL]: sessionEmail || "",
                        [COL_USER_AMATS]: "",
                      }),
                      ...safeList,
                    ];
                  }
                } else if (byId < 0) {
                  safeList = [
                    normalizeTeamUserRecord({
                      id: uid,
                      full_name: nm,
                      [COL_USER_NAME]: nm,
                      [COL_USER_IMAIL]: sessionEmail || "",
                      [COL_USER_AMATS]: "",
                    }),
                    ...safeList,
                  ];
                } else if (byId >= 0 && nm) {
                  const row = safeList[byId];
                  const cur = String(userDisplayName(row) ?? "").trim();
                  if (!cur || cur === emailKey.split("@")[0]) {
                    safeList = [...safeList];
                    safeList[byId] = normalizeTeamUserRecord({
                      ...row,
                      full_name: nm,
                      [COL_USER_NAME]: nm,
                    });
                  }
                }
              }
              setUsers(safeList);
              setSelectedUserId((prev) => {
                const p = prev != null && String(prev).trim() !== "" ? String(prev).trim() : null;
                if (p && safeList.some((u) => String(u.id) === String(p))) return p;
                if (uid && safeList.some((u) => String(u.id) === uid)) return uid;
                const first = String(safeList[0]?.id ?? "").trim();
                if (first) return first;
                return uid || null;
              });
              setSelectedUserIds((prev) => {
                const opts = new Set((safeList ?? []).map((u) => String(u?.id ?? "").trim()).filter(Boolean));
                const valid = Array.isArray(prev)
                  ? prev.map((v) => String(v ?? "").trim()).filter((v) => opts.has(v))
                  : [];
                if (valid.length) return Array.from(new Set(valid));
                if (uid && opts.has(uid)) return [uid];
                const first = String(safeList[0]?.id ?? "").trim();
                return first ? [first] : [];
              });
            })();
            return () => {
              cancelled = true;
            };
          }, [userId, sessionEmail, actorDisplayName]);
          useEffect(() => {
            const uid = String(userId ?? "").trim();
            const label = String(actorDisplayName ?? "").trim();
            if (!uid || !label) return;
            setUsers((prev) => {
              if (!Array.isArray(prev) || !prev.length) return prev;
              const i = prev.findIndex((u) => String(u.id) === uid);
              if (i < 0) return prev;
              const row = prev[i];
              const cur = String(userDisplayName(row) ?? "").trim();
              if (cur === label) return prev;
              const next = [...prev];
              next[i] = normalizeTeamUserRecord({
                ...row,
                full_name: label,
                [COL_USER_NAME]: label,
              });
              return next;
            });
          }, [userId, actorDisplayName]);
          useEffect(() => {
            if (!presetDate) return;
            setStartDate(presetDate);
            setEndDate(presetDate);
            onConsumePreset?.();
          }, [presetDate, onConsumePreset]);
          useEffect(() => {
            if (!isLocalMode()) return;
            setCitsRows(getLocalCitsRequests());
          }, []);

          const citsVisibleRows = useMemo(() => {
            const all = citsRows ?? [];
            return all
              .filter((r) => canApproveRequests || String(r.user_id) === String(userId))
              .sort((a, b) => String(b.created_at || "").localeCompare(String(a.created_at || "")));
          }, [citsRows, canApproveRequests, userId]);

          function refreshLocalCitsRows() {
            const rows = getLocalCitsRequests();
            setCitsRows(rows);
            return rows;
          }

          function getTokenLink(token) {
            const base = window.location.href.split("?")[0];
            return `${base}?cits=${token}`;
          }

          async function decideLocalCits(row, decision) {
            const reason = String(decisionReason[row.id] ?? "").trim();
            const rows = getLocalCitsRequests();
            const idx = rows.findIndex((x) => String(x.id) === String(row.id));
            if (idx < 0) return;
            const nextStatus = decision === "approve" ? "approved" : "cancelled";
            rows[idx] = {
              ...rows[idx],
              status: nextStatus,
              decision_reason: reason || null,
              decided_at: new Date().toISOString(),
              decided_by: userId,
            };
            setLocalCitsRequests(rows);
            setDecisionReason((m) => ({ ...m, [row.id]: "" }));

            const types2 = getLocalTypes();
            const citsType = types2.find((t) => isCitsSaskanotsTypeName(t.name));
            const abs = getLocalAbsences();
            const pIdx = abs.findIndex(
              (x) =>
                citsType &&
                Number(x.type_id) === Number(citsType.id) &&
                String(x.user_id) === String(row.user_id) &&
                String(x.start_date) === String(row.start_date) &&
                String(x.end_date) === String(row.end_date) &&
                String(x.comment ?? "") === String(row.comment ?? "") &&
                String(x.status) === "pending"
            );
            if (decision === "approve") {
              const nowIso = new Date().toISOString();
              if (pIdx >= 0) {
                abs[pIdx] = { ...abs[pIdx], status: "approved", approved_at: nowIso, approved_by: userId };
              }
            } else if (pIdx >= 0) {
              // Noraidīts: noņemam pending ierakstu no kalendāra.
              abs.splice(pIdx, 1);
            }
            setLocalAbsences(abs);
            refreshLocalCitsRows();
            onCreated?.();
            pushChangeLog(
              decision === "approve" ? "prombutne.cits_apstiprinats" : "prombutne.cits_noraidits",
              `${row.user_id}: ${row.start_date} — ${row.end_date}${reason ? ` (${reason})` : ""}`
            );
          }
          async function handleSubmit(e) {
            e.preventDefault();
            const finalUserIds = Array.from(
              new Set(
                (Array.isArray(selectedUserIds) ? selectedUserIds : [])
                  .map((v) => String(v ?? "").trim())
                  .filter(Boolean)
              )
            );
            const targetUserIds = finalUserIds.length
              ? finalUserIds
              : String(employeeSelectValue ?? "").trim()
                ? [String(employeeSelectValue ?? "").trim()]
                : [];
            const finalUserId = targetUserIds[0] ?? "";
            const replacementUser =
              usersForSelect.find((u) => String(u?.id ?? "") === String(replacementUserId ?? "")) ?? null;
            const replacementLabel = String(userDisplayName(replacementUser) || "").trim();
            if (!typeId || !targetUserIds.length) {
              alert("Nav lietotāju atlase");
              return;
            }
            const typeObj = types.find((t) => String(t.id) === String(typeId));
            const isCitsFlow = typeObj && isCitsSaskanotsTypeName(typeObj.name);
            if (isCitsFlow && targetUserIds.length > 1) {
              alert("Veidam \"Cits (ar vadītāja saskaņojumu)\" vienlaikus var iesniegt tikai vienam darbiniekam.");
              return;
            }
            const requestFromTime = citsAllDay ? null : String(citsFromTime ?? "").trim();
            const requestToTime = citsAllDay ? null : String(citsToTime ?? "").trim();
            setBusy(true);
            try {
              if (isCitsFlow) {
                const to = notifyEmail;
                if (!to || !String(to).includes("@")) {
                  alert("Nav derīga e-pasta adrese saskaņotājam (vadītājs vai apstiprinātājs).");
                  return;
                }
                const nowIso = new Date().toISOString();
                // Saglabājam "Cits" tieši prombutnes_dati ar statusu "pending".
                const { data: inserted, error: insErr } = await supabase
                  .from("prombutnes_dati")
                  .insert({
                    "Vārds uzvārds": finalUserId,
                    type: Number(typeId),
                    Sakuma_datums: startDate,
                    Beigu_datums: endDate,
                    Laiks_no: requestFromTime,
                    Laiks_lidz: requestToTime,
                    Komentārs: normalizeCitsCommentWithPeriodLv({
                      allDay: citsAllDay,
                      fromTime: citsFromTime,
                      toTime: citsToTime,
                      comment,
                    }),
                    Statuss: "pending",
                    Mani_aizvieto: replacementLabel || null,
                    Papildu_info: extraInfo.trim() || null,
                    approved_by: null,
                    created_at: nowIso,
                  })
                  .select("id")
                  .single();
                if (insErr) {
                  alert("Kļūda, saglabājot pieteikumu: " + insErr.message);
                  return;
                }
                const rowId = inserted?.id;
                pushChangeLog(
                  "prombutne.cits_pieteikts",
                  `Darbinieks ${finalUserId}: ${startDate} — ${endDate}`
                );
                const selectedUser = usersForSelect.find((u) => String(u?.id ?? "") === String(finalUserId)) || null;
                const employeeNameForEmail = String(userDisplayName(selectedUser) || finalUserId).trim();
                await ensureDbReadableSession();
                const emailResult = await callSendPddEmail({
                  name: employeeNameForEmail,
                  veids: String(typeObj?.name || "Cits"),
                  type: "cits",
                });
                const resendResult = emailResult?.ok
                  ? { skipped: true, reason: "edge_ok" }
                  : await callPddResendApi({
                      action: "cits_absence_created",
                      absence_id: rowId,
                      notify_manager_email: to,
                      notify_phone: FILE_PDD_SMS_NOTIFY_PHONE,
                    });
                if (!emailResult?.ok && !resendResult?.ok) {
                  const manualLink = `${window.location.href.split("?")[0]}?citsRow=${encodeURIComponent(rowId)}`;
                  openManualCitsEmailFallback({
                    name: employeeNameForEmail,
                    veids: String(typeObj?.name || "Cits"),
                    startDate,
                    endDate,
                    link: manualLink,
                  });

                  let edgeErr =
                    String(
                      emailResult?.body?.error ||
                        emailResult?.raw ||
                        emailResult?.error?.message ||
                        emailResult?.error ||
                        emailResult?.reason ||
                        "",
                    ).trim() || "Nezināma kļūda";
                  const edgeResDet = emailResult?.body?.details;
                  if (edgeResDet != null) {
                    edgeErr +=
                      "\nResend: " +
                      (typeof edgeResDet === "string" ? edgeResDet : JSON.stringify(edgeResDet));
                  }
                  const edgeFailures = Array.isArray(emailResult?.body?.failures) ? emailResult.body.failures : [];
                  const edgeFailuresText = edgeFailures.length
                    ? "\nMēģinājumi:\n" +
                      edgeFailures
                        .map((f, i) => {
                          const via = String(f?.via || "?");
                          const target = String(f?.target || "?");
                          const st = f?.status != null ? ` HTTP ${f.status}` : "";
                          const er = String(f?.error || f?.body?.error || "").trim();
                          return `${i + 1}) ${via} → ${target}${st}${er ? ` :: ${er}` : ""}`;
                        })
                        .join("\n")
                    : "";
                  const edgeWhere = String(emailResult?.fnUrl || "").trim();
                  const edgeStatus = Number.isFinite(Number(emailResult?.status))
                    ? ` (HTTP ${emailResult.status})`
                    : "";

                  const apiErr = (() => {
                    const fromBody = String(
                      resendResult?.body?.error ||
                        resendResult?.error?.message ||
                        resendResult?.error ||
                        "",
                    ).trim();
                    if (fromBody) return fromBody;
                    const r = String(resendResult?.reason || "").trim();
                    if (resendResult?.skipped && r === "no_resend_api_url") {
                      return (
                        "nav ieslēgts (tikai papildu ceļš uz Vercel u.tml.; GitHub Pages to nelieto). " +
                        "Galvenā e-pasta sūtīšana ir caur Supabase Edge Function — salabo to (Secrets, deploy, projekta URL atbilstība)."
                      );
                    }
                    if (resendResult?.skipped && r === "no_session") {
                      return "nav izsaukts — nav sesijas JWT Resend API pieprasījumam.";
                    }
                    if (resendResult?.skipped && r === "edge_ok") return "";
                    if (resendResult?.skipped) return "netika izmantots (skat. iemeslu augšā Edge daļā).";
                    return "Nezināma kļūda";
                  })();
                  const apiStatus = Number.isFinite(Number(resendResult?.status))
                    ? ` (HTTP ${resendResult.status})`
                    : "";

                  const has401 = edgeFailures.some(
                    (f) =>
                      Number(f?.status) === 401 ||
                      String(f?.error || f?.body?.error || "").includes("401"),
                  );
                  const hint401 = has401
                    ? "\n\nĀtri: Edge „sendEmail” → Settings → izslēdz „Verify JWT with legacy secret”, vai repo darbplūsma supabase-edge-email.yml (automātisks deploy)."
                    : "";

                  const techBlock =
                    `Edge Function: ${edgeErr}${edgeStatus}${edgeWhere ? `\nURL: ${edgeWhere}` : ""}${edgeFailuresText}\n` +
                    `API fallback: ${apiErr}${apiStatus}` +
                    hint401;
                  try {
                    console.error("[PDD Cits e-pasts]", techBlock);
                  } catch {
                    /* ignore */
                  }
                  const resendShort =
                    edgeResDet != null
                      ? "\n\n" +
                        (typeof edgeResDet === "object" && edgeResDet && "message" in edgeResDet
                          ? String(edgeResDet.message)
                          : String(typeof edgeResDet === "string" ? edgeResDet : JSON.stringify(edgeResDet)))
                      : "";
                  alert(
                    "Pieteikums saglabāts. E-pasta programmā ir sagatavota vēstule vadītājam — lūdzu nosūti to.\n\n" +
                      "Automātiskais sūtīšanas mēģinājums šoreiz nesanāca." +
                      resendShort +
                      (resendShort ? "" : " Tehnisko tekstu meklē F12 → Console „[PDD Cits e-pasts]”.") +
                      hint401,
                  );
                }
                const base = window.location.href.split("?")[0];
                const link = `${base}?citsRow=${encodeURIComponent(rowId)}`;
                try {
                  await navigator.clipboard.writeText(link);
                } catch {
                  /* ignore clipboard errors */
                }
                setStartDate("");
                setEndDate("");
                setComment("");
                setReplacementUserId("");
                setExtraInfo("");
                setCitsAllDay(true);
                setCitsFromTime("09:00");
                setCitsToTime("17:00");
                setTypeId("");
                setSelectedUserId(null);
                setSelectedUserIds([]);
                onCreated();
                return;
              }
              if (isLocalMode()) {
                const nowIso = new Date().toISOString();
                const rows = getLocalAbsences();
                for (const uid of targetUserIds) {
                  rows.push({
                    id: crypto.randomUUID(),
                    user_id: uid,
                    type_id: Number(typeId),
                    start_date: startDate,
                    end_date: endDate,
                    laiks_no: requestFromTime,
                    laiks_lidz: requestToTime,
                    comment: comment.trim() || null,
                    Mani_aizvieto: replacementLabel || null,
                    Papildu_info: extraInfo.trim() || null,
                    status: "approved",
                    approved_by: userId,
                    approved_at: nowIso,
                    created_at: nowIso,
                  });
                }
                setLocalAbsences(rows);
                pushChangeLog(
                  "prombutne.pievienota",
                  `Darbinieki ${targetUserIds.join(", ")}: ${startDate} — ${endDate}`
                );
              } else {
                const nowIso = new Date().toISOString();
                for (const uid of targetUserIds) {
                  const selectedUser = (users ?? []).find((u) => String(u?.id) === String(uid)) ?? null;
                  const error = await insertAbsenceWithFallback({
                    userId: uid,
                    userName: selectedUser ? userDisplayName(selectedUser) : "",
                    typeId: Number(typeId),
                    startDate,
                    endDate,
                    fromTime: requestFromTime,
                    toTime: requestToTime,
                    comment: comment.trim() || null,
                    replacementUserId: replacementLabel || null,
                    extraInfo: extraInfo.trim() || null,
                    status: "approved",
                    approvedBy: null,
                    approvedAt: nowIso,
                  });
                  if (error) {
                    alert("Kļūda: " + error.message);
                    return;
                  }
                }
              }
              setStartDate("");
              setEndDate("");
              setComment("");
              setReplacementUserId("");
              setExtraInfo("");
              setTypeId("");
              setSelectedUserId(null);
              setSelectedUserIds([]);
              onCreated();
            } finally {
              setBusy(false);
            }
          }
          return html`
            <div class="list-panel">
              <p style=${{ margin: "0 0 0.75rem", fontSize: "0.82rem", color: "var(--muted)" }}>
                <strong>Cits (ar vadītāja saskaņojumu)</strong> — obligāta e-pasta saskaņošana: pieprasījums un saite uz
                <strong> katrina.jirgensone@vid.gov.lv</strong>. Pārējie veidi tiek ierakstīti kā apstiprināti un
                uzreiz redzami kalendārā (bez atsevišķa akcepta soļa šeit).
              </p>
              <form class="stack" onSubmit=${handleSubmit}>
                <div class="field">
                  <label>Darbinieks</label>
                  <div
                    style=${{
                      display: "grid",
                      gap: "0.35rem",
                      maxHeight: "180px",
                      overflow: "auto",
                      border: "1px solid var(--border)",
                      borderRadius: "10px",
                      padding: "0.5rem",
                      background: "var(--bg)",
                    }}
                  >
                    ${usersForSelect.map((u) => {
                      const uid = String(u?.id ?? "").trim();
                      const checked = selectedUserIds.includes(uid);
                      return html`
                        <label
                          key=${`emp-chk-${uid}`}
                          style=${{
                            display: "flex",
                            alignItems: "center",
                            gap: "0.45rem",
                            fontSize: "0.9rem",
                          }}
                        >
                          <input
                            type="checkbox"
                            checked=${checked}
                            onChange=${(ev) => {
                              const isOn = Boolean(ev.target.checked);
                              setSelectedUserIds((prev) => {
                                const list = Array.isArray(prev) ? [...prev] : [];
                                const has = list.includes(uid);
                                if (isOn && !has) list.push(uid);
                                if (!isOn && has) {
                                  const i = list.indexOf(uid);
                                  if (i >= 0) list.splice(i, 1);
                                }
                                setSelectedUserId(list[0] ?? null);
                                return list;
                              });
                            }}
                          />
                          <span>${userDisplayName(u)}</span>
                        </label>
                      `;
                    })}
                  </div>
                  <span style=${{ fontSize: "0.78rem", color: "var(--muted)" }}>
                    ${selfRowLabel
                      ? html`Pēc noklusējuma izvēlēts: <strong>${selfRowLabel}</strong>. Vari atzīmēt vairākus darbiniekus uzreiz.`
                      : html`Ielādē tavu vārdu no konta…`}
                  </span>
                </div>
                <div class="field">
                  <label for="ptype">Veids</label>
                  <select
                    id="ptype"
                    class="select"
                    required
                    value=${typeId}
                    onChange=${(ev) => setTypeId(ev.target.value)}
                  >
                    <option value="">Izvēlies veidu</option>
                    ${types.map(
                      (t) => html`
                        <option key=${t.id} value=${t.id}>${t.name}</option>
                      `
                    )}
                  </select>
                </div>
                <div class="row" style=${{ gap: "0.75rem" }}>
                  <div class="field" style=${{ flex: "1 1 140px" }}>
                    <label for="pstart">No</label>
                    <input
                      id="pstart"
                      type="date"
                      class="input"
                      required
                      value=${startDate}
                      onChange=${(ev) => setStartDate(ev.target.value)}
                    />
                  </div>
                  <div class="field" style=${{ flex: "1 1 140px" }}>
                    <label for="pend">Līdz</label>
                    <input
                      id="pend"
                      type="date"
                      class="input"
                      required
                      value=${endDate}
                      onChange=${(ev) => setEndDate(ev.target.value)}
                    />
                  </div>
                </div>

                ${typeId
                  ? html`
                      <div class="field" style=${{ marginTop: "-0.15rem" }}>
                        <label style=${{ display: "flex", alignItems: "center", gap: "0.55rem" }}>
                          <input
                            type="checkbox"
                            checked=${citsAllDay}
                            onChange=${(ev) => setCitsAllDay(Boolean(ev.target.checked))}
                          />
                          Visa diena
                        </label>
                      </div>
                      ${citsAllDay
                        ? null
                        : html`
                            <div class="row" style=${{ gap: "0.75rem" }}>
                              <div class="field" style=${{ flex: "1 1 140px" }}>
                                <label for="cits-from">Laiks no</label>
                                <input
                                  id="cits-from"
                                  type="time"
                                  class="input"
                                  value=${citsFromTime}
                                  onChange=${(ev) => setCitsFromTime(ev.target.value)}
                                  required
                                />
                              </div>
                              <div class="field" style=${{ flex: "1 1 140px" }}>
                                <label for="cits-to">${TIKAI_VIENKARSI_SKATS ? "Līdz" : "Laiks līdz"}</label>
                                <input
                                  id="cits-to"
                                  type="time"
                                  class="input"
                                  value=${citsToTime}
                                  onChange=${(ev) => setCitsToTime(ev.target.value)}
                                  required
                                />
                              </div>
                            </div>
                          `}
                    `
                  : null}

                <div class="field">
                  <label for="pcom">Komentārs</label>
                  <textarea
                    id="pcom"
                    class="textarea"
                    placeholder="Nav obligāts"
                    value=${comment}
                    onChange=${(ev) => setComment(ev.target.value)}
                  />
                </div>
                <p class="app-sub" style=${{ margin: "-0.15rem 0 0.1rem", fontWeight: 700 }}>
                  <strong>Ievieto papildus, ja vēlies</strong>
                </p>
                <div class="field">
                  <label for="preplace">Mani aizvieto</label>
                  <select
                    id="preplace"
                    class="select"
                    value=${replacementUserId}
                    onChange=${(ev) => setReplacementUserId(String(ev.target.value || "").trim())}
                  >
                    <option value="">Nav norādīts</option>
                    ${usersForSelect.map(
                      (u) => html`
                        <option key=${`rep-${u.id}`} value=${u.id}>${userDisplayName(u)}</option>
                      `
                    )}
                  </select>
                </div>
                <div class="field">
                  <label for="pextra">
                    Papildu informācija, piem., Būšu pieejama telefoniski, vai Raksti man Watsapp u.t.t.
                  </label>
                  <textarea
                    id="pextra"
                    class="textarea"
                    placeholder="Brīvā teksta lauks (nav obligāts)"
                    value=${extraInfo}
                    onChange=${(ev) => setExtraInfo(ev.target.value)}
                  />
                </div>
                <div class="row" style=${{ gap: "0.5rem", flexWrap: "wrap" }}>
                  <button type="submit" class="btn btn-primary" disabled=${busy}>
                    ${busy ? "Sūta…" : "Iesniegt"}
                  </button>
                  <button type="button" class="btn btn-ghost" disabled=${busy} onClick=${cancelAbsenceForm}>
                    Atcelt
                  </button>
                </div>
              </form>
              ${isLocalMode()
                ? html`
                    <div class="list-panel" style=${{ marginTop: "0.9rem", background: "var(--bg)" }}>
                      <h3 style=${{ margin: "0 0 0.5rem", fontSize: "0.95rem" }}>Saskaņošanas pieprasījumi</h3>
                      <div class="table-wrap">
                        <table class="hist-table">
                          <thead>
                            <tr>
                              <th>Darbinieks</th>
                              <th>Periods</th>
                              <th>Statuss</th>
                              <th>Iemesls</th>
                              ${canApproveRequests ? html`<th>Darbība</th>` : null}
                            </tr>
                          </thead>
                          <tbody>
                            ${citsVisibleRows.length
                              ? citsVisibleRows.map((r) => {
                                  const emp = users.find((u) => String(u.id) === String(r.user_id));
                                  const status = localCitsStatusLabel(r.status);
                                  const pending = r.status === "pending_manager";
                                  return html`
                                    <tr key=${r.id}>
                                      <td>${emp ? userDisplayName(emp) : r.user_id}</td>
                                      <td>${formatDateLv(r.start_date)} — ${formatDateLv(r.end_date)}</td>

                                        ? html`
                                            <td>
                                              ${pending
                                                ? html`

                                                      <input
                                                        class="input"
                                                        placeholder="Iemesls (pēc izvēles)"
                                                        value=${decisionReason[r.id] ?? ""}

                                                          setDecisionReason((m) => ({ ...m, [r.id]: e.target.value }))

                                                      <div class="row" style=${{ gap: "0.35rem" }}>

                                                        </button>
                                                        <button type="button" class="btn btn-ghost btn-small" onClick=${() => decideLocalCits(r, "reject")}>
                                                          Noraidīt
                                                        </button>
                                                        <button
                                                          type="button"
                                                          class="btn btn-ghost btn-small"
                                                          onClick=${() =>
                                                            setDecisionReason((m) => {
                                                              const n = { ...m };
                                                              delete n[r.id];
                                                              return n;
                                                            })
                                                          }

                                                        </button>
                                                      </div>
                                                    </div>
                                                  `
                                                : html`<span style=${{ color: "var(--muted)", fontSize: "0.82rem" }}>Apstrādāts</span>`}

                                    <td colspan=${canApproveRequests ? 5 : 4} style=${{ color: "var(--muted)", fontStyle: "italic" }}>

        /** Izvēlnēm: kā DB — Vārds uzvārds, i-mail, loma. */
        function formatUserSelectLabel(u) {
          const name = userDisplayName(u);
          const role = u?.role && u.role !== "user" ? ` · ${u.role}` : "";
          return `${name}${role}`;
        }

        // Komanda: parādām tikai Vārds uzvārds, e-pasts un Amats.
        // Atbilstoši migrācijām `i-mail` tiek sinhronizēts no auth email (`users.email`),
        // bet UI mēs to rādām kā "e-pasts".
        const USER_TABLE_COL_DEFS = [
          { key: "role", label: "LOMA" },
          { key: COL_USER_NAME, label: "Vārds uzvārds" },
          { key: COL_USER_IMAIL, label: "e-pasts" },
          { key: COL_USER_AMATS, label: "Amats" },
          { key: COL_USER_AIZVIETO, label: "Aizvieto" },
        ];

        function teamUsersTableColumns(_users) {
          const labels = Object.fromEntries(USER_TABLE_COL_DEFS.map((c) => [c.key, c.label]));
          const cols = USER_TABLE_COL_DEFS.map((c) => c.key);
          return { cols, labels };
        }

        function formatUserTableCell(key, val) {
          if (val == null || val === "") return "—";
          if (key === "role") {
            const s = String(val);
            return s.length > 0 ? s[0].toUpperCase() + s.slice(1) : s;
          }
          if ((key === "email" || key === COL_USER_IMAIL) && String(val).includes("@")) return String(val);
          if (typeof val === "string" && /^\d{4}-\d{2}-\d{2}T/.test(val)) {
            return val.replace("T", " ").slice(0, 19);
          }
          return String(val);
        }

        function buildUserRowPayload(vardUzv, imail, amats, role) {
          const v = String(vardUzv ?? "").trim();
          const i = String(imail ?? "").trim();
          const a = String(amats ?? "").trim();
          return {
            [COL_USER_NAME]: v || null,
            [COL_USER_IMAIL]: i || null,
            ["e-mail"]: i || null,
            [COL_USER_AMATS]: a || null,
            // DB pusē: izmantojam tikai kolonu "role" (teksts).
            role: normalizeUserRole(role),
            full_name: v || null,
            email: i || null,
          };
        }

        function isValidUuid(s) {
          return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(

        function DeputyDelegePanel({
          teamUsers,
          approverCols,
          deputyUserId,
          deputyValidFrom,
          deputyValidTo,
          onDeputyChange,
          currentUserId,
        }) {
          const [sel, setSel] = useState(() => (deputyUserId ? String(deputyUserId) : DEPUTY_OPT_MANAGER));
          const [periodFrom, setPeriodFrom] = useState(deputyValidFrom ?? "");
          const [periodTo, setPeriodTo] = useState(deputyValidTo ?? "");
          const [busy, setBusy] = useState(false);
          const [msg, setMsg] = useState(null);
          const [resetManagerOpen, setResetManagerOpen] = useState(false);
          useEffect(() => {
            setSel(deputyUserId ? String(deputyUserId) : DEPUTY_OPT_MANAGER);
            setPeriodFrom(deputyValidFrom ?? "");
            setPeriodTo(deputyValidTo ?? "");
          }, [deputyUserId, deputyValidFrom, deputyValidTo]);
          function revertDeputyDraft() {
            setSel(deputyUserId ? String(deputyUserId) : DEPUTY_OPT_MANAGER);
            setPeriodFrom(deputyValidFrom ?? "");
            setPeriodTo(deputyValidTo ?? "");
            setMsg(null);
          }
          async function persist(nextId, fromStr, toStr) {
            setBusy(true);
            setMsg(null);
            try {
              if (isLocalMode()) {
                if (nextId) localStorage.setItem(LS_LOCAL_DEPUTY_USER_ID, nextId);
                else localStorage.removeItem(LS_LOCAL_DEPUTY_USER_ID);
                if (fromStr) localStorage.setItem(LS_LOCAL_DEPUTY_FROM, fromStr);
                else localStorage.removeItem(LS_LOCAL_DEPUTY_FROM);
                if (toStr) localStorage.setItem(LS_LOCAL_DEPUTY_TO, toStr);
                else localStorage.removeItem(LS_LOCAL_DEPUTY_TO);
                await onDeputyChange();
                setMsg(
                  nextId
                    ? "Apstiprinātājs un periods saglabāti (vietējais režīms)."
                    : "Atiestatīts uz pamatvadītāju (vietējais režīms)."
                );
                return;
              }
              const managerUser = resolveManagerUser(teamUsers ?? []);
              if (!managerUser) {
                setMsg("Neizdevās atrast pamatvadītāju users tabulā.");
                return;
              }
              if (window.SASKANOSANA?.saveState) {
                const res = await window.SASKANOSANA.saveState(
                  supabase,
                  DEFAULT_MANAGER_NAME,
                  nextId || null,
                  fromStr || null,
                  toStr || null
                );
                if (res?.error) {
                  setMsg(res.error.message || "Neizdevās saglabāt saskaņošanu.");
                  return;
                }
                await onDeputyChange();
                setMsg(nextId ? "Apstiprinātājs saglabāts norādītajam periodam." : "Atiestatīts uz pamatvadītāju.");
                return;
              }
              const colsDefault = approverCols ?? {
                status: COL_USER_APPROVER_STATUS,
                from: COL_USER_APPROVER_FROM,
                to: COL_USER_APPROVER_TO,
              };
              // Kolonnas nosakām no RAW DB rindas, nevis no normalizētā objekta.
              const probe = await supabase.from("users").select("*").limit(1);
              const cols = probe.error
                ? colsDefault
                : detectUserApproverColumns(Array.isArray(probe.data) ? probe.data : []);

              async function runUsersUpdateWithColumnPruning(buildQuery, payload) {
                const draft = { ...payload };
                let lastError = null;
                for (let i = 0; i < 6; i++) {
                  const { error } = await buildQuery(draft);
                  if (!error) return null;
                  lastError = error;
                  const msg = String(error?.message || "");
                  const m =
                    /Could not find the '([^']+)' column/i.exec(msg) ||
                    /'([^']+)' column/i.exec(msg);
                  const missing = m?.[1];
                  if (missing && Object.prototype.hasOwnProperty.call(draft, missing)) {
                    delete draft[missing];
                    continue;
                  }
                  break;
                }
                return lastError;
              }

              const clearErr = await runUsersUpdateWithColumnPruning(
                (p) =>
                  supabase
                    .from("users")
                    .update(p)
                    .not("id", "is", null),
                {
                  [cols.status]: null,
                  [cols.from]: null,
                  [cols.to]: null,
                }
              );
              if (clearErr) {
                setMsg(clearErr.message);
                return;
              }

              const markMgrErr = await runUsersUpdateWithColumnPruning(
                (p) =>
                  supabase
                    .from("users")
                    .update(p)
                    .eq("id", managerUser.id),
                {
                  [cols.status]: "pec noklusējuma vienmēr",
                  [cols.from]: null,
                  [cols.to]: null,
                }
              );
              if (markMgrErr) {
                setMsg(markMgrErr.message);
                return;
              }
              const targetApproverId = nextId || managerUser?.id || null;
              if (targetApproverId && nextId) {
                const deputyErr = await runUsersUpdateWithColumnPruning(
                  (p) =>
                    supabase
                      .from("users")
                      .update(p)
                      .eq("id", targetApproverId),
                  {
                    [cols.status]: "uz noteikto periodu",
                    [cols.from]: fromStr,
                    [cols.to]: toStr,
                  }
                );
                if (deputyErr) {
                  setMsg(deputyErr.message);
                  return;
                }
              }
              await onDeputyChange();
                setMsg(nextId ? "Apstiprinātājs saglabāts norādītajam periodam." : "Atiestatīts uz pamatvadītāju.");
            } finally {
              setBusy(false);
            }
          }
          async function saveForm(e) {
            e.preventDefault();
            const isMgrOpt = sel === DEPUTY_OPT_MANAGER;
            const nextId = isMgrOpt ? null : sel;
            const fromStr = isMgrOpt ? "" : periodFrom.trim();
            const toStr = isMgrOpt ? "" : periodTo.trim();
            if (!isMgrOpt) {
              if (!fromStr || !toStr) {
                alert("Apstiprinātāja termiņš ir obligāts: norādi datumus „no” un „līdz”.");
                return;
              }
              if (fromStr > toStr) {
                alert("Datums „no” nevar būt pēc „līdz”.");
                return;
              }
            }
            await persist(nextId, fromStr, toStr);
          }
          async function resetToManager() {
            setSel(DEPUTY_OPT_MANAGER);
            setPeriodFrom("");
            setPeriodTo("");
            setResetManagerOpen(false);
            await persist(null, "", "");
          }
          const showPeriod = sel !== DEPUTY_OPT_MANAGER;
          return html`
            <div class="list-panel" style=${{ marginTop: "0.85rem" }}>
