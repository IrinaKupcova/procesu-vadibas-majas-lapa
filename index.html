                : null}
              ${promSub === "teamUsers"
                ? html`
                    <${TeamUsersDirectory}
                      users=${teamUsers}
                      canAdmin=${normalizeUserRole(rawRole ?? role) === "admin"}
                      currentUserId=${userId}
                      onReload=${reloadUsersAndViews}
                    />
                  `
                : null}
              ${promSub === "changes"
                ? html`<${ChangeHistoryPanel} isAdmin=${normalizeUserRole(role) === "admin"} />`
                : null}
            </section>
          `;
        }

        function ChangeHistoryPanel({ isAdmin }) {
          const [logs, setLogs] = useState([]);
          const [page, setPage] = useState(0);
          const PAGE_SIZE = 20;

          const refreshLogs = useCallback(async () => {
            const data = await fetchAuditLogs();
            setLogs(data);
          }, []);

          useEffect(() => {
            void refreshLogs();
          }, [refreshLogs]);

          const total = logs.length;
          const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
          const safePage = Math.min(page, totalPages - 1);
          const pageRows = logs.slice(safePage * PAGE_SIZE, safePage * PAGE_SIZE + PAGE_SIZE);

          if (!isAdmin) {
            return html`
              <section class="list-panel">
                <h2 style=${{ margin: "0 0 0.5rem" }}>Auditācijas vēsture</h2>
                <p style=${{ margin: 0, color: "var(--muted)" }}>
                  Šī sadaļa pieejama tikai Admin lietotājiem.
                </p>
              </section>
            `;
          }

          return html`
            <section class="list-panel">
              <div class="row" style=${{ justifyContent: "space-between", alignItems: "center", marginBottom: "0.65rem" }}>
                <h2 style=${{ margin: 0, fontSize: "1rem" }}>Auditācijas vēsture</h2>
                <button type="button" class="btn btn-ghost btn-small" onClick=${() => void refreshLogs()}>
                  Atjaunot
                </button>
              </div>
              <div class="table-wrap">
                <table class="hist-table">
                  <thead>
                    <tr>
                      <th>Laiks</th>
                      <th>Lietotājs</th>
                      <th>Darbība</th>
                      <th>Detaļas</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${pageRows.length
                      ? pageRows.map((r) => html`
                          <tr key=${r.id}>
                            <td>${r.ts ? String(r.ts).replace("T", " ").slice(0, 16) : "—"}</td>
                            <td>${r.actor_name ?? "—"}</td>
                            <td>${r.action ?? "—"}</td>
                            <td>${r.details ?? "—"}</td>
                          </tr>
                        `)
                      : html`
                          <tr>
                            <td colspan="4" style=${{ color: "var(--muted)", fontStyle: "italic" }}>Nav izmaiņu ierakstu.</td>
                          </tr>
                        `}
                  </tbody>
                </table>
              </div>
              ${total > PAGE_SIZE
                ? html`
                    <div class="row" style=${{ justifyContent: "space-between", marginTop: "0.6rem" }}>
                      <span style=${{ color: "var(--muted)", fontSize: "0.82rem" }}>
                        Lapa ${safePage + 1} / ${totalPages} · ${total} ieraksti
                      </span>
                      <div class="row" style=${{ gap: "0.35rem" }}>
                        <button type="button" class="btn btn-ghost btn-small" disabled=${safePage <= 0} onClick=${() => setPage((p) => Math.max(0, p - 1))}>Iepriekšējā</button>
                        <button type="button" class="btn btn-ghost btn-small" disabled=${safePage >= totalPages - 1} onClick=${() => setPage((p) => Math.min(totalPages - 1, p + 1))}>Nākamā</button>
                      </div>
                    </div>
                  `
                : null}
            </section>
          `;
        }

        function App() {
          const { session, loading } = useSession();
          const { profile, loading: profileLoading } = useProfile(session?.user?.id, session?.user?.email);
          /** `??` neaizstāj tukšu virkni — normalizēts profils var dot id "", tad jāņem auth/local uid. */
          const effectiveUserId = (() => {
            const a = String(profile?.id ?? "").trim();
            const b = String(session?.user?.id ?? "").trim();
            return a || b || null;
          })();
          const actorDisplayName = useMemo(() => {
            if (!session?.user) return "";
            let name = "";
            if (profile) {
              const pn = userDisplayName(profile);
              if (pn) name = String(pn).trim();
            }
            if (!name) {
              const meta = session.user.user_metadata ?? {};
              name = String(meta.full_name ?? meta.name ?? meta.first_name ?? "").trim();
              const fn = String(meta.first_name ?? "").trim();
              const ln = String(meta.last_name ?? "").trim();
              if (!name && (fn || ln)) name = `${fn} ${ln}`.trim();
            }
            const em = String(
              profile?.email ?? session.user.email ?? sessionStorage.getItem(LS_LOCAL_EMAIL) ?? ""
            ).trim();
            if (!name && em) name = em.split("@")[0].trim();
            return name;
          }, [session?.user, profile]);
          const [view, setView] = useState("home");
          const [promSub, setPromSub] = useState("calendar");
          const [navPast, setNavPast] = useState([]);
          const [darbaUzdevumiFocus, setDarbaUzdevumiFocus] = useState(null);
          const APP_CHANGES_SEEN_KEY = "pdd_app_changes_seen_stamp_v1";
          const [showPddAppChangesBadge, setShowPddAppChangesBadge] = useState(false);
          const PINNED_SECTIONS_LS_KEY = "pdd_pinned_sections_v1";
          function makeSectionLabel(sectionView, sectionPromSub, sectionAnchor) {
            if (sectionView === "home") return "Sākums";
            if (sectionView === "team") return "Komanda";
            if (sectionView === "darbaUzdevumiIad" && sectionAnchor === "iad-current") return "IaD: Aktuālie";
            if (sectionView === "darbaUzdevumiIad" && sectionAnchor === "iad-done") return "IaD: Neaktuālie";
            if (sectionView === "darbaUzdevumiIad") return "IaD ieteikumi";
            if (sectionView === "aktualitatesHistory") return "Aktualitāšu vēsture";
            if (sectionView === "pddAppChanges") return "Izmaiņas PDD aplikācijā";
            if (sectionView !== "prombutnes") return "Sadaļa";
            if (sectionPromSub === "request") return "Prombūtnes pieteikums";
            if (sectionPromSub === "history") return "Prombūtnes vēsture";
            if (sectionPromSub === "changes") return "Auditācijas vēsture";
            if (sectionPromSub === "deputy") return "Apstiprinātāja maiņa";
            if (sectionPromSub === "teamUsers") return "Komanda";
            return "Prombūtnes kalendārs";
          }
          function normalizeSection(sectionView, sectionPromSub, sectionAnchor) {
            const safeView = String(sectionView ?? "").trim();
            const safePromSub = String(sectionPromSub ?? "").trim();
            const safeAnchor = String(sectionAnchor ?? "").trim();
            if (!safeView) return null;
            const normalizedSub = safeView === "prombutnes" ? safePromSub || "calendar" : "";
            const key = `${safeView}:${normalizedSub}:${safeAnchor}`;
            return {
              key,
              view: safeView,
              promSub: normalizedSub,
              anchor: safeAnchor,
              label: makeSectionLabel(safeView, normalizedSub, safeAnchor),
            };
          }
          function makeIadListPinnedSection(listKey) {
            const normalized = String(listKey ?? "").trim().toLowerCase();
            const anchor = normalized === "done" ? "iad-done" : normalized === "current" ? "iad-current" : "";
            if (!anchor) return null;
            return normalizeSection("darbaUzdevumiIad", "", anchor);
          }
          const [pinnedSections, setPinnedSections] = useState(() => {
            try {
              const raw = localStorage.getItem(PINNED_SECTIONS_LS_KEY);
              if (!raw) return [];
              const parsed = JSON.parse(raw);
              if (!Array.isArray(parsed)) return [];
              return parsed
                .map((x) => normalizeSection(x?.view, x?.promSub, x?.anchor))
                .filter(Boolean)
                .slice(0, 12);
            } catch (_) {
              return [];
            }
          });
          useEffect(() => {
            try {
              localStorage.setItem(PINNED_SECTIONS_LS_KEY, JSON.stringify(pinnedSections));
            } catch (_) {}
          }, [pinnedSections]);
          const currentSection = normalizeSection(view, view === "prombutnes" ? promSub : "");
          const isCurrentSectionPinned = useMemo(
            () => Boolean(currentSection && pinnedSections.some((x) => x.key === currentSection.key)),
            [currentSection, pinnedSections]
          );
          const handleChangeView = useCallback((v) => {
            if (v === view) {
              if (v === "prombutnes") {
                setNavPast((p) => [...p, { view, promSub }]);
                setPromSub("calendar");
              }
              return;
            }
            setNavPast((p) => [...p, { view, promSub }]);
            setView(v);
            if (v === "prombutnes") setPromSub("calendar");
            if (v !== "darbaUzdevumiIad") setDarbaUzdevumiFocus(null);
          }, [view, promSub]);
          const handlePromSubChange = useCallback((sub) => {
            setNavPast((p) => [...p, { view, promSub }]);
            setPromSub(sub);
            setView("prombutnes");
          }, [view, promSub]);
          const handleGoBack = useCallback(() => {
            setNavPast((p) => {
              if (p.length === 0) return p;
              const prev = p[p.length - 1];
              const next = p.slice(0, -1);
              queueMicrotask(() => {
                setView(prev.view);
                setPromSub(prev.promSub);
              });
              return next;
            });
          }, []);
          const handlePinCurrentSection = useCallback(() => {
            if (!currentSection) return;
            setPinnedSections((prev) => {
              if (prev.some((x) => x.key === currentSection.key)) return prev;
              return [...prev, currentSection];
            });
          }, [currentSection]);
          const handleUnpinSection = useCallback((sectionKey) => {
            setPinnedSections((prev) => prev.filter((x) => x.key !== sectionKey));
          }, []);
          const handleOpenPinnedSection = useCallback((item) => {
            if (!item?.view) return;
            if (item.view === "prombutnes") {
              handlePromSubChange(item.promSub || "calendar");
            } else if (item.view === "darbaUzdevumiIad" && item.anchor) {
              const listKey = item.anchor === "iad-done" ? "done" : "current";
              setDarbaUzdevumiFocus({ submodule: "iad", listKey });
              handleChangeView("darbaUzdevumiIad");
            } else {
              handleChangeView(item.view);
            }
          }, [handleChangeView, handlePromSubChange]);
          const handleIadListPinChange = useCallback((listKey, shouldPin) => {
            const section = makeIadListPinnedSection(listKey);
            if (!section) return;
            setPinnedSections((prev) => {
              const exists = prev.some((x) => x.key === section.key);
              if (shouldPin) {
                if (exists) return prev;
                return [...prev, section];
              }
              if (!exists) return prev;
              return prev.filter((x) => x.key !== section.key);
            });
          }, []);
          const iadPinnedListKeys = useMemo(
            () => ({
              current: pinnedSections.some((x) => x.anchor === "iad-current"),
              done: pinnedSections.some((x) => x.anchor === "iad-done"),
            }),
            [pinnedSections]
          );
          const [pendingCitsNav, setPendingCitsNav] = useState(false);
          const [homeAbsencesSnapshot, setHomeAbsencesSnapshot] = useState([]);
          const refreshAppChangesBadge = useCallback(async () => {
            try {
              const M = globalThis.PDD_IZMAINAS;
              const sb = globalThis.__PDD_SUPABASE__;
              if (!M?.fetchRows || !M?.latestStamp || !sb || TIKAI_VIENKARSI_SKATS || isLocalMode()) {
                setShowPddAppChangesBadge(false);
                return;
              }
              await ensureDbReadableSession();
              const rows = await M.fetchRows(sb);
              const latest = String(M.latestStamp(rows) || "").trim();
              const seen = String(localStorage.getItem(APP_CHANGES_SEEN_KEY) || "").trim();
              setShowPddAppChangesBadge(Boolean(latest && latest !== seen));
            } catch {
              setShowPddAppChangesBadge(false);
            }
          }, []);
          const onAbsencesSnapshot = useCallback((list, uid, canAppr) => {
            const V = globalThis.PDDPrombutnesVesture;
            setPendingCitsNav(Boolean(V?.shouldShowPendingCitsNavBadge?.(list, uid, canAppr)));
            setHomeAbsencesSnapshot(Array.isArray(list) ? list : []);
          }, []);
          useEffect(() => {
            let cancelled = false;
            (async () => {
              if (!session?.user || !supabase) return;
              if (homeAbsencesSnapshot.length > 0) return;
              await ensureDbReadableSession();
              const { data: rows } = await supabase.from("prombutnes_dati").select("*");
              const { data: profs } = await supabase.from("users").select("*");
              const { data: typesRows } = await supabase.from("prombutnes_veidi").select("*");
              if (cancelled) return;
              const pmap = new Map((profs ?? []).map((p) => [String(p.id), normalizeTeamUserRecord(p)]));
              const tmap = new Map(
                (typesRows ?? []).map((t) => {
                  const nt = normalizeAbsenceTypeRecord(t);
                  return [String(nt.id), nt];
                })
              );
              const list = (rows ?? [])
                .map((r) => {
                  detectAbsenceColumnsFromRow(r);
                  return normalizeAbsenceRecord(r);
                })
                .map((r) => {
                  const employee = pmap.get(String(r.user_id)) ?? null;
                  const dn = userDisplayName(employee);
                  const employeeName =
                    dn ||
                    String(r["Vārds uzvārds"] ?? r["Vards uzvards"] ?? "").trim() ||
                    String(r.user_id ?? "").trim();
                  return {
                    ...r,
                    employee: employee
                      ? { ...employee, [COL_USER_NAME]: employeeName }
                      : { id: r.user_id, [COL_USER_NAME]: employeeName },
                    type: tmap.get(String(r.type_id ?? "")) ?? null,
                  };
                });
              setHomeAbsencesSnapshot(list);
            })();
            return () => {
              cancelled = true;
            };
          }, [session?.user, homeAbsencesSnapshot.length]);
          useEffect(() => {
            void refreshAppChangesBadge();
          }, [refreshAppChangesBadge]);
          useEffect(() => {
            if (view !== "pddAppChanges") return;
            (async () => {
              try {
                const M = globalThis.PDD_IZMAINAS;
                const sb = globalThis.__PDD_SUPABASE__;
                if (!M?.fetchRows || !M?.latestStamp || !sb) return;
                await ensureDbReadableSession();
                const rows = await M.fetchRows(sb);
                const latest = String(M.latestStamp(rows) || "").trim();
                if (latest) localStorage.setItem(APP_CHANGES_SEEN_KEY, latest);
                setShowPddAppChangesBadge(false);
              } catch {
                // ignore
              }
            })();
          }, [view]);
          useEffect(() => {
            const sb = globalThis.__PDD_SUPABASE__;
            if (!sb || isLocalMode() || TIKAI_VIENKARSI_SKATS) return undefined;
            let ch = null;
            let cancelled = false;
            (async () => {
              try {
                let tbl = "";
                for (const name of ["Aplikacijas_papildinajums", "aplikacijas_papildinajums", "Aplikacijas_papildinājums", "aplikacijas_papildinājums"]) {
                  const probe = await sb.from(name).select("*").limit(1);
                  if (!probe.error) {
                    tbl = name;
                    break;
                  }
                }
                if (cancelled || !tbl) return;
                ch = sb
                  .channel("pdd-app-changes-nav")
                  .on("postgres_changes", { event: "*", schema: "public", table: tbl }, () => void refreshAppChangesBadge())
                  .subscribe();
              } catch {
                // ignore
              }
            })();
            return () => {
              cancelled = true;
              if (ch) void sb.removeChannel(ch);
            };
          }, [refreshAppChangesBadge]);
          useEffect(() => {
            if (!session?.user) {
              globalThis.__PDD_ACTOR_DISPLAY_NAME__ = "";
              globalThis.__PDD_ACTOR_EMAIL__ = "";
              globalThis.__PDD_SESSION_USER_ID__ = "";
              globalThis.__PDD_ACTOR_ROLE__ = "";
              return;
            }
            globalThis.__PDD_SESSION_USER_ID__ = String(session.user.id ?? "").trim();
            globalThis.__PDD_ACTOR_ROLE__ = String(profile?.role ?? "").trim().toLowerCase();
            const em = String(profile?.email ?? session.user.email ?? "").trim();
            globalThis.__PDD_ACTOR_EMAIL__ = em;
            let name = "";
            if (profile) {
              const pn = userDisplayName(profile);
              if (pn) name = String(pn).trim();
            }
            if (!name) {
              const meta = session.user.user_metadata ?? {};
              name = String(meta.full_name ?? meta.name ?? meta.first_name ?? "").trim();
              const fn = String(meta.first_name ?? "").trim();
              const ln = String(meta.last_name ?? "").trim();
              if (!name && (fn || ln)) name = `${fn} ${ln}`.trim();
            }
            if (!name && em) name = em.split("@")[0].trim();
            globalThis.__PDD_ACTOR_DISPLAY_NAME__ = name;
          }, [session?.user, profile, profileLoading]);
          const showPromDeputyTab = false;
          const [citsToken, setCitsToken] = useState(() => readCitsTokenFromUrl());
          const title = useMemo(
            () => html`
              <div class="app-brand">
                <img
                  src="./public/pdd-logo-labots.png?v=1"
                  alt="PDD logo"
                  class="app-brand-logo"
                  onClick=${(e) => e.currentTarget.classList.toggle("is-zoomed")}
                />
                <div>
                  <h1 class="app-title">PDD aplikācija</h1>
                  <p class="app-sub">Pakalpojumu dizaina daļa — darba organizācija</p>
                </div>
              </div>
            `,
            []
          );

          if (citsToken) {
            if (TIKAI_VIENKARSI_SKATS) {
              return html`
                <div class="app-shell">
                  ${title}
                  <${CitsPublicApprove}
                    token=${citsToken}
                    sessionUserId=${session?.user?.id ?? null}
                    profileRole=${profile?.role ?? "user"}
                    onDone=${() => {
                      setCitsToken("");
                      stripCitsFromUrl();
                    }}
                  />
                </div>
              `;
            }
            if (isLocalMode() && !localSessionActive()) {
              return html`
                <div class="app-shell">
                  ${title}
                  <${LocalEmailLoginScreen} />
                </div>
              `;
            }
            if (configured() && !isLocalMode()) {
              if (loading) {
                return html`
                  <div class="app-shell">
                    ${title}
                    <p style=${{ color: "var(--muted)" }}>Ielādē…</p>
                  </div>
                `;
              }
              if (!session?.user) {
                return html`
                  <div class="app-shell">
                    ${title}
                    <div class="banner-warn" role="alert" style=${{ marginBottom: "1rem", fontSize: "0.9rem" }}>
                      Lai apstiprinātu „Cits (ar vadītāja saskaņojumu)”, ielogojies. Apstiprināt drīkst tikai vadītājs
                      vai norādītais aktīvais aizvietotājs.
                    </div>
                    <${AuthScreen} />
                  </div>
                `;
              }
              if (profileLoading) {
                return html`
                  <div class="app-shell">
                    ${title}
                    <p style=${{ color: "var(--muted)" }}>Ielādē profilu…</p>
                  </div>
                `;
              }
            }
            return html`
              <div class="app-shell">
                ${title}
                <${CitsPublicApprove}
                  token=${citsToken}
                  sessionUserId=${session?.user?.id ?? null}
                  profileRole=${profile?.role ?? "user"}
                  onDone=${() => {
                    setCitsToken("");
                    stripCitsFromUrl();
                  }}
                />
              </div>
            `;
          }

          async function signOut() {
            if (TIKAI_VIENKARSI_SKATS) {
              setNavPast([]);
              setView("home");
              return;
            }
            if (isLocalMode() || getStickyAuthValue(LS_LOCAL_OK) === "1") {
              removeStickyAuthValue(LS_LOCAL_OK);
              sessionStorage.removeItem(LS_LOCAL_NAME);
              removeStickyAuthValue(LS_LOCAL_USER_ID);
              removeStickyAuthValue(LS_LOCAL_EMAIL);
              setNavPast([]);
              setView("home");
              location.reload();
              return;
            }
            if (supabase) await supabase.auth.signOut();
            setNavPast([]);
            setView("home");
          }

          if (isLocalMode() && !TIKAI_VIENKARSI_SKATS && !localSessionActive()) {
            return html`
              <div class="app-shell">
                ${title}
                <${LocalEmailLoginScreen} />
              </div>
            `;
          }

          if (configured()) {
            if (loading) {
              return html`
                <div class="app-shell">
                  ${title}
                  <p style=${{ color: "var(--muted)" }}>Ielādē…</p>
                </div>
              `;
            }
            if (!session?.user) {
              return html`
                <div class="app-shell">
                  ${title}
                  <${AuthScreen} />
                </div>
              `;
            }
          } else {
            if (loading) {
              return html`
                <div class="app-shell">
                  ${title}
                  <p style=${{ color: "var(--muted)" }}>Ielādē…</p>
                </div>
              `;
            }
          }

          if (!session?.user) {
            return null;
          }

          return html`
            <${AppShellWithNav}
              view=${view}
              onChangeView=${handleChangeView}
              promSub=${promSub}
              onPromSubChange=${handlePromSubChange}
              showPromDeputyTab=${showPromDeputyTab}
              showPendingCitsBadge=${pendingCitsNav}
              showPddAppChangesBadge=${showPddAppChangesBadge}
              canGoBack=${navPast.length > 0}
              onGoBack=${handleGoBack}
              onPinCurrentSection=${handlePinCurrentSection}
              isCurrentSectionPinned=${isCurrentSectionPinned}
              pinnedSections=${pinnedSections}
              onOpenPinnedSection=${handleOpenPinnedSection}
              onUnpinSection=${handleUnpinSection}
              header=${html`
                <header class="app-header">
                  ${title}
                  <div class="row">
                    <span style=${{ color: "var(--muted)", fontSize: "0.9rem" }}>
                      Iekšā: ${actorDisplayName || userDisplayName(profile) || session.user?.email || String(sessionStorage.getItem(LS_LOCAL_EMAIL) || "").trim() || localDisplayName() || "Lietotājs"}
                      ${profile?.email || session?.user?.email || sessionStorage.getItem(LS_LOCAL_EMAIL)
                        ? html` · ${profile?.email ?? session.user.email ?? sessionStorage.getItem(LS_LOCAL_EMAIL)}`
                        : null}
                      ${TIKAI_VIENKARSI_SKATS ? html`<span> · lokāli</span>` : null}
                    </span>
                    ${TIKAI_VIENKARSI_SKATS ? null : html`<button type="button" class="btn btn-ghost btn-small" onClick=${signOut}>Iziet</button>`}
                  </div>
                </header>
              `}
            >
              ${(() => {
                const IadPanel = globalThis.IAD?.createIadModule?.(html, React);
                if (view === "darbaUzdevumiIad") {
                  return IadPanel
                    ? html`<${IadPanel}
                        supabase=${supabase}
                        focusTask=${darbaUzdevumiFocus}
                        onFocusHandled=${() => setDarbaUzdevumiFocus(null)}
                        pinnedListKeys=${iadPinnedListKeys}
                        onPinListChange=${handleIadListPinChange}
                      />`
                    : html`<section class="list-panel"><p>IaD modulis nav ielādēts.</p></section>`;
                }
                return null;
              })()}
              ${view === "home"
                ? html`<${Dashboard}
                    onOpenPrombutnes=${() => {
                      setNavPast((p) => [...p, { view, promSub }]);
                      setView("prombutnes");
                      setPromSub("calendar");
                    }}
                    onOpenDarbaUzdevumi=${() => {
                      setNavPast((p) => [...p, { view, promSub }]);
                      setDarbaUzdevumiFocus(null);
                      setView("darbaUzdevumiIad");
                    }}
                    onOpenTodayTask=${(task) => {
                      setNavPast((p) => [...p, { view, promSub }]);
                      const target = task?.target && typeof task.target === "object" ? task.target : {};
                      const payload = {
                        ...target,
                        key: task?.key ?? target?.key ?? "",
                        module: task?.module ?? target?.module ?? "",
                        title: task?.title ?? target?.title ?? "",
                        topic: task?.topic ?? target?.topic ?? "",
                        subtitle: task?.subtitle ?? target?.subtitle ?? "",
                        dueDate: task?.dueDate ?? target?.dueDate ?? "",
                      };
                      setDarbaUzdevumiFocus(payload);
                      setView("darbaUzdevumiIad");
                    }}
                    absencesToday=${homeAbsencesSnapshot}
                  />`
                : view === "aktualitatesHistory"
                  ? html`<${AktualitatesVestureView} />`
                  : view === "pddAppChanges"
                    ? html`<${PddAppChangesView} />`
                  : view === "darbaUzdevumiIad"
                    ? null
                  : view === "team"
                    ? html`<${PrombutnesSection}
                        userId=${effectiveUserId}
                        role=${profile?.role ?? "user"}
                        rawRole=${profile?.raw_role ?? null}
                        promSub=${"teamUsers"}
                        setPromSub=${() => {}}
                        onAbsencesSnapshot=${onAbsencesSnapshot}
                        sessionEmail=${String(session?.user?.email || sessionStorage.getItem(LS_LOCAL_EMAIL) || "").trim()}
                        actorDisplayName=${actorDisplayName}
                      />`
                    : html`<${PrombutnesSection}
                        userId=${effectiveUserId}
                        role=${profile?.role ?? "user"}
                        rawRole=${profile?.raw_role ?? null}
                        promSub=${promSub}
                        setPromSub=${setPromSub}
                        onAbsencesSnapshot=${onAbsencesSnapshot}
                        sessionEmail=${String(session?.user?.email || sessionStorage.getItem(LS_LOCAL_EMAIL) || "").trim()}
                        actorDisplayName=${actorDisplayName}
                      />`}
            </${AppShellWithNav}>
          `;
        }

        createRoot(document.getElementById("root")).render(html`<${App} />`);
      </script>
    </body>
  </html>
