                          value=${periodTo}
                          onChange=${(ev) => setPeriodTo(ev.target.value)}
                        />
                      </div>
                    </div>
                  `
                : null}
              <div class="row">
                <button type="submit" class="btn btn-primary btn-small" disabled=${busy}>
                  ${busy ? "…" : "Saglabāt"}
                </button>
                <button type="button" class="btn btn-ghost btn-small" disabled=${busy} onClick=${resetToManager}>
                  Atgriezt izmaiņas
                </button>
              </div>
            </form>
            ${msg ? html`<p style=${{ margin: "0.35rem 0 0", fontSize: "0.82rem", color: "var(--muted)" }}>${msg}</p>` : null}
          </div>
        `;
      }

      function CitsPublicApprove({ token, onDone, sessionUserId, profileRole }) {
        const [preview, setPreview] = useState(null);
        const [err, setErr] = useState(null);
        const [busy, setBusy] = useState(false);
        const [rejectReason, setRejectReason] = useState("");
        const [deputyUserId, setDeputyUserId] = useState(null);
        const [deputyLoaded, setDeputyLoaded] = useState(false);
        useEffect(() => {
          if (isLocalMode() || !supabase || !sessionUserId) {
            setDeputyUserId(null);
            setDeputyLoaded(true);
            return;
          }
          let cancelled = false;
          setDeputyLoaded(false);
          if (window.SASKANOSANA?.loadState) {
            window.SASKANOSANA
              .loadState(supabase, DEFAULT_MANAGER_NAME)
              .then((st) => {
                if (cancelled) return;
                if (st?.error) {
                  setDeputyUserId(null);
                } else {
                  setDeputyUserId(st.deputyUserId ?? null);
                }
                setDeputyLoaded(true);
              });
            return () => {
              cancelled = true;
            };
          }
          supabase
            .from("users")
            .select("*")
            .then(({ data, error }) => {
              if (cancelled) return;
              if (error) {
                console.error(error);
                setDeputyUserId(null);
                setDeputyLoaded(true);
                return;
              }
              const users = (data ?? []).map(normalizeTeamUserRecord);
              const activeDeputy = resolveActiveDeputyUser(users);
              setDeputyUserId(activeDeputy?.id ? String(activeDeputy.id) : null);
              setDeputyLoaded(true);
            });
          return () => {
            cancelled = true;
          };
        }, [sessionUserId]);
        const canApprove = Boolean(
          sessionUserId &&
            (isLocalMode() ? true : deputyLoaded) &&
            userCanApproveAbsences(profileRole ?? "user", sessionUserId, deputyUserId)
        );
        useEffect(() => {
          let cancelled = false;
          (async () => {
            if (!token) return;
            setErr(null);
            setPreview(null);
            if (isLocalMode()) {
              const rows = getLocalCitsRequests();
              const r = rows.find((x) => x.approval_token === token && x.status === "pending_manager");
              if (!r) {
                if (!cancelled) setErr("Nederīgs vai jau apstiprināts pieprasījums.");
                return;
              }
              if (!cancelled)
                setPreview({
                  start_date: r.start_date,
                  end_date: r.end_date,
                  employee_name: localDisplayName(),
                  comment: r.comment || "",
                  ok: true,
                });
              return;
            }
            if (!sessionUserId || !deputyLoaded) return;
            if (!userCanApproveAbsences(profileRole ?? "user", sessionUserId, deputyUserId)) {
              if (!cancelled)
                setErr(
                  "Apstiprināt drīkst tikai vadītājs vai norādītais aktīvais aizvietotājs. Ielogojies ar atbilstošu kontu."
                );
              return;
            }
            const { data, error } = await supabase.rpc("pdd_cits_preview", { p_token: token });
            if (cancelled) return;
            if (error) {
              setErr(error.message);
              return;
            }
            const row = Array.isArray(data) ? data[0] : data;
            if (!row?.ok) setErr("Nederīgs vai jau apstiprināts pieprasījums.");
            else setPreview(row);
          })();
          return () => {
            cancelled = true;
          };
        }, [token, sessionUserId, deputyLoaded, deputyUserId, profileRole]);
        async function approve() {
          if (!canApprove) {
            alert("Apstiprināt drīkst tikai vadītājs vai norādītais aktīvais aizvietotājs.");
            return;
          }
          setBusy(true);
          try {
            if (isLocalMode()) {
              const rows = getLocalCitsRequests();
              const r = rows.find((x) => x.approval_token === token && x.status === "pending_manager");
              if (!r) {
                setErr("Nav atrasts.");
                return;
              }
              const types = getLocalTypes();
              const cits = types.find((t) => isCitsSaskanotsTypeName(t.name));
              if (!cits) {
                setErr("Nav veida „Cits (ar vadītāja saskaņojumu)” lokālajos datos.");
                return;
              }
              const abs = getLocalAbsences();
              const nowIso = new Date().toISOString();
              const idx = abs.findIndex(
                (x) =>
                  String(x.user_id) === String(r.user_id) &&
                  Number(x.type_id) === Number(cits.id) &&
                  String(x.start_date) === String(r.start_date) &&
                  String(x.end_date) === String(r.end_date) &&
                  String(x.comment ?? "") === String(r.comment ?? "") &&
                  String(x.status) === "pending"
              );
              if (idx >= 0) {
                abs[idx] = {
                  ...abs[idx],
                  status: "approved",
                  approved_at: nowIso,
                };
              } else {
                abs.push({
                  id: crypto.randomUUID(),
                  user_id: r.user_id,
                  type_id: cits.id,
                  start_date: r.start_date,
                  end_date: r.end_date,
                  comment: r.comment,
                  status: "approved",
                  created_at: nowIso,
                  approved_at: nowIso,
                });
              }
              setLocalAbsences(abs);
              setLocalCitsRequests(
                rows.map((x) =>
                  x.approval_token === token ? { ...x, status: "approved" } : x
                )
              );
              pushChangeLog("prombutne.cits_apstiprinats", `Cits pieprasījums ${token} apstiprināts`);
              stripCitsFromUrl();
              onDone();
              return;
            }
            const { error } = await supabase.rpc("pdd_approve_cits_token", { p_token: token });
            if (error) {
              alert(error.message);
              return;
            }
            const { error: nErr } = await supabase.functions.invoke("notify-cits-applicant", {
              body: { p_token: token },
            });
            if (nErr) console.warn("[notify-cits-applicant]", nErr);
            stripCitsFromUrl();
            onDone();
          } finally {
            setBusy(false);
          }
        }
        async function reject() {
          if (!canApprove) {
            alert("Noraidīt drīkst tikai vadītājs vai norādītais aktīvais aizvietotājs.");
            return;
          }
          setBusy(true);
          try {
            if (isLocalMode()) {
              const rows = getLocalCitsRequests();
              const r = rows.find((x) => x.approval_token === token && x.status === "pending_manager");
              if (!r) {
                setErr("Nav atrasts.");
                return;
              }
              const reason = String(rejectReason || "").trim();
              setLocalCitsRequests(
                rows.map((x) =>
                  x.approval_token === token
                    ? {
                        ...x,
                        status: "cancelled",
                        decision_reason: reason || null,
                        decided_at: new Date().toISOString(),
                        decided_by: sessionUserId ?? null,
                      }
                    : x
                )
              );
              const types = getLocalTypes();
              const cits = types.find((t) => isCitsSaskanotsTypeName(t.name));
              if (cits) {
                const abs = getLocalAbsences().filter(
                  (x) =>
                    !(
                      Number(x.type_id) === Number(cits.id) &&
                      String(x.user_id) === String(r.user_id) &&
                      String(x.start_date) === String(r.start_date) &&
                      String(x.end_date) === String(r.end_date) &&
                      String(x.comment ?? "") === String(r.comment ?? "") &&
                      String(x.status) === "pending"
                    )
                );
                setLocalAbsences(abs);
              }
              pushChangeLog(
                "prombutne.cits_noraidits",
                `${r.user_id}: ${r.start_date} — ${r.end_date}${reason ? ` (${reason})` : ""}`
              );
              stripCitsFromUrl();
              onDone();
              return;
            }
            alert("Noraidīšana tiešsaistes režīmā nav konfigurēta bez backend funkcijas.");
          } finally {
            setBusy(false);
          }
        }
        return html`
          <div class="auth-box" style=${{ maxWidth: "480px" }}>
            <h1 style=${{ fontSize: "1.15rem" }}>„Cits (ar vadītāja saskaņojumu)” — apstiprinājums</h1>
            ${err
              ? html`<p style=${{ color: "#f87171" }}>${err}</p>`
              : !preview
                ? html`<p style=${{ color: "var(--muted)" }}>${isLocalMode() || canApprove ? "Ielādē…" : "Pārbauda tiesības…"}</p>`
                : html`
                    <div class="stack" style=${{ gap: "0.5rem" }}>
                      <p><strong>${preview.employee_name}</strong></p>
                      <p style=${{ margin: 0, fontSize: "0.9rem" }}>
                        ${formatDateLv(preview.start_date)} — ${formatDateLv(preview.end_date)}
                      </p>
                      ${preview.comment
                        ? html`<p style=${{ margin: 0 }}>${preview.comment}</p>`
                        : null}
                      <button type="button" class="btn btn-danger" disabled=${busy || !canApprove} onClick=${approve}>
                        ${busy ? "…" : "Apstiprināt prombūtni"}
                      </button>
                      <textarea
                        class="textarea"
                        value=${rejectReason}
                        onChange=${(e) => setRejectReason(e.target.value)}
                        placeholder="Noraidījuma iemesls (pēc izvēles)"
                      />
                      <button type="button" class="btn btn-ghost" disabled=${busy || !canApprove} onClick=${reject}>
                        ${busy ? "…" : "Noraidīt"}
                      </button>
                      ${!canApprove && !isLocalMode()
                        ? html`<p style=${{ margin: 0, fontSize: "0.82rem", color: "var(--muted)" }}>
                            Tikai vadītājs vai norādītais aktīvais aizvietotājs var apstiprināt.
                          </p>`
                        : null}
                    </div>
                  `}
            <button type="button" class="btn btn-ghost btn-small" style=${{ marginTop: "1rem" }} onClick=${onDone}>
              Aizvērt
            </button>
          </div>
        `;
      }

      function shortUuid(id) {
        const s = String(id || "");
        return s.length > 10 ? `${s.slice(0, 8)}…` : s || "—";
      }

      function formatDbTs(val) {
        if (val == null || val === "") return "—";
        const s = String(val);
        if (s.length >= 19 && /^\d{4}-\d{2}-\d{2}T/.test(s)) return s.replace("T", " ").slice(0, 19);
        return s;
      }

      function formatDateLv(val) {
        const s = String(val ?? "").trim();
        if (!s) return "—";
        const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s);
        if (m) return `${m[3]}.${m[2]}.${m[1]}`;
        return s;
      }

      function absenceStatusLv(st) {
        if (st === "pending") return "gaida";
        if (st === "approved") return "apstiprināts";
        if (st === "rejected") return "noraidīts";
        return st ?? "—";
      }

      function PrombutnesHistoryPanel({
        userId,
        role,
        absences,
        types,
        onRefresh,
        approverView,
        historyOpen,
        onToggleHistory,
        highlightAbsenceId,
        onClearHighlight,
        canApproveAbsences,
      }) {
        const [editing, setEditing] = useState(null);
        const [delId, setDelId] = useState(null);
        const [filtersOpen, setFiltersOpen] = useState(false);
        const [histPage, setHistPage] = useState(0);
        const HIST_PAGE_SIZE = 20;
        const [form, setForm] = useState({ type_id: "", start_date: "", end_date: "", comment: "" });
        const [filters, setFilters] = useState({
          name: "",
          type: "",
          start: "",
          end: "",
          comment: "",
          status: "",
        });
        const filterNameActive = String(filters?.name ?? "").trim() !== "";
        const filterTypeActive = String(filters?.type ?? "").trim() !== "";
        const filterStartActive = String(filters?.start ?? "").trim() !== "";
        const filterEndActive = String(filters?.end ?? "").trim() !== "";
        const filterCommentActive = String(filters?.comment ?? "").trim() !== "";
        const filterStatusActive = String(filters?.status ?? "").trim() !== "";
        function userShownFromFull(userFull) {
          const uf = userFull ?? "—";
          const userParts = String(uf).split(/\s+/).filter(Boolean);
          return uf === "—"
            ? "—"
            : userParts.length <= 2
              ? uf
              : `${userParts[0]} ${userParts[userParts.length - 1]}`;
        }
        function clearFilters() {
          setFilters({ name: "", type: "", start: "", end: "", comment: "", status: "" });
        }
        const myNameForFilter = useMemo(() => {
          const own = (absences ?? []).find((a) => String(a.user_id) === String(userId));
          if (own?.employee) return userShownFromFull(userDisplayName(own.employee));
          return localDisplayName();
        }, [absences, userId]);
        const myFilterActive =
          String(filters?.name ?? "").trim().toLowerCase() === String(myNameForFilter ?? "").trim().toLowerCase();
        function ensureHistoryOpen() {
          if (!historyOpen) onToggleHistory();
        }
        function applyFilter(key, value) {
          setFilters((prev) => ({ ...prev, [key]: value }));
          ensureHistoryOpen();
        }
        function clearFilter(key) {
          setFilters((prev) => ({ ...prev, [key]: "" }));
        }
        const sortedList = useMemo(() => {
          const list = approverView ? absences : absences.filter((a) => a.user_id === userId);
          return [...list].sort((a, b) =>
            String(b.created_at || "").localeCompare(String(a.created_at || ""))
          );
        }, [absences, approverView, userId]);
        const filteredList = useMemo(() => {
          const includesMatch =
            window.PDDFiltr?.includesMatch ??
            ((value, query) => {
              const q = String(query ?? "").toLowerCase().trim();
              if (!q) return true;
              const v = String(value ?? "").toLowerCase();
              return v.includes(q);
            });
          const f = filters ?? {};
          return sortedList.filter((a) => {
            const userFull = userDisplayName(a.employee);
            const userShown = userShownFromFull(userFull);
            const typeName = a.type?.name ?? a.type_id ?? "";
            const statusText = isCitsSaskanotsTypeName(typeName)
              ? (a.status === "approved" ? "saskaņots" : "gaida")
              : "bez saskaņošanas";
            if (f.name && !includesMatch(userShown, f.name)) return false;
            if (f.type && !includesMatch(typeName, f.type)) return false;
            if (f.start && !includesMatch(a.start_date ?? "", f.start)) return false;
            if (f.end && !includesMatch(a.end_date ?? "", f.end)) return false;
            if (f.comment && !includesMatch(a.comment ?? "", f.comment)) return false;
            if (f.status && !includesMatch(statusText, f.status)) return false;
            return true;
          });
        }, [sortedList, filters, approverView, userId]);
        const historyTotal = filteredList.length;
        const historyTotalPages = Math.max(1, Math.ceil(historyTotal / HIST_PAGE_SIZE));
        const historySafePage = Math.max(0, Math.min(histPage, historyTotalPages - 1));
        const visibleList = filteredList.slice(
          historySafePage * HIST_PAGE_SIZE,
          historySafePage * HIST_PAGE_SIZE + HIST_PAGE_SIZE
        );

        // Ja filtrēšana mainās, droši ejam uz pirmo lapu.
        useEffect(() => {
          setHistPage(0);
        }, [filters, approverView, userId]);

        // Ja ir iezīmēts konkrēts ieraksts, automātiski ejam uz lapu, kur tas ir redzams.
        useEffect(() => {
          if (!highlightAbsenceId || !historyOpen) return;
          const idx = filteredList.findIndex((a) => String(a.id) === String(highlightAbsenceId));
          if (idx < 0) return;
          const p = Math.floor(idx / HIST_PAGE_SIZE);
          setHistPage(p);
        }, [highlightAbsenceId, historyOpen, filteredList]);

        const isAdmin = String(role || "").toLowerCase() === "admin";
        function isApprovedCitsAbsence(a) {
          const typeName = a?.type?.name ?? a?.type_id ?? "";
          return isCitsSaskanotsTypeName(typeName) && String(a?.status || "").toLowerCase() === "approved";
        }
        function canEditAbsence(a) {
          const own = String(a?.user_id) === String(userId);
          return (isAdmin || own) && !isApprovedCitsAbsence(a);
        }
        function canDeleteAbsence(a) {
          const own = String(a?.user_id) === String(userId);
          return isAdmin || own;
        }
        const anyActions = filteredList.some((a) => {
          const canEdit = canEditAbsence(a);
          const canDelete = canDeleteAbsence(a);
          return canEdit || canDelete;
        });
        const colCount = anyActions ? 7 : 6;
        useEffect(() => {
          if (!highlightAbsenceId || !historyOpen) return;
          const h = window.requestAnimationFrame(() => {
            document.getElementById(`hist-row-${highlightAbsenceId}`)?.scrollIntoView({
              behavior: "smooth",
              block: "nearest",
            });
          });
          return () => window.cancelAnimationFrame(h);
        }, [highlightAbsenceId, historyOpen, historySafePage, visibleList.length]);
        function openEdit(a) {
          if (isApprovedCitsAbsence(a)) {
            alert("Apstiprinātu Cits prombūtni vairs labot nevar.");
            return;
          }
          setEditing(a.id);
          setForm({
            type_id: String(a.type_id),
            start_date: a.start_date,
            end_date: a.end_date,
            comment: a.comment || "",
          });
        }
        async function saveEdit(e) {
          e.preventDefault();
          if (!editing) return;
          const editedRow = (absences ?? []).find((x) => String(x.id) === String(editing));
          if (isApprovedCitsAbsence(editedRow)) {
            alert("Apstiprinātu Cits prombūtni vairs labot nevar.");
            setEditing(null);
            return;
          }
          if (isLocalMode()) {
            const rows = getLocalAbsences().map((r) =>
              r.id === editing
                ? {
                    ...r,
                    type_id: Number(form.type_id),
                    start_date: form.start_date,
                    end_date: form.end_date,
                    comment: form.comment.trim() || null,
                  }
                : r
            );
            setLocalAbsences(rows);
            pushChangeLog("prombutne.labot", `Ieraksts ${editing} labots`);
            setEditing(null);
            onRefresh();
            return;
          }
          let { error } = await supabase
            .from("prombutnes_dati")
            .update({
              [ABSENCE_COLS_RUNTIME.type_id]: Number(form.type_id),
              [ABSENCE_COLS_RUNTIME.start_date]: form.start_date,
              [ABSENCE_COLS_RUNTIME.end_date]: form.end_date,
              [ABSENCE_COLS_RUNTIME.comment]: form.comment.trim() || null,
            })
            .eq("id", editing);
          if (error) {
            const retry = await supabase
              .from("prombutnes_dati")
              .update({
                "Prombūtnes veids": Number(form.type_id),
                "Sākuma datums": form.start_date,
                "Beigu datums": form.end_date,
                "Komentāri": form.comment.trim() || null,
              })
              .eq("id", editing);
            error = retry.error;
            if (error) {
              const retry2 = await supabase
                .from("prombutnes_dati")
                .update({
                  type: Number(form.type_id),
                  Sākuma_datums: form.start_date,
                  beigu_datums: form.end_date,
                  Komentārs: form.comment.trim() || null,
                })
                .eq("id", editing);
              error = retry2.error;
            }
          }
          if (error) alert(error.message);
          else {
            setEditing(null);
            onRefresh();
          }
        }
        async function confirmDelete() {
          if (!delId) return;
          if (isLocalMode()) {
            setLocalAbsences(getLocalAbsences().filter((r) => r.id !== delId));
            pushChangeLog("prombutne.dzest", `Ieraksts ${delId} dzēsts`);
            setDelId(null);
            onRefresh();
            return;
          }
          const { error } = await supabase.from("prombutnes_dati").delete().eq("id", delId);
          if (error) alert(error.message);
          else {
            setDelId(null);
            onRefresh();
          }
        }
        const typeOptionsEmployee = types.filter((t) => !isCitsSaskanotsTypeName(t.name));
        const typeOptionsEdit = approverView ? types : typeOptionsEmployee;
        const typeNameOptions = useMemo(() => {
          const names = (types ?? []).map((t) => t.name).filter(Boolean);
          return Array.from(new Set(names)).sort((a, b) => String(a).localeCompare(String(b)));
        }, [types]);
        const nameOptions = useMemo(() => {
          const set = new Set();
          (absences ?? []).forEach((a) => {
            const userFull = userDisplayName(a.employee);
            const shown = userShownFromFull(userFull);
            if (shown) set.add(shown);
          });
          return Array.from(set).sort((a, b) => String(a).localeCompare(String(b)));
        }, [absences]);
        const includesMatch =
          window.PDDFiltr?.includesMatch ??
          ((value, query) => {
            const q = String(query ?? "").toLowerCase().trim();
            if (!q) return true;
            const v = String(value ?? "").toLowerCase();
            return v.includes(q);
          });
        function maybeMark(value, query) {
          const text = value ?? "—";
          if (!query) return text;
          if (includesMatch(text, query)) {
            return html`<mark style=${{ background: "rgba(244,63,94,0.18)", padding: "0 3px", borderRadius: "6px" }}>${text}</mark>`;
          }
          return text;
        }
        return html`
          <div class="list-panel" id="prombutnes-history-anchor">
            <div
              class="row"
              style=${{ justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: "0.5rem" }}
            >
              <h2 style=${{ margin: 0, fontSize: "1rem" }}>Prombūtnes vēsture</h2>
              <div class="row" style=${{ gap: "0.35rem", flexWrap: "wrap" }}>
                ${highlightAbsenceId
                  ? html`
                      <button type="button" class="btn btn-ghost btn-small" onClick=${onClearHighlight}>
                        Notīrīt atlasi
                      </button>
                    `
                  : null}
                <button type="button" class="btn btn-primary btn-small" onClick=${onToggleHistory}>
                  ${historyOpen ? "Slēpt ierakstus (tikai galvenes)" : "Rādīt ierakstus"}
                </button>
                <button
                  type="button"
                  class=${`btn btn-small ${myFilterActive ? "btn-danger" : "btn-ghost"}`}
                  onClick=${() => {
                    if (myFilterActive) clearFilter("name");
                    else applyFilter("name", myNameForFilter);
                    ensureHistoryOpen();
                  }}
                >
                  Tikai mani
                </button>
                <!-- (nav) -->
              </div>
            </div>
            <p style=${{ margin: "0.35rem 0 0.65rem", fontSize: "0.78rem", color: "var(--muted)", lineHeight: 1.4 }}>
              Kolonnas atbilst <code>public.prombutnes_dati</code> (ierakstu rindas var paslēpt — redzamas paliek
              tabulas galvenes).
            </p>
            <div class="hist-table-wrap table-wrap">
              <table class="hist-table">
                <thead>
                  <tr>
                    <th>
                      Vārds, uzvārds
                      <button
                        type="button"
                        class=${`btn btn-ghost btn-small ${filterNameActive ? "btn-danger" : ""}`}
                        title="Filtrs"
                        onClick=${() => {
                          if (filterNameActive) clearFilter("name");
                          else setFiltersOpen((o) => !o);
                          ensureHistoryOpen();
                        }}
                      >
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M22 3H2l8 9v7l4 2v-9l8-9z"></path>
                        </svg>
                      </button>
                    </th>
                    <th>
                      Prombūtnes veids
                      <button
                        type="button"
                        class=${`btn btn-ghost btn-small ${filterTypeActive ? "btn-danger" : ""}`}
                        title="Filtrs"
                        onClick=${() => {
                          if (filterTypeActive) clearFilter("type");
                          else setFiltersOpen((o) => !o);
                          ensureHistoryOpen();
                        }}
                      >
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M22 3H2l8 9v7l4 2v-9l8-9z"></path>
                        </svg>
                      </button>
                    </th>
                    <th>
                      Sākuma datums
                      <button
                        type="button"
                        class=${`btn btn-ghost btn-small ${filterStartActive ? "btn-danger" : ""}`}
                        title="Filtrs"
                        onClick=${() => {
                          if (filterStartActive) clearFilter("start");
                          else setFiltersOpen((o) => !o);
                          ensureHistoryOpen();
                        }}
                      >
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M22 3H2l8 9v7l4 2v-9l8-9z"></path>
                        </svg>
                      </button>
                    </th>
                    <th>
                      Beigu datums
                      <button
                        type="button"
                        class=${`btn btn-ghost btn-small ${filterEndActive ? "btn-danger" : ""}`}
                        title="Filtrs"
                        onClick=${() => {
                          if (filterEndActive) clearFilter("end");
                          else setFiltersOpen((o) => !o);
                          ensureHistoryOpen();
                        }}
                      >
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M22 3H2l8 9v7l4 2v-9l8-9z"></path>
                        </svg>
                      </button>
                    </th>
                    <th>
                      Komentārs
                      <button
                        type="button"
                        class=${`btn btn-ghost btn-small ${filterCommentActive ? "btn-danger" : ""}`}
                        title="Filtrs"
                        onClick=${() => {
                          if (filterCommentActive) clearFilter("comment");
                          else setFiltersOpen((o) => !o);
                          ensureHistoryOpen();
                        }}
                      >
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M22 3H2l8 9v7l4 2v-9l8-9z"></path>
                        </svg>
                      </button>
                    </th>
                    <th>
                      STATUSS
                      <button
                        type="button"
                        class=${`btn btn-ghost btn-small ${filterStatusActive ? "btn-danger" : ""}`}
                        title="Filtrs"
                        onClick=${() => {
                          if (filterStatusActive) clearFilter("status");
                          else setFiltersOpen((o) => !o);
                          ensureHistoryOpen();
                        }}
                      >
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M22 3H2l8 9v7l4 2v-9l8-9z"></path>
                        </svg>
                      </button>
                    </th>
                    ${anyActions ? html`<th>—</th>` : null}
                  </tr>
                  ${filtersOpen
                    ? html`<tr class="hist-filter-row">
                    <th>
                      <div class="row" style=${{ gap: "0.5rem", alignItems: "center" }}>
                        <select
                          class="select"
                          value=${filters.name}
                          onChange=${(e) => applyFilter("name", e.target.value)}
                          style=${{ flex: "1 1 auto" }}
                        >
                          <option value="">Visi</option>
                          ${nameOptions.map((n) => html`<option key=${n} value=${n}>${n}</option>`)}
                        </select>
                      </div>
                    </th>
                    <th>
                      <select
                        class="select"
                        value=${filters.type}
                        onChange=${(e) => applyFilter("type", e.target.value)}
                      >
                        <option value="">Visi</option>
                        ${typeNameOptions.map((n) => html`<option key=${n} value=${n}>${n}</option>`)}
                      </select>
                    </th>
                    <th>
                      <input
                        type="date"
                        class="input"
                        value=${filters.start}
                        onChange=${(e) => applyFilter("start", e.target.value)}
                      />
                    </th>
                    <th>
                      <input
                        type="date"
                        class="input"
                        value=${filters.end}
                        onChange=${(e) => applyFilter("end", e.target.value)}
                      />
                    </th>
                    <th>
                      <input
                        class="input"
                        value=${filters.comment}
                        onChange=${(e) => applyFilter("comment", e.target.value)}
                        placeholder="meklēt..."
                      />
                    </th>
                    <th>
                      <select
                        class="select"
                        value=${filters.status}
                        onChange=${(e) => applyFilter("status", e.target.value)}
                      >
                        <option value="">Visi</option>
                              <option value="bez saskaņošanas">bez saskaņošanas</option>
                              <option value="gaida">gaida</option>
                              <option value="saskaņots">saskaņots</option>
                      </select>
                    </th>
                    ${anyActions ? html`<th></th>` : null}
                  </tr>`
                    : null}
                </thead>
                ${historyOpen && visibleList.length
                  ? html`
                      <tbody>
                        ${visibleList.map((a) => {
                          const canEdit = canEditAbsence(a);
                          const canDelete = canDeleteAbsence(a);
                          const userFull = userDisplayName(a.employee);
                          const userParts = String(userFull).split(/\s+/).filter(Boolean);
                          const userShown =
                            userFull === "—"
                              ? "—"
                              : userParts.length <= 2
                                ? userFull
                                : `${userParts[0]} ${userParts[userParts.length - 1]}`;
                          const hi = highlightAbsenceId && String(highlightAbsenceId) === String(a.id);
                          const typeName = a.type?.name ?? a.type_id ?? "—";
                          const isCitsType = isCitsSaskanotsTypeName(typeName);
                          const statusText = isCitsType
                            ? (a.status === "approved" ? "saskaņots" : "gaida")
                            : "bez saskaņošanas";
                          const statusBadgeClass = isCitsType
                            ? (a.status === "approved" ? "badge-approved" : "badge-pending")
                            : "badge-approved";
                          return html`
                            <tr
                              key=${a.id}
                              id=${`hist-row-${a.id}`}
                              class=${hi ? "hist-row-highlight" : ""}
                            >
                              <td>${maybeMark(userShown, filters.name)}</td>
                              <td>${maybeMark(typeName, filters.type)}</td>
                              <td>${maybeMark(formatDateLv(a.start_date), filters.start)}</td>
                              <td>${maybeMark(formatDateLv(a.end_date), filters.end)}</td>
                              <td style=${{ maxWidth: "140px", wordBreak: "break-word" }}>
                                ${maybeMark(a.comment ?? "—", filters.comment)}
                              </td>
                              <td>
                                <span class=${`badge ${statusBadgeClass}`}>
                                  ${maybeMark(statusText, filters.status)}
                                </span>
                              </td>
                              ${anyActions || (isCitsType && canApproveAbsences && a.status !== "approved")
                                ? html`
                                    <td>
                                      <div
                                        class="row"
                                        style=${{
                                          flexDirection: "column",
                                          gap: "0.25rem",
                                          alignItems: "stretch",
                                        }}
                                      >
                                        ${canEdit
                                          ? html`
                                              <button
                                                type="button"
                                                class="btn btn-ghost btn-small"
                                                onClick=${() => openEdit(a)}
                                              >
                                                Labot
                                              </button>
                                            `
                                          : null}
                                        ${canDelete
                                          ? html`
                                              <button
                                                type="button"
                                                class="btn btn-danger btn-small"
                                                onClick=${() => setDelId(a.id)}
                                              >
                                                Dzēst
                                              </button>
                                            `
                                          : null}
                                        ${isCitsType && canApproveAbsences && a.status !== "approved"
                                          ? html`
                                              <button
                                                type="button"
                                                class="btn btn-danger btn-small"
                                                onClick=${async () => {
                                                  if (isLocalMode()) {
                                                    const rows = getLocalAbsences().map((r) =>
                                                      r.id === a.id ? { ...r, status: "approved" } : r
                                                    );
                                                    setLocalAbsences(rows);
                                                    pushChangeLog(
                                                      "prombutne.apstiprinat",
                                                      `Ieraksts ${a.id} apstiprināts`
                                                    );
                                                  } else {
                                                    const { error } = await supabase
                                                      .from("prombutnes_dati")
                                                      .update({
                                                        [ABSENCE_COLS_RUNTIME.status]: "approved",
                                                      })
                                                      .eq("id", a.id);
                                                    if (error) {
                                                      alert(error.message);
                                                      return;
                                                    }
                                                  }
                                                  onRefresh();
                                                }}
                                              >
                                                Apstiprināt
                                              </button>
                                              <button
                                                type="button"
                                                class="btn btn-ghost btn-small"
                                                onClick=${async () => {
                                                  const reason = window.prompt(
                                                    "Iemesls noraidīšanai (tiks pievienots pie komentāra):"
                                                  );
                                                  if (reason == null) return;
                                                  const trimmed = String(reason).trim();
                                                  if (!trimmed) return;
                                                  if (isLocalMode()) {
                                                    const rows = getLocalAbsences().map((r) =>
                                                      r.id === a.id
                                                        ? {
                                                            ...r,
                                                            status: "rejected",
                                                            comment: (r.comment || "") + "\n[Noraidīts: " + trimmed + "]",
                                                          }
                                                        : r
                                                    );
                                                    setLocalAbsences(rows);
                                                    pushChangeLog(
                                                      "prombutne.noraidit",
                                                      `Ieraksts ${a.id} noraidīts`
                                                    );
                                                  } else {
                                                    const { error } = await supabase
                                                      .from("prombutnes_dati")
                                                      .update({
                                                        [ABSENCE_COLS_RUNTIME.status]: "rejected",
                                                        [ABSENCE_COLS_RUNTIME.comment]:
                                                          (a.comment || "") + "\n[Noraidīts: " + trimmed + "]",
                                                      })
                                                      .eq("id", a.id);
                                                    if (error) {
                                                      alert(error.message);
                                                      return;
                                                    }
                                                  }
                                                  onRefresh();
                                                }}
                                              >
                                                Noraidīt
                                              </button>
                                            `
                                          : null}
                                      </div>
                                    </td>
                                  `
                                : null}
                            </tr>
                          `;
                        })}
                      </tbody>
                    `
                  : historyOpen
                    ? html`
                        <tbody>
                          <tr>
                            <td colspan=${colCount} style=${{ color: "var(--muted)", fontStyle: "italic" }}>Nav ierakstu.</td>
                          </tr>
                        </tbody>
                      `
                    : null}
              </table>
            </div>
            ${historyOpen && historyTotal > HIST_PAGE_SIZE
              ? html`
                  <div
                    class="row"
                    style=${{
                      justifyContent: "space-between",
                      alignItems: "center",
                      marginTop: "0.65rem",
                      flexWrap: "wrap",
                      gap: "0.5rem",
                    }}
                  >
                    <span style=${{ fontSize: "0.82rem", color: "var(--muted)" }}>
                      Lapa ${historySafePage + 1} / ${historyTotalPages} · ${historyTotal} ieraksti
                    </span>
                    <div class="row" style=${{ gap: "0.35rem" }}>
                      <button
                        type="button"
                        class="btn btn-ghost btn-small"
                        disabled=${historySafePage <= 0}
                        onClick=${() => setHistPage((p) => Math.max(0, p - 1))}
                      >
                        Iepriekšējā
                      </button>
                      <button
                        type="button"
                        class="btn btn-ghost btn-small"
                        disabled=${historySafePage >= historyTotalPages - 1}
                        onClick=${() => setHistPage((p) => Math.min(historyTotalPages - 1, p + 1))}
                      >
                        Nākamā
                      </button>
                    </div>
                  </div>
                `
              : null}
            ${editing
              ? html`
                  <div
                    style=${{
                      position: "fixed",
                      inset: 0,
                      background: "rgba(0,0,0,0.45)",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      zIndex: 50,
                      padding: "1rem",
                    }}
                    onClick=${() => setEditing(null)}
                  >
                    <div
                      class="list-panel"
                      style=${{ maxWidth: "400px", width: "100%" }}
                      onClick=${(ev) => ev.stopPropagation()}
                    >
                      <h3 style=${{ margin: "0 0 0.65rem", fontSize: "1rem" }}>Labot ierakstu</h3>
                      <form class="stack" onSubmit=${saveEdit}>
                        <div class="field">
                          <label>Veids</label>
                          <select
                            class="select"
                            required
                            value=${form.type_id}
                            onChange=${(ev) => setForm((f) => ({ ...f, type_id: ev.target.value }))}
                          >
                            ${typeOptionsEdit.map(
                              (t) => html`<option key=${t.id} value=${t.id}>${t.name}</option>`
                            )}
                          </select>
                        </div>
                        <div class="row" style=${{ gap: "0.75rem" }}>
                          <div class="field" style=${{ flex: 1 }}>
                            <label>No</label>
                            <input
                              type="date"
                              class="input"
                              required
                              value=${form.start_date}
                              onChange=${(ev) => setForm((f) => ({ ...f, start_date: ev.target.value }))}
                            />
                          </div>
                          <div class="field" style=${{ flex: 1 }}>
                            <label>Līdz</label>
                            <input
                              type="date"
                              class="input"
                              required
                              value=${form.end_date}
                              onChange=${(ev) => setForm((f) => ({ ...f, end_date: ev.target.value }))}
                            />
                          </div>
                        </div>
                        <div class="field">
                          <label>Komentārs</label>
                          <textarea
                            class="textarea"
                            value=${form.comment}
                            onChange=${(ev) => setForm((f) => ({ ...f, comment: ev.target.value }))}
                          />
                        </div>
                        <div class="row">
                          <button type="submit" class="btn btn-primary btn-small">Saglabāt</button>
                          <button type="button" class="btn btn-ghost btn-small" onClick=${() => setEditing(null)}>
                            Atcelt
                          </button>
                        </div>
                      </form>
                    </div>
                  </div>
                `
              : null}
            ${delId
              ? html`
                  <div
                    style=${{
                      position: "fixed",
                      inset: 0,
                      background: "rgba(0,0,0,0.45)",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      zIndex: 50,
                    }}
                  >
                    <div class="list-panel" style=${{ maxWidth: "360px" }}>
                      <p>Dzēst šo ierakstu?</p>
                      <div class="row">
                        <button type="button" class="btn btn-danger btn-small" onClick=${confirmDelete}>
                          Jā, dzēst
                        </button>
                        <button type="button" class="btn btn-ghost btn-small" onClick=${() => setDelId(null)}>
                          Nē
                        </button>
                      </div>
                    </div>
                  </div>
                `
              : null}
          </div>
        `;
      }

      function PrombutnesSection({ userId, role, promSub, setPromSub }) {
        const [month, setMonth] = useState(() => new Date());
        const [absences, setAbsences] = useState([]);
        const [typesList, setTypesList] = useState([]);
        const [teamUsers, setTeamUsers] = useState([]);
        const [deputyUserId, setDeputyUserId] = useState(null);
        const [deputyValidFrom, setDeputyValidFrom] = useState(null);
        const [deputyValidTo, setDeputyValidTo] = useState(null);
        const [approverCols, setApproverCols] = useState({
          status: COL_USER_APPROVER_STATUS,
          from: COL_USER_APPROVER_FROM,
          to: COL_USER_APPROVER_TO,
        });
        const [error, setError] = useState(null);
        const [historyOpen, setHistoryOpen] = useState(false);
        const [highlightAbsenceId, setHighlightAbsenceId] = useState(null);
        const [requestPresetDate, setRequestPresetDate] = useState("");
        const [highlightFromUrl, setHighlightFromUrl] = useState(null);
        useEffect(() => {
          if (isLocalMode()) {
            setTypesList(getLocalTypes());
            return;
          }
          supabase
            .from("prombutnes_veidi")
            .select("*")
            .order("id", { ascending: true })
            .then(({ data, error }) => {
              if (error) console.error(error);
              setTypesList((data ?? []).map(normalizeAbsenceTypeRecord));
            });
        }, []);
        const loadTeamAndDeputy = useCallback(async () => {
          if (isLocalMode()) {
            const users = (window.KOMANDA?.loadTeamUsers?.() ?? []).map((u) => ({
              ...u,
              id: String(u.id),
              // Nodrošina atslēgas UI šablonam
              [COL_USER_NAME]: u[COL_USER_NAME] ?? u.full_name ?? localDisplayName(),
              [COL_USER_AMATS]: u[COL_USER_AMATS] ?? u.Amats ?? "",
              // i-mail kolonnai (renderēšanā izmanto userImail(), bet drošībai ieliekam)
              email: u.email ?? u["e-pasts"] ?? u["i-mail"] ?? "",
            }));
            setTeamUsers(users);
            const localDeputyId = localStorage.getItem(LS_LOCAL_DEPUTY_USER_ID);
            const localFrom = localStorage.getItem(LS_LOCAL_DEPUTY_FROM);
            const localTo = localStorage.getItem(LS_LOCAL_DEPUTY_TO);
            setDeputyUserId(localDeputyId ? String(localDeputyId) : null);
            setDeputyValidFrom(localFrom || null);
            setDeputyValidTo(localTo || null);
            return;
          }
          await ensureDbReadableSession();
          let urows = null;
          let uErr = null;
          const uq1 = await supabase.from("users").select("*").order(COL_USER_NAME, { ascending: true });
          urows = uq1.data;
          uErr = uq1.error;
          if (uErr) {
            const uq2 = await supabase.from("users").select("*");
            urows = uq2.data;
            uErr = uq2.error;
          }
          if (uErr) {
            const pq = await supabase.from("profiles").select("*");
            urows = pq.data;
            uErr = pq.error;
          }
          if (uErr) console.error(uErr);
          const rawUsers = urows ?? [];
          const normalizedUsers = rawUsers.map(normalizeTeamUserRecord);
          setApproverCols(detectUserApproverColumns(rawUsers));
          setTeamUsers(normalizedUsers);
          if (window.SASKANOSANA?.loadState) {
            const st = await window.SASKANOSANA.loadState(supabase, DEFAULT_MANAGER_NAME);
            if (!st?.error) {
              setDeputyUserId(st.deputyUserId ?? null);
              setDeputyValidFrom(st.deputyFrom ?? null);
              setDeputyValidTo(st.deputyTo ?? null);
              return;
            }
          }
          const activeDeputy = resolveActiveDeputyUser(normalizedUsers);
          setDeputyUserId(activeDeputy?.id ? String(activeDeputy.id) : null);
          setDeputyValidFrom(activeDeputy?.[COL_USER_APPROVER_FROM] ?? null);
          setDeputyValidTo(activeDeputy?.[COL_USER_APPROVER_TO] ?? null);
        }, []);
        useEffect(() => {
          void loadTeamAndDeputy();
        }, [loadTeamAndDeputy]);
        const deputyEffectiveId = useMemo(
          () => effectiveDeputyUserId(deputyUserId, deputyValidFrom, deputyValidTo),
          [deputyUserId, deputyValidFrom, deputyValidTo]
        );
        const notifyEmail = useMemo(
          () => resolveNotifyEmail(teamUsers, deputyEffectiveId),
          [teamUsers, deputyEffectiveId]
        );
        const deputyDisplayName = useMemo(() => {
          if (!deputyEffectiveId || !teamUsers.length) return null;
          const u = teamUsers.find((x) => String(x.id) === String(deputyEffectiveId));
          const n = userDisplayName(u);
          return n !== "—" ? n : null;
        }, [deputyEffectiveId, teamUsers]);
        const refresh = useCallback(async () => {
          setError(null);
          if (isLocalMode()) {
            const types = getLocalTypes();
            const tmap = new Map(types.map((t) => [t.id, t]));
            const ln2 = localDisplayName();
            const userStub = (uid) => ({
              id: uid,
              full_name: ln2,
              [COL_USER_NAME]: ln2,
              [COL_USER_IMAIL]: "demo@local",
              [COL_USER_AMATS]: "",
            });
            const list = getLocalAbsences()
              .map((r) => ({
                ...r,
                type: tmap.get(r.type_id) ?? null,
                employee: userStub(r.user_id),
                approver_user: r.approved_by ? userStub(r.approved_by) : null,
              }))
              .sort((a, b) => a.start_date.localeCompare(b.start_date));
            setAbsences(list);
            return;
          }
          await ensureDbReadableSession();
          // 1) Prombūtnes ieraksti
          const { data: rows, error: qErr } = await supabase
            .from("prombutnes_dati")
            .select("*")
            .order(ABSENCE_COLS_RUNTIME.start_date, { ascending: true });
          if (qErr) {
            setError(qErr.message);
            return;
          }
          // 2) Lietotāju profili
          let profs = null;
          let pErr = null;
          const pu1 = await supabase.from("users").select("*");
          profs = pu1.data;
          pErr = pu1.error;
          if (pErr) {
            const pu2 = await supabase.from("profiles").select("*");
            profs = pu2.data;
            pErr = pu2.error;
          }
          if (pErr) setError(pErr.message);
          const pmap = new Map((profs ?? []).map((p) => [String(p.id), normalizeTeamUserRecord(p)]));
          // 3) Prombūtnes veidu saraksts (kārtošanai/labeliem)
          const { data: typesRows, error: tErr } = await supabase.from("prombutnes_veidi").select("*");
          if (tErr) console.error(tErr);
          const tmap = new Map(
            (typesRows ?? []).map((t) => {
              const nt = normalizeAbsenceTypeRecord(t);
              return [nt.id, nt];
            })
          );
          // 4) Normalizējam prombūtnes datus
          const list = (rows ?? [])
            .map((r) => {
              detectAbsenceColumnsFromRow(r);
              return normalizeAbsenceRecord(r);
            })
            .map((r) => {
              const employee = pmap.get(String(r.user_id)) ?? null;
              const employeeName =
                userDisplayName(employee) !== "—"
                  ? userDisplayName(employee)
                  : (r["Vārds uzvārds"] ?? r["Vards uzvards"] ?? "—");
              return {
                ...r,
                employee: employee
                  ? { ...employee, [COL_USER_NAME]: employeeName }
                  : { id: r.user_id, [COL_USER_NAME]: employeeName },
                type: tmap.get(r.type_id) ?? null,
                approver_user: r.approved_by ? pmap.get(String(r.approved_by)) ?? null : null,
              };
            });
          setAbsences(list);
        }, []);
        useEffect(() => {
          void refresh();
        }, [refresh]);

        // URL param: ?citsRow=<id> → atvērt vēsturi un izcelt konkrēto ierakstu
        useEffect(() => {
          try {
            const params = new URLSearchParams(window.location.search || "");
            const citsRow = params.get("citsRow");
            if (citsRow) {
              setPromSub("history");
              setHistoryOpen(true);
              setHighlightFromUrl(citsRow);
            }
          } catch {
            // ignore
          }
        }, []);
        const reloadUsersAndViews = useCallback(async () => {
          await loadTeamAndDeputy();
          await refresh();
        }, [loadTeamAndDeputy, refresh]);
        useEffect(() => {
          if (isLocalMode() || !supabase) return undefined;
          const bump = () => {
            void loadTeamAndDeputy();
            void refresh();
          };
          const ch = supabase
            .channel("pdd-prombutnes-live")
            .on("postgres_changes", { event: "*", schema: "public", table: "prombutnes_dati" }, bump)
            .on("postgres_changes", { event: "*", schema: "public", table: "users" }, bump)
            .subscribe();
          return () => {
            void supabase.removeChannel(ch);
          };
        }, [loadTeamAndDeputy, refresh]);
        const isManager = normalizeUserRole(role) === "admin";
        const canApprove = userCanApproveAbsences(role, userId, deputyEffectiveId);
        useEffect(() => {
          if (promSub === "deputy" && !isManager) setPromSub("calendar");
        }, [promSub, isManager, setPromSub]);
        const promSubLabel =
          promSub === "calendar"
            ? "Kalendārs"
            : promSub === "request"
              ? "Prombūtnes pieteikums"
              : promSub === "history"
                ? "Prombūtnes vēsture"
              : promSub === "changes"
                  ? "Auditācijas vēsture"
              : promSub === "teamUsers"
                ? "Komanda"
                : promSub === "deputy"
                  ? "Apstiprinātāja maiņa"
                  : "";
        return html`
          <section class="stack" style=${{ gap: "1.25rem" }}>
            <div>
              <h2 style=${{ margin: 0, fontSize: "1.15rem" }}>Prombūtnes</h2>
              <p class="app-sub" style=${{ margin: "0.25rem 0 0" }}>${promSubLabel}</p>
            </div>
            ${deputyEffectiveId
              ? html`
                  <div class="banner-deputy" role="status">
                    <strong>Uzmanību:</strong> šobrīd aktīvs Prombūtnes apstiprinātājs ir
                    <strong> ${deputyDisplayName ?? "izvēlēta persona"}</strong>.
                    ${deputyValidFrom || deputyValidTo
                      ? html`<span>
                          Periods: <strong>${deputyValidFrom ?? "—"}</strong> — <strong>${deputyValidTo ?? "—"}</strong>.
                        </span>`
                      : null}
                    „Cits (ar vadītāja saskaņojumu)” saskaņošanas e-pasts: <strong>${notifyEmail}</strong>.
                  </div>
                `
              : null}
            ${error
              ? html`
                  <div class="banner-warn" role="alert">Kļūda: ${error}</div>
                `
              : null}
            ${promSub === "calendar"
              ? html`
                  <div class="stack" style=${{ gap: "1rem" }}>
                    <${AbsenceCalendar}
                      month=${month}
                      onMonthChange=${setMonth}
                      absences=${absences}
                      caption="Komandas kalendārs. Parastie veidi reģistrējas uzreiz kā apstiprināti; „Cits (ar vadītāja saskaņojumu)” — pēc e-pasta apstiprinājuma. Spied uz krāsainās iezīmes, lai atvērtu ierakstu vēsturē."
                      onPickDay=${(d) => {
                        const ymd =
                          window.KALENDARS?.toYmd?.(d) ??
                          format(d, "yyyy-MM-dd");
                        setRequestPresetDate(ymd);
                        setPromSub("request");
                      }}
                      onPickAbsence=${(a) => {
                        setPromSub("history");
                        setHistoryOpen(true);
                        setHighlightAbsenceId(a.id);
                      }}
                    />
                  </div>
                `
              : null}
            ${promSub === "history"
              ? html`
                  <${PrombutnesHistoryPanel}
                    userId=${userId}
                    role=${role}
                    absences=${absences}
                    types=${typesList}
                    onRefresh=${refresh}
                    approverView=${canApprove}
                    historyOpen=${historyOpen}
                    onToggleHistory=${() => setHistoryOpen((o) => !o)}
                    highlightAbsenceId=${highlightAbsenceId || highlightFromUrl}
                    onClearHighlight=${() => setHighlightAbsenceId(null)}
                    canApproveAbsences=${canApprove}
                  />
                `
              : null}
            ${promSub === "request"
              ? html`
                  <${AbsenceRequestForm}
                    userId=${userId}
                    role=${role}
                    onCreated=${() => void refresh()}
                    notifyEmail=${notifyEmail}
                    presetDate=${requestPresetDate}
                    onConsumePreset=${() => setRequestPresetDate("")}
                    canApproveRequests=${canApprove}
                  />
                `
              : null}
            ${promSub === "deputy" && isManager
              ? html`
                  <${DeputyDelegePanel}
                    teamUsers=${teamUsers}
                    approverCols=${approverCols}
                    deputyUserId=${deputyUserId}
                    deputyValidFrom=${deputyValidFrom}
                    deputyValidTo=${deputyValidTo}
                    onDeputyChange=${reloadUsersAndViews}
                    currentUserId=${userId}
                  />
                `
              : null}
            ${promSub === "teamUsers"
              ? html`
                  <${TeamUsersDirectory}
                    users=${teamUsers}
                    canAdmin=${String(role || "").toLowerCase() === "admin"}
                    currentUserId=${userId}
                    onReload=${reloadUsersAndViews}
                  />
                `
              : null}
            ${promSub === "changes"
              ? html`<${ChangeHistoryPanel} isAdmin=${normalizeUserRole(role) === "admin"} />`
              : null}
          </section>
        `;
      }

      function ChangeHistoryPanel({ isAdmin }) {
        const [logs, setLogs] = useState([]);
        const [page, setPage] = useState(0);
        const PAGE_SIZE = 20;

        const refreshLogs = useCallback(async () => {
          const data = await fetchAuditLogs();
          setLogs(data);
        }, []);

        useEffect(() => {
          void refreshLogs();
        }, [refreshLogs]);

        const total = logs.length;
        const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
        const safePage = Math.min(page, totalPages - 1);
        const pageRows = logs.slice(safePage * PAGE_SIZE, safePage * PAGE_SIZE + PAGE_SIZE);

        if (!isAdmin) {
          return html`
            <section class="list-panel">
              <h2 style=${{ margin: "0 0 0.5rem" }}>Auditācijas vēsture</h2>
              <p style=${{ margin: 0, color: "var(--muted)" }}>
                Šī sadaļa pieejama tikai Admin lietotājiem.
              </p>
            </section>
          `;
        }

        return html`
          <section class="list-panel">
            <div class="row" style=${{ justifyContent: "space-between", alignItems: "center", marginBottom: "0.65rem" }}>
              <h2 style=${{ margin: 0, fontSize: "1rem" }}>Auditācijas vēsture</h2>
              <button type="button" class="btn btn-ghost btn-small" onClick=${() => void refreshLogs()}>
                Atjaunot
              </button>
            </div>
            <div class="table-wrap">
              <table class="hist-table">
                <thead>
                  <tr>
                    <th>Laiks</th>
                    <th>Lietotājs</th>
                    <th>Darbība</th>
                    <th>Detaļas</th>
                  </tr>
                </thead>
                <tbody>
                  ${pageRows.length
                    ? pageRows.map((r) => html`
                        <tr key=${r.id}>
                          <td>${r.ts ? String(r.ts).replace("T", " ").slice(0, 16) : "—"}</td>
                          <td>${r.actor_name ?? "—"}</td>
                          <td>${r.action ?? "—"}</td>
                          <td>${r.details ?? "—"}</td>
                        </tr>
                      `)
                    : html`
                        <tr>
                          <td colspan="4" style=${{ color: "var(--muted)", fontStyle: "italic" }}>Nav izmaiņu ierakstu.</td>
                        </tr>
                      `}
                </tbody>
              </table>
            </div>
            ${total > PAGE_SIZE
              ? html`
                  <div class="row" style=${{ justifyContent: "space-between", marginTop: "0.6rem" }}>
                    <span style=${{ color: "var(--muted)", fontSize: "0.82rem" }}>
                      Lapa ${safePage + 1} / ${totalPages} · ${total} ieraksti
                    </span>
                    <div class="row" style=${{ gap: "0.35rem" }}>
                      <button type="button" class="btn btn-ghost btn-small" disabled=${safePage <= 0} onClick=${() => setPage((p) => Math.max(0, p - 1))}>Iepriekšējā</button>
                      <button type="button" class="btn btn-ghost btn-small" disabled=${safePage >= totalPages - 1} onClick=${() => setPage((p) => Math.min(totalPages - 1, p + 1))}>Nākamā</button>
                    </div>
                  </div>
                `
              : null}
          </section>
        `;
      }

      function App() {
        const { session, loading } = useSession();
        const { profile, loading: profileLoading } = useProfile(session?.user?.id);
        const [view, setView] = useState("home");
        const [promSub, setPromSub] = useState("calendar");
        const showPromDeputyTab = profile?.role === "admin";
        const [citsToken, setCitsToken] = useState(() => readCitsTokenFromUrl());
        const title = useMemo(
          () => html`
            <div>
              <h1 class="app-title">PDD aplikācija</h1>
              <p class="app-sub">Pakalpojumu dizaina daļa — darba organizācija</p>
            </div>
          `,
          []
        );

        if (citsToken) {
          if (TIKAI_VIENKARSI_SKATS) {
            return html`
              <div class="app-shell">
                ${title}
                <${CitsPublicApprove}
                  token=${citsToken}
                  sessionUserId=${session?.user?.id ?? null}
                  profileRole=${profile?.role ?? "user"}
                  onDone=${() => {
                    setCitsToken("");
                    stripCitsFromUrl();
                  }}
                />
              </div>
            `;
          }
          if (isLocalMode() && !localSessionActive()) {
            return html`
              <div class="app-shell">
                ${title}
                <${LocalEmailLoginScreen} />
              </div>
            `;
          }
          if (configured() && !isLocalMode()) {
            if (loading) {
              return html`
                <div class="app-shell">
                  ${title}
                  <p style=${{ color: "var(--muted)" }}>Ielādē…</p>
                </div>
              `;
            }
            if (!session?.user) {
              return html`
                <div class="app-shell">
                  ${title}
                  <div class="banner-warn" role="alert" style=${{ marginBottom: "1rem", fontSize: "0.9rem" }}>
                    Lai apstiprinātu „Cits (ar vadītāja saskaņojumu)”, ielogojies. Apstiprināt drīkst tikai vadītājs
                    vai norādītais aktīvais aizvietotājs.
                  </div>
                  <${AuthScreen} />
                </div>
              `;
            }
            if (profileLoading) {
              return html`
                <div class="app-shell">
                  ${title}
                  <p style=${{ color: "var(--muted)" }}>Ielādē profilu…</p>
                </div>
              `;
            }
          }
          return html`
            <div class="app-shell">
              ${title}
              <${CitsPublicApprove}
                token=${citsToken}
                sessionUserId=${session?.user?.id ?? null}
                profileRole=${profile?.role ?? "user"}
                onDone=${() => {
                  setCitsToken("");
                  stripCitsFromUrl();
                }}
              />
            </div>
          `;
        }

        async function signOut() {
          if (TIKAI_VIENKARSI_SKATS) {
            setView("home");
            return;
          }
          if (isLocalMode() || sessionStorage.getItem(LS_LOCAL_OK) === "1") {
            sessionStorage.removeItem(LS_LOCAL_OK);
            sessionStorage.removeItem(LS_LOCAL_NAME);
            sessionStorage.removeItem(LS_LOCAL_USER_ID);
            sessionStorage.removeItem(LS_LOCAL_EMAIL);
            setView("home");
            location.reload();
            return;
          }
          if (supabase) await supabase.auth.signOut();
          setView("home");
        }

        if (isLocalMode() && !TIKAI_VIENKARSI_SKATS && !localSessionActive()) {
          return html`
            <div class="app-shell">
              ${title}
              <${LocalEmailLoginScreen} />
            </div>
          `;
        }

        if (configured()) {
          if (loading) {
            return html`
              <div class="app-shell">
                ${title}
                <p style=${{ color: "var(--muted)" }}>Ielādē…</p>
              </div>
            `;
          }
          if (!session?.user) {
            return html`
              <div class="app-shell">
                ${title}
                <${AuthScreen} />
              </div>
            `;
          }
        } else {
          if (loading) {
            return html`
              <div class="app-shell">
                ${title}
                <p style=${{ color: "var(--muted)" }}>Ielādē…</p>
              </div>
            `;
          }
        }

        if (!session?.user) {
          return null;
        }

        return html`
          <${AppShellWithNav}
            view=${view}
            onChangeView=${(v) => {
              setView(v);
              if (v === "prombutnes") setPromSub("calendar");
            }}
            promSub=${promSub}
            onPromSubChange=${setPromSub}
            showPromDeputyTab=${showPromDeputyTab}
            header=${html`
              <header class="app-header">
                ${title}
                <div class="row">
                  <span style=${{ color: "var(--muted)", fontSize: "0.9rem" }}>
                    Iekšā: ${userDisplayName(profile) !== "—" ? userDisplayName(profile) : session.user.email}
                    ${profile?.email || session?.user?.email ? html` · ${(profile?.email ?? session.user.email)}` : null}
                    ${TIKAI_VIENKARSI_SKATS ? html`<span> · lokāli</span>` : null}
                  </span>
                  ${TIKAI_VIENKARSI_SKATS ? null : html`<button type="button" class="btn btn-ghost btn-small" onClick=${signOut}>Iziet</button>`}
                </div>
              </header>
            `}
          >
            ${view === "home"
              ? html`<${Dashboard}
                  onOpenPrombutnes=${() => {
                    setView("prombutnes");
                    setPromSub("calendar");
                  }}
                />`
              : view === "team"
                ? html`<${PrombutnesSection}
                    userId=${session.user.id}
                    role=${profile?.role ?? "user"}
                    promSub=${"teamUsers"}
                    setPromSub=${() => {}}
                  />`
              : html`<${PrombutnesSection}
                    userId=${session.user.id}
                    role=${profile?.role ?? "user"}
                    promSub=${promSub}
                    setPromSub=${setPromSub}
                  />`}
          </${AppShellWithNav}>
        `;
      }

      createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
