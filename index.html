<!DOCTYPE html>
<html lang="lv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PDD — Pakalpojumu dizaina daļa; prombūtnes un darba plānošana" />
    <title>PDD aplikācija</title>
    <!--
      BEZ SERVERA: atver šo failu pārlūkā (file:///…) vai kopē uz jebkuru tīmekļa vietu.
      1) Tiešsaistei: <code>TIKAI_VIENKARSI_SKATS = false</code> un projekta URL + publiskā atslēga failā. Vietējā parole: <code>LocalPasswordScreen</code>. Ātra demo: <code>TIKAI_VIENKARSI_SKATS = true</code>.
      E-pasti: <code>public.users.email</code> (sinhronizējas no auth). Edge Functions: <code>notify-cits-manager</code>, <code>notify-cits-applicant</code>, <code>notify-absence-applicant</code> — vajadzīgi <code>RESEND_API_KEY</code> un <code>RESEND_FROM</code>.
      2) Palaižot no file:// dažās vecākās sistēmās bloķē trešo pušu moduļus — tad lieto
         to pašu failu caur https (piem. GitHub Pages) vai pārlūka iestatījumos atļauj file piekļuvi.
    -->
    <style>
      :root {
        color-scheme: light dark;
        --bg: hsl(161, 66%, 89%);
        --surface:  #75ccbd;
        --surface2: #63c2a5;
        --border: #4ab3a5;
        --text: #01171d;
        --muted: #020c1b;
        --accent: #5ae694;
        --accent-dim: #6ed8c1;
        --radius: 12px;
        font-family: "Segoe UI", system-ui, sans-serif;
        line-height: 1.5;
      }
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(1200px 600px at 10% -10%, #1e3a46 0%, transparent 55%),
          radial-gradient(900px 500px at 100% 0%, #134e4a 0%, transparent 50%), var(--bg);
        color: var(--text);
      }
      #root { min-height: 100vh; }
      button, input, select, textarea { font: inherit; }
      button { cursor: pointer; }
      .app-shell { max-width: 1200px; margin: 0 auto; padding: 1.25rem 1.25rem 3rem; }
      .app-layout {
        display: flex;
        align-items: stretch;
        min-height: 100vh;
        max-width: 1320px;
        margin: 0 auto;
      }
      .app-nav {
        flex: 0 0 200px;
        border-right: 1px solid var(--border);
        background: var(--surface);
        padding: 1rem 0.65rem;
      }
      .app-nav-inner {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        position: sticky;
        top: 1rem;
      }
      .app-nav-title {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin: 0 0 0.35rem 0.35rem;
      }
      .app-nav-link {
        display: block;
        width: 100%;
        text-align: left;
        padding: 0.5rem 0.65rem;
        border-radius: 8px;
        border: 1px solid transparent;
        background: transparent;
        color: inherit;
        font-size: 0.92rem;
      }
      .app-nav-link:hover {
        border-color: var(--border);
        background: rgba(0, 0, 0, 0.06);
      }
      .app-nav-link.active {
        background: var(--surface2);
        border-color: var(--border);
        font-weight: 600;
      }
      .app-main {
        flex: 1;
        min-width: 0;
        padding: 1.25rem 1.25rem 3rem;
      }
      @media (max-width: 720px) {
        .app-layout { flex-direction: column; }
        .app-nav {
          flex: none;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
        .app-nav-inner {
          flex-direction: row;
          flex-wrap: wrap;
          position: static;
        }
        .app-nav-link { flex: 1 1 auto; min-width: 120px; }
      }
      .app-header {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
      }
      .app-title { margin: 0; font-size: 1.35rem; font-weight: 600; }
      .app-sub { margin: 0.25rem 0 0; font-size: 0.9rem; color: var(--muted); }
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 1rem;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.1rem;
        text-align: left;
        transition: border-color 0.15s, transform 0.12s;
      }
      .card:hover { border-color: var(--accent-dim); transform: translateY(-1px); }
      .card h3 { margin: 0 0 0.35rem; font-size: 1rem; }
      .card p { margin: 0; font-size: 0.88rem; color: var(--muted); }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        padding: 0.45rem 0.9rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text);
      }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-primary {
        background: linear-gradient(180deg, #01102c, #01102c);
        border-color: #01102c;
        color: #fff;
      }
      .btn-ghost { background: transparent; }
      .btn-danger { background: #3f1515; border-color: #7f1d1d; color: #fecaca; }
      .btn-small { padding: 0.25rem 0.55rem; font-size: 0.8rem; }
      .field { display: flex; flex-direction: column; gap: 0.35rem; }
      .field label { font-size: 0.8rem; color: var(--muted); }
      .input, .select, .textarea {
        padding: 0.5rem 0.65rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
      }
      .textarea { min-height: 72px; resize: vertical; }
      .stack { display: flex; flex-direction: column; gap: 0.85rem; }
      .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
      .banner-warn {
        padding: 0.65rem 0.9rem;
        border-radius: 8px;
        background: #422006;
        border: 1px solid #854d0e;
        color: #fde68a;
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }
      .banner-deputy {
        padding: 0.65rem 0.9rem;
        border-radius: 8px;
        background: #450a0a;
        border: 1px solid #991b1b;
        color: #fecaca;
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }
      .cal-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem;
        overflow: auto;
      }
      .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(64px, 1fr));
        gap: 4px;
        min-width: 480px;
      }
      .cal-dow {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        text-align: center;
        padding: 0.25rem;
      }
      .cal-cell {
        min-height: 72px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        padding: 4px;
        font-size: 0.75rem;
      }
      .cal-cell-out { opacity: 0.45; }
      .cal-cell-today { outline: 1px solid var(--accent); }
      .cal-day-num { font-weight: 600; margin-bottom: 2px; }
      .cal-chip {
        display: block;
        border-radius: 4px;
        padding: 1px 4px;
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 0.65rem;
      }
      .list-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem;
      }
      .list-panel h2 { margin: 0 0 0.75rem; font-size: 1rem; }
      .abs-item {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.65rem;
        margin-bottom: 0.5rem;
        background: var(--bg);
      }
      .abs-item:last-child { margin-bottom: 0; }
      .badge {
        display: inline-block;
        font-size: 0.7rem;
        padding: 0.15rem 0.4rem;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .badge-pending { background: #422006; color: #fde68a; }
      .badge-approved { background: #064e3b; color: #a7f3d0; }
      .badge-rejected { background: #450a0a; color: #fecaca; }
      .auth-box {
        max-width: 380px;
        margin: 3rem auto;
        padding: 1.5rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }
      .auth-box h1 { margin: 0 0 1rem; font-size: 1.2rem; }
      .prombutnes-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(260px, 340px);
        gap: 1rem;
      }
      @media (max-width: 900px) {
        .prombutnes-grid { grid-template-columns: 1fr; }
      }
      code { background: var(--surface); padding: 0.1em 0.35em; border-radius: 4px; font-size: 0.9em; }
      .table-wrap {
        overflow-x: auto;
        margin-top: 0.5rem;
      }
      .team-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
      }
      .team-table th,
      .team-table td {
        border: 1px solid var(--border);
        padding: 0.45rem 0.55rem;
        text-align: left;
      }
      .team-table th {
        background: var(--bg);
        font-weight: 600;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
      }
      .team-table tbody tr:nth-child(even) {
        background: rgba(0, 0, 0, 0.04);
      }
      .team-users-panel {
        margin-top: 1.5rem;
      }
      .app-nav-sub {
        margin: 0.35rem 0 0 0.35rem;
        padding-left: 0.65rem;
        border-left: 2px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
      }
      .app-nav-sublink {
        font-size: 0.86rem;
        text-align: left;
        padding: 0.35rem 0.5rem;
        border-radius: 6px;
        border: none;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
      }
      .app-nav-sublink:hover {
        color: var(--text);
        background: rgba(0, 0, 0, 0.06);
      }
      .app-nav-sublink.active {
        color: var(--text);
        font-weight: 600;
        background: rgba(0, 0, 0, 0.08);
      }
      .hist-table-wrap {
        margin-top: 0.5rem;
      }
      .hist-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8rem;
      }
      .hist-table th,
      .hist-table td {
        border: 1px solid var(--border);
        padding: 0.4rem 0.45rem;
        text-align: left;
        vertical-align: top;
      }
      .hist-table th {
        background: var(--bg);
        font-weight: 600;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        color: var(--muted);
        white-space: nowrap;
      }
      .hist-table tbody tr:nth-child(even) {
        background: rgba(0, 0, 0, 0.03);
      }
      .hist-row-highlight {
        outline: 2px solid var(--accent);
        outline-offset: -2px;
        background: rgba(90, 230, 148, 0.15) !important;
      }
      .cal-chip {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <noscript><p style="padding:1rem;font-family:system-ui">Ieslēdz JavaScript.</p></noscript>
    <div id="root"></div>

    <!-- Lokālie dati + ziņas komandai (bez Supabase/API) -->
    <script src="./Komanda.js"></script>
    <script src="./Kalendars.js"></script>
    <script src="./Filtr.js"></script>
    <script src="./Saskaņošana.js"></script>

    <script type="module">
      import React, { useState, useEffect, useCallback, useMemo } from "https://esm.sh/react@19.0.0";
      import { createRoot } from "https://esm.sh/react-dom@19.0.0/client";
      import htm from "https://esm.sh/htm@3.1.1";
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2.49.1";
      import {
        format,
        addMonths,
        eachDayOfInterval,
        endOfMonth,
        endOfWeek,
        isSameMonth,
        isToday,
        startOfMonth,
        startOfWeek,
      } from "https://esm.sh/date-fns@4.1.0";
      import { lv } from "https://esm.sh/date-fns@4.1.0/locale/lv";

      // Vietējais režīms (bez API): parole un dati pārlūkā. Mainiet paroli šeit:
      const PAGAIDU_PAROLE = "pdd";
      const LOCAL_USER_ID = "local-user-1";
      const LS_LOCAL_OK = "pdd_local_ok";
      const LS_LOCAL_NAME = "pdd_local_display_name";
      const LS_LOCAL_USER_ID = "pdd_local_user_id";
      const LS_LOCAL_EMAIL = "pdd_local_email";
      /** Adminam: atļaut atvērt bez ielogošanās (lokāli). */
      const ADMIN_AUTO_ENTER = true;
      const LS_ABS = "pdd_local_absences";
      const LS_TYPES = "pdd_local_types";
      const LS_LOCAL_CITS = "pdd_local_cits_requests";
      const LS_CHANGE_LOG = "pdd_change_log_v1";
      const LS_LOCAL_DEPUTY_USER_ID = "pdd_local_deputy_user_id";
      const LS_LOCAL_DEPUTY_FROM = "pdd_local_deputy_from";
      const LS_LOCAL_DEPUTY_TO = "pdd_local_deputy_to";
      /** Pamata e-pasts paziņojumiem, kad nav aktīva aizvietotāja (saskaņā ar PDD iestatījumiem). */
      const DEFAULT_MANAGER_EMAIL = "pliada@inbox.lv";
      const DEFAULT_MANAGER_NAME = "Katrīna Jirgensone";
      /** Dropdown: nav DB p.i. — apstiprinājumi uz pamatvadītāju. */
      const DEPUTY_OPT_MANAGER = "__vaditajs__";
      /** Supabase public.users kolonnas (kā tabulas skatā). */
      const COL_USER_NAME = "Vārds uzvārds";
      const COL_USER_IMAIL = "i-mail";
      const COL_USER_AMATS = "Amats";
      const COL_USER_ROLE = "LOMA";
      const COL_USER_APPROVER_STATUS = "Apstiprinātāja statuss";
      const COL_USER_APPROVER_FROM = "Apstiprinājuma lomas periods no";
      const COL_USER_APPROVER_TO = "Apstiprinājuma lomas periods līdz";
      const USER_APPROVER_STATUS_ALIASES = [
        "Apstiprinātāja statuss",
        "Apstiprinataja statuss",
        "apstiprinataja_statuss",
        "apstiprinataja_status",
        "approver_status",
      ];
      const USER_APPROVER_FROM_ALIASES = [
        "Apstiprinājuma lomas periods no",
        "Apstiprinajuma lomas periods no",
        "apstiprinajuma_lomas_periods_no",
        "approver_period_from",
      ];
      const USER_APPROVER_TO_ALIASES = [
        "Apstiprinājuma lomas periods līdz",
        "Apstiprinajuma lomas periods līdz",
        "Apstiprinajuma lomas periods lidz",
        "apstiprinajuma_lomas_periods_lidz",
        "approver_period_to",
      ];
      const TEAM_PAGE_SIZE = 20;
      const ABSENCE_ALT_KEYS = {
        user_id: ["user_id", "darbinieks_id", "darbinieka_id", "darbinieka id", "darbinieks", "vārds uzvārds", "vards uzvards"],
        type_id: ["type_id", "type", "prombūtnes veids", "prombutnes veids", "prombutnes_veids", "veids"],
        start_date: ["start_date", "sākuma datums", "sakuma_datums", "sakuma datums", "sākuma_datums", "sākuma_datums"],
        end_date: ["end_date", "beigu datums", "beigu_datums", "beigu_datums"],
        comment: ["comment", "komentāri", "komentari", "komentārs", "komentars"],
        status: ["status", "statuss", "statuss"],
        approved_by: ["approved_by", "apstiprinaja", "apstiprinātājs", "apstiprinatajs"],
        approved_at: ["approved_at", "apstiprināts", "apstiprinats", "apstiprināts_at", "apstiprinats_at", "apstiprinājuma_laiks", "apstiprinajuma_laiks"],
        created_at: ["created_at", "izveidots", "izveidots_at"],
      };
      const ABSENCE_COLS_RUNTIME = {
        user_id: "Vārds uzvārds",   // uuid → public.users.id
        type_id: "type",           // integer
        start_date: "Sakuma_datums",
        end_date: "Beigu_datums",
        comment: "Komentārs",
        status: "Statuss",
        approved_by: "approved_by",
        approved_at: "created_at",
      };

      function pickByAliases(obj, aliases, fallback = null) {
        if (!obj || !aliases?.length) return fallback;
        const entries = Object.entries(obj);
        for (const alias of aliases) {
          const wanted = String(alias).toLowerCase().trim();
          const hit = entries.find(([k]) => String(k).toLowerCase().trim() === wanted);
          if (hit && hit[1] != null) return hit[1];
        }
        return fallback;
      }

      function normalizeAliasKey(s) {
        return String(s ?? "")
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/\s+/g, " ")
          .trim();
      }

      function detectUserApproverColumns(usersLike) {
        const rows = Array.isArray(usersLike) ? usersLike : [];
        const keys = new Set();
        for (const u of rows) {
          if (!u || typeof u !== "object") continue;
          for (const k of Object.keys(u)) keys.add(k);
        }
        const all = Array.from(keys);
        const findByAliases = (aliases, fallback) => {
          const normAliases = aliases.map(normalizeAliasKey);
          const hit = all.find((k) => normAliases.includes(normalizeAliasKey(k)));
          return hit || fallback;
        };
        return {
          status: findByAliases(USER_APPROVER_STATUS_ALIASES, COL_USER_APPROVER_STATUS),
          from: findByAliases(USER_APPROVER_FROM_ALIASES, COL_USER_APPROVER_FROM),
          to: findByAliases(USER_APPROVER_TO_ALIASES, COL_USER_APPROVER_TO),
        };
      }

      function detectAbsenceColumnsFromRow(row) {
        if (!row || typeof row !== "object") return;
        for (const [canon, aliases] of Object.entries(ABSENCE_ALT_KEYS)) {
          const hit = pickByAliases(row, aliases, undefined);
          if (hit !== undefined) {
            const key = Object.keys(row).find((k) =>
              aliases.some((a) => String(a).toLowerCase().trim() === String(k).toLowerCase().trim())
            );
            if (key) ABSENCE_COLS_RUNTIME[canon] = key;
          }
        }
      }

      function userRoleValue(u) {
        return normalizeUserRole(
          u?.role ??
            u?.Role ??
            u?.ROLE ??
            u?.[COL_USER_ROLE] ??
            u?.loma ??
            u?.Loma ??
            u?.LOMA
        );
      }

      function normalizeAbsenceRecord(r) {
        const typeRaw = pickByAliases(r, ABSENCE_ALT_KEYS.type_id, null);
        const startRaw = pickByAliases(r, ABSENCE_ALT_KEYS.start_date, "");
        const endRaw = pickByAliases(r, ABSENCE_ALT_KEYS.end_date, "");
        const commentRaw = pickByAliases(r, ABSENCE_ALT_KEYS.comment, null);
        const statusRaw = pickByAliases(r, ABSENCE_ALT_KEYS.status, "pending");
        return {
          ...r,
          user_id: String(pickByAliases(r, ABSENCE_ALT_KEYS.user_id, r?.user_id ?? "")),
          type_id: typeRaw == null || typeRaw === "" ? null : Number(typeRaw),
          start_date: String(startRaw ?? ""),
          end_date: String(endRaw ?? ""),
          comment: commentRaw == null ? null : String(commentRaw),
          status: normalizeAbsenceStatus(statusRaw),
          approved_by: pickByAliases(r, ABSENCE_ALT_KEYS.approved_by, null),
          approved_at: pickByAliases(r, ABSENCE_ALT_KEYS.approved_at, null),
          created_at: pickByAliases(r, ABSENCE_ALT_KEYS.created_at, r?.created_at ?? null),
        };
      }

      function absencePayloadClassic({ userId, userName, typeId, startDate, endDate, comment, status, approvedBy, approvedAt }) {
        return {
          "Vārds uzvārds": userId,
          type_id: Number(typeId),
          start_date: startDate,
          end_date: endDate,
          comment: comment ?? null,
          status,
          approved_by: approvedBy ?? null,
          approved_at: approvedAt ?? null,
        };
      }

      function dbUserRefValue({ userId, userName, columnName }) {
        const _unusedName = userName;
        const c = String(columnName ?? "").toLowerCase().trim();
        if (c) return userId;
        return userId;
      }

      function absencePayloadDetected({ userId, userName, typeId, startDate, endDate, comment, status, approvedBy, approvedAt }) {
        return {
          [ABSENCE_COLS_RUNTIME.user_id]: userId,
          [ABSENCE_COLS_RUNTIME.type_id]: Number(typeId),
          [ABSENCE_COLS_RUNTIME.start_date]: startDate,
          [ABSENCE_COLS_RUNTIME.end_date]: endDate,
          [ABSENCE_COLS_RUNTIME.comment]: comment ?? null,
          [ABSENCE_COLS_RUNTIME.status]: status,
          [ABSENCE_COLS_RUNTIME.approved_by]: approvedBy ?? null,
          [ABSENCE_COLS_RUNTIME.approved_at]: approvedAt ?? null,
        };
      }

      function absencePayloadLatvian({ userId, typeId, startDate, endDate, comment, status, approvedBy, approvedAt }) {
        return {
          "Prombūtnes veids": Number(typeId),
          "Sākuma datums": startDate,
          "Beigu datums": endDate,
          "Komentāri": comment ?? null,
          STATUSS: status,
          "Apstiprinātājs": approvedBy ?? null,
          "Apstiprināts": approvedAt ?? null,
        };
      }

      function absencePayloadLatvianUnderscore({
        userId,
        userName,
        typeId,
        startDate,
        endDate,
        comment,
        status,
        approvedBy,
        approvedAt,
      }) {
        return {
          type: Number(typeId),
          sakuma_datums: startDate,
          beigu_datums: endDate,
          Komentārs: comment ?? null,
          Statuss: status,
          approved_by: approvedBy ?? null,
          created_at: approvedAt ?? null,
        };
      }

      function absencePayloadLatvianUnderscoreCaps({
        userId,
        userName,
        typeId,
        startDate,
        endDate,
        comment,
        status,
        approvedBy,
        approvedAt,
      }) {
        return {

        return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(String(v ?? ""));

      async function insertWithColumnPruning(table, initialPayload, opts = {}, maxTries = 8) {
        let payload = { ...initialPayload };
        const userId = opts?.userId ?? null;
        const userName = String(opts?.userName ?? "").trim();
        const startDate = opts?.startDate ?? null;
        let lastErr = null;
        for (let i = 0; i < maxTries; i += 1) {
          const { error } = await supabase.from(table).insert(payload);
          if (!error) return null;
          lastErr = error;
          const msg = String(error?.message ?? "");

          // Ja kļūda par UUID sintaksi un payload satur vārdu, pārslēdzam uz userId.
          if (/invalid input syntax for type uuid/i.test(msg) && userId && userName) {
            const invalidUuidMatch = msg.match(/type uuid:\s*"([^"]+)"/i);
            const invalidValue = invalidUuidMatch?.[1] ? String(invalidUuidMatch[1]).trim() : null;
            let changed = false;
            for (const k of Object.keys(payload)) {
              const v = String(payload[k] ?? "").trim();
              const lk = String(k).toLowerCase();
              if (
                v &&
                !isUuidLike(v) &&
                (v === userName || v === invalidValue || looksLikeNameRefKey(k))
              ) {
                payload[k] = userId;
                changed = true;
              }
            }
            if (changed) continue;
          }

          // Ja FK kļūda uz "Vārds uzvārds", šī kolonna tavā DB ir reference uz users.id (UUID).
          if (/foreign key constraint.*prombutnes_dati_.*vārds uzvārds.*_fkey/i.test(msg) && userId) {
            let changed = false;
            for (const k of Object.keys(payload)) {
              const lk = String(k).toLowerCase();
              if (lk.includes("vārds uzvārds") || lk.includes("vards uzvards")) {
                payload[k] = userId;
                changed = true;
              }
            }
            if (!changed && !("Vārds uzvārds" in payload)) {
              payload["Vārds uzvārds"] = userId;
              changed = true;
            }
            if (changed) continue;
          }

          // Ja NOT NULL kļūda par Sakuma_datums / sakuma_datums, ieliekam startDate.
          if (/null value in column "sakuma_datums"/i.test(msg) && startDate) {
            payload.sakuma_datums = startDate;
            continue;
          }
          if (/null value in column "Sakuma_datums"/i.test(msg) && startDate) {
            payload.Sakuma_datums = startDate;
            continue;
          }

          const missingCol = missingColumnFromError(error);
          if (!missingCol) return error;
          const keys = Object.keys(payload);
          const hitKey = keys.find((k) => String(k).toLowerCase() === missingCol.toLowerCase());
          if (!hitKey) return error;
          delete payload[hitKey];
          // Neatstājam tukšu payload, citādi inserts nav jēgpilns.
          if (Object.keys(payload).length === 0) return error;
        }
        return lastErr;
      }

          const s = String(raw ?? "").trim();
          if (!s) return "";
          // yyyy-mm-dd
          let m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s);
          if (m) return `${m[1]}-${m[2]}-${m[3]}`;
          // dd/mm/yyyy
          m = /^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);
          if (m) return `${m[3]}-${m[2]}-${m[1]}`;
          // dd.mm.yyyy
          m = /^(\d{2})\.(\d{2})\.(\d{4})$/.exec(s);
          if (m) return `${m[3]}-${m[2]}-${m[1]}`;
          return s;
        }
        const list = Array.isArray(teamUsers) ? teamUsers : [];
        const manager = resolveManagerUser(list);
        const todayIso = toIsoDate(todayStr);
        return (
          list.find((u) => {
            if (manager && String(u.id) === String(manager.id)) return false;
            if (normalizeApproverMode(u?.[COL_USER_APPROVER_STATUS]) !== "period") return false;
            const fromIso = toIsoDate(u?.[COL_USER_APPROVER_FROM] ?? u?.approver_period_from ?? "");

        const seed = [

          { id: 2, name: "Papildatvaļinājums", color: "#7c3aed", sort_order: 2 },

          { id: 7, name: "Cits (ar vadītāja saskaņojumu)", color: "#64748b", sort_order: 7 },
        ];
        localStorage.setItem(LS_TYPES, JSON.stringify(seed));
      }

      function getLocalTypes() {
        ensureLocalTypes();
        const rows = JSON.parse(localStorage.getItem(LS_TYPES) || "[]");
        if (!Array.isArray(rows)) return [];
        const normalized = rows.map((t) => {
          const n = String(t?.name ?? "");
          if (/^cits\s*\(\s*saskaņots\s*\)$/i.test(n)) {
            return { ...t, name: "Cits (ar vadītāja saskaņojumu)" };
          }
          return t;
        });
        if (JSON.stringify(normalized) !== JSON.stringify(rows)) {
          localStorage.setItem(LS_TYPES, JSON.stringify(normalized));
        }
        return normalized;
      }

      function getLocalAbsences() {
        const rows = JSON.parse(localStorage.getItem(LS_ABS) || "[]");
        if (!Array.isArray(rows) || rows.length === 0) return Array.isArray(rows) ? rows : [];

        // Retention: dzēšam prombūtnes, kuras beigušās senāk par 3 mēnešiem.
        try {
          const cutoff = format(subMonths(new Date(), 3), "yyyy-MM-dd");
          const kept = rows.filter((r) => {
            const end = String(r?.end_date ?? "");
            if (!end) return true;
            return end >= cutoff;
          });
          if (kept.length !== rows.length) localStorage.setItem(LS_ABS, JSON.stringify(kept));
          return kept;
        } catch {
          return rows;
        }
      }

      function setLocalAbsences(rows) {
        localStorage.setItem(LS_ABS, JSON.stringify(rows));
      }

      function useSession() {
        const [session, setSession] = useState(null);
        const [loading, setLoading] = useState(true);
        useEffect(() => {
          if (TIKAI_VIENKARSI_SKATS) {
            ensureLocalAdminSession();
            const uid = sessionStorage.getItem(LS_LOCAL_USER_ID) || LOCAL_USER_ID;
            const em = sessionStorage.getItem(LS_LOCAL_EMAIL) || "local@pdd";
            setSession({ user: { id: uid, email: em } });
            setLoading(false);
            return;
          }
          if (isLocalMode()) {
            ensureLocalAdminSession();
            if (localSessionActive()) {
              const uid = sessionStorage.getItem(LS_LOCAL_USER_ID) || LOCAL_USER_ID;
              const em = sessionStorage.getItem(LS_LOCAL_EMAIL) || "demo@local";
              setSession({ user: { id: uid, email: em } });
            } else {
              setSession(null);
            }
            setLoading(false);
            return;
          }
          if (sessionStorage.getItem(LS_LOCAL_OK) === "1") {
            const uid = sessionStorage.getItem(LS_LOCAL_USER_ID) || LOCAL_USER_ID;
            const em = sessionStorage.getItem(LS_LOCAL_EMAIL) || "demo@local";
            setSession({ user: { id: uid, email: em } });
            setLoading(false);
            return;
          }
          if (!supabase) {
            setLoading(false);
            return;
          }
          let cancelled = false;
          supabase.auth.getSession().then(({ data }) => {
            if (!cancelled) {
              setSession(data.session);
              setLoading(false);
            }
          });
          const { data } = supabase.auth.onAuthStateChange((_e, next) => setSession(next));
          return () => {
            cancelled = true;
            data.subscription.unsubscribe();
          };
        }, []);
        return { session, loading };
      }

      function useProfile(userId) {
        const [profile, setProfile] = useState(null);
        const [loading, setLoading] = useState(Boolean(userId));
        useEffect(() => {
          if (!userId) {
            setProfile(null);
            setLoading(false);
            return;
          }
          if (isLocalMode()) {
            const ln = localDisplayName();
            const uid = sessionStorage.getItem(LS_LOCAL_USER_ID) || LOCAL_USER_ID;
            const users = window.KOMANDA?.loadTeamUsers?.() ?? [];
            const me = (Array.isArray(users) ? users : []).find((u) => String(u.id) === String(uid)) ?? null;
            setProfile({
              id: uid,
              full_name: me?.full_name ?? me?.[COL_USER_NAME] ?? ln,
              [COL_USER_NAME]: me?.[COL_USER_NAME] ?? me?.full_name ?? ln,
              [COL_USER_IMAIL]: me?.[COL_USER_IMAIL] ?? me?.email ?? sessionStorage.getItem(LS_LOCAL_EMAIL) ?? "",
              [COL_USER_AMATS]: me?.[COL_USER_AMATS] ?? me?.Amats ?? "",
              email: me?.email ?? sessionStorage.getItem(LS_LOCAL_EMAIL) ?? null,
              [COL_USER_ROLE]: userRoleValue(me),
              role: userRoleValue(me),
              created_at: null,
            });
            setLoading(false);
            return;
          }
          if (!supabase) {
            setProfile(null);
            setLoading(false);
            return;
          }
          let cancelled = false;
          setLoading(true);
          (async () => {
            await ensureDbReadableSession();
            const q1 = await supabase.from("users").select("*").eq("id", userId).maybeSingle();
            let data = q1.data;
            let error = q1.error;
            if (error) {
              const q2 = await supabase.from("profiles").select("*").eq("id", userId).maybeSingle();
              data = q2.data;
              error = q2.error;
            }
            if (!cancelled) {
              if (error) console.error(error);
              setProfile(data ? normalizeTeamUserRecord(data) : null);
              setLoading(false);
            }
          })();
          return () => {
            cancelled = true;
          };
        }, [userId]);
        return { profile, loading };
      }

      /** Lietotājam — īsas ziņas latviski; tehniskās detaļas tikai konsolē ([auth]). */
      function authUserMessage(raw) {
        const m = raw ? String(raw).toLowerCase() : "";
        if (/signups not allowed|signup.*disabled|email signups.*disabled/i.test(m)) {
          console.error("[auth]", raw);
          return "Jaunu kontu reģistrācija šajā vidē ir izslēgta. Izmanto „Ieiet”, ja konts jau izveidots, vai sazinies ar administratoru.";
        }
        if (
          /invalid api key|invalid api|invalid jwt|jwt expired|malformed|apikey|401|403 forbidden|failed to fetch|network|load failed|err_network/i.test(
            m
          )
        ) {
          console.error("[auth]", raw);
          return (
            "Neizdevās savienoties ar datu serveri. Mēģini vēlāk vai ziņo administratoram. " +
            "Ja uzturi lapu: pārlūkā atver izstrādātāja rīkus (F12) → Console — tur ir ieraksts [auth]; bieži vaina ir nepareizā publiskajā atslēgā, citā projekta adresē, pauzētā projektā vai nepareizā vietnes adresē e-pasta apstiprinājumam."
          );
        }
        if (/invalid login|invalid credentials|wrong password|email not confirmed|email address not confirmed/i.test(m)) {
          if (/email not confirmed|not confirmed/i.test(m)) {
            return "Lūdzu vispirms apstiprini e-pastu — atver vēstuli un spied uz saites, tad mēģini ielogoties.";
          }
          return "Nepareizs e-pasts vai konts vēl nav apstiprināts.";
        }
        if (/user already registered|already been registered|already exists/i.test(m)) {
          return "Šim e-pastam konts jau pastāv. Izmanto „Ieiet”.";
        }
        if (/rate limit|too many requests/i.test(m)) {
          return "Pārāk daudz mēģinājumu. Uzgaidi brīdi un mēģini vēlreiz.";
        }
        console.warn("[auth]", raw);
        return "Neizdevās. Mēģini vēlreiz.";
      }

      function AuthScreen() {
        const [email, setEmail] = useState("");
        const [busy, setBusy] = useState(false);
        const [message, setMessage] = useState(null);
        async function onSubmit(e) {
          e.preventDefault();
          setMessage(null);
          if (!supabase) {
            setMessage("Pieteikšanās šobrīd nav pieejama.");
            return;
          }
          setBusy(true);
          try {
            const entered = String(email || "").trim().toLowerCase();
            if (!entered || !entered.includes("@")) {
              setMessage("Ievadi korektu darba e-pastu.");
              return;
            }
            let uid = "";
            const { data: rpcRows, error: rpcErr } = await supabase.rpc("pdd_lookup_user_by_email", {
              p_email: entered,
            });
            if (!rpcErr && Array.isArray(rpcRows) && rpcRows.length > 0) {
              const r0 = rpcRows[0];
              uid = String(r0?.user_id ?? r0?.pdd_lookup_user_by_email ?? "").trim();
            }
            if (!uid) {
              const { data, error } = await supabase.from("users").select("*");
              if (error) {
                setMessage(authUserMessage(error.message));
                return;
              }
              const list = Array.isArray(data) ? data : [];
              const user =
                list.find(
                  (u) => String(u?.email ?? u?.["i-mail"] ?? u?.["e-mail"] ?? u?.["e-pasts"] ?? "").trim().toLowerCase() === entered
                ) ?? null;
              if (!user) {
                if (rpcErr) {
                  setMessage(
                    authUserMessage(rpcErr.message) +
                      "\n\nJa esi administrators: palaid Supabase SQL skriptu `pdd_lookup_user_by_email` (migration)."
                  );
                } else {
                  setMessage("Šis e-pasts nav atrasts Komandas tabulā.");
                }
                return;
              }
              uid = String(user.id);
            }
            sessionStorage.setItem(LS_LOCAL_OK, "1");
            sessionStorage.setItem(LS_LOCAL_USER_ID, uid);
            sessionStorage.setItem(LS_LOCAL_EMAIL, entered);
            location.reload();
          } finally {
            setBusy(false);
          }
        }
        return html`
          <div class="auth-box">
            <h1>PDD — Pieslēgšanās</h1>
            <p style=${{ margin: "0 0 1rem", fontSize: "0.88rem", color: "var(--muted)" }}>
              Tikai <strong>darba e-pasts</strong>. Parole nav nepieciešama.
            </p>
            <form class="stack" onSubmit=${onSubmit}>
              <div class="field">
                <label for="email">E-pasts</label>
                <input
                  id="email"
                  type="email"
                  class="input"
                  required
                  value=${email}
                  onChange=${(ev) => setEmail(ev.target.value)}
                  autoComplete="email"
                />
              </div>
              <button type="submit" class="btn btn-primary" disabled=${busy}>
                ${busy ? "…" : "Ieiet"}
              </button>
            </form>
            ${message
              ? html`<p style=${{ marginTop: "1rem", color: "var(--muted)", whiteSpace: "pre-wrap" }}>${message}</p>`
              : null}
          </div>
        `;
      }

      const dow = ["P", "O", "T", "C", "P", "S", "Sv"];
      function dayKey(d) {
        return format(d, "yyyy-MM-dd");
      }
      function hexToRgb(hex) {
        const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(String(hex || "").trim());
        if (!m) return { r: 100, g: 116, b: 139 };
        return { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) };
      }
      /** Katram prombūtnes veidam sava krāsa; statusam — kontūra (gaida / noraidīts). */
      function chipStyle(a) {
        const raw = a.type?.color ?? "#64748b";
        const tc = String(raw).startsWith("#") ? raw : "#64748b";
        const { r, g, b } = hexToRgb(tc);
        const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
        const fg = luminance > 0.55 ? "#0f172a" : "#f8fafc";
        if (a.status === "approved") return { background: tc, color: fg };
        if (a.status === "rejected")
          return {
            background: tc,
            color: fg,
            opacity: 0.9,
            boxShadow: "inset 0 0 0 2px rgba(153,27,27,0.95)",
            textDecoration: "line-through",
          };
        return {
          background: tc,
          color: fg,
          opacity: 0.9,
          boxShadow: "inset 0 0 0 2px rgba(217,119,6,0.95)",
        };
      }

      function AbsenceCalendar({ month, onMonthChange, absences, caption, onPickAbsence, onPickDay }) {
        const start = startOfWeek(startOfMonth(month), { weekStartsOn: 1 });
        const end = endOfWeek(endOfMonth(month), { weekStartsOn: 1 });
        const days = eachDayOfInterval({ start, end });
        const entriesForDay = (d) => {
          const key = dayKey(d);
          return absences.filter((a) => key >= a.start_date && key <= a.end_date);
        };
        const title = format(month, "LLLL yyyy", { locale: lv });
        return html`
          <div class="cal-wrap">
            <div class="cal-head">
              <button type="button" class="btn btn-small btn-ghost" onClick=${() => onMonthChange(addMonths(month, -1))}>
                ←
              </button>
              <strong style=${{ textTransform: "capitalize" }}>${title}</strong>
              <button type="button" class="btn btn-small btn-ghost" onClick=${() => onMonthChange(addMonths(month, 1))}>
                →
              </button>
            </div>
            ${caption
              ? html`<p style=${{ margin: "0 0 0.5rem", fontSize: "0.8rem", color: "var(--muted)", lineHeight: 1.35 }}>${caption}</p>`
              : null}
            <div class="cal-grid">
              ${dow.map(
                (l, i) => html`
                  <div key=${`dow-${i}`} class="cal-dow">${l}</div>
                `
              )}
              ${days.map((d) => {
                const inMonth = isSameMonth(d, month);
                const items = entriesForDay(d);
                return html`
                  <div
                    key=${d.toISOString()}
                    class=${`cal-cell ${!inMonth ? "cal-cell-out" : ""} ${isToday(d) ? "cal-cell-today" : ""}`}
                  >
                    <div class="row" style=${{ justifyContent: "space-between", alignItems: "center", marginBottom: "0.2rem" }}>
                      <div class="cal-day-num">${format(d, "d")}</div>
                      ${onPickDay && inMonth
                        ? html`
                            <button
                              type="button"
                              class="btn btn-ghost btn-small"
                              title="Pieteikt prombūtni šai dienai"
                              onClick=${(ev) => {
                                ev.stopPropagation();
                                onPickDay(d);
                              }}
                            >
                              Pieteikt
                            </button>
                          `
                        : null}
                    </div>
                    ${items.map((a) => html`
                      <span
                        key=${a.id}
                        role="button"
                        tabindex="0"
                        class="cal-chip"
                        style=${chipStyle(a)}
                        title=${[
                          userDisplayName(a.employee) !== "—" ? userDisplayName(a.employee) : "Darbinieks",
                          a.type?.name ?? "",
                          a.status,
                          a.comment
                            ? `Komentārs: ${String(a.comment).replace(/"/g, "'")}`
                            : "",
                          onPickAbsence ? "Spied, lai atvērtu vēsturē" : "",
                        ]
                          .filter(Boolean)
                          .join(" — ")}
                        onClick=${(ev) => {
                          ev.stopPropagation();
                          onPickAbsence?.(a);
                        }}
                        onKeyDown=${(ev) => {
                          if (ev.key === "Enter" || ev.key === " ") {
                            ev.preventDefault();
                            onPickAbsence?.(a);
                          }
                        }}
                      >
                        ${userDisplayName(a.employee) !== "—"
                          ? userDisplayName(a.employee)
                          : "?"}{" "}
                        · ${a.type?.name ?? ""}
                      </span>
                    `)}
                  </div>
                `;
              })}
            </div>
          </div>
        `;
      }

      function AbsenceRequestForm({ userId, role, onCreated, notifyEmail, presetDate, onConsumePreset, canApproveRequests }) {
        const [types, setTypes] = useState([]);
        const [typeId, setTypeId] = useState("");
        const [startDate, setStartDate] = useState("");
        const [endDate, setEndDate] = useState("");
        const [comment, setComment] = useState("");
        const [busy, setBusy] = useState(false);
        const [users, setUsers] = useState([]);
        const [selectedUserId, setSelectedUserId] = useState("");
        const [citsRows, setCitsRows] = useState([]);
        const [decisionReason, setDecisionReason] = useState({});
        const isManager = normalizeUserRole(role) === "admin";
        useEffect(() => {
          if (isLocalMode()) {
            setTypes(getLocalTypes());
            return;
          }
          supabase
            .from("prombutnes_veidi")
            .select("*")
            .order("id", { ascending: true })
            .then(({ data, error }) => {
              if (error) console.error(error);
              setTypes((data ?? []).map(normalizeAbsenceTypeRecord));
            });
        }, []);
        useEffect(() => {
          let cancelled = false;
          (async () => {
            const locName = localDisplayName();
            const list = await fetchAbsenceFormUsers(supabase, {
              localMode: isLocalMode(),
              localUser: {
                id: userId,
                full_name: locName,
                [COL_USER_NAME]: locName,
                [COL_USER_IMAIL]: "demo@local",
                [COL_USER_AMATS]: "",
              },
            });
            if (cancelled) return;
            setUsers(list);
            const uid = String(userId);
            const selfUser = list.find((u) => String(u.id) === uid) ?? null;
            const selfId = selfUser?.id ?? uid;
            const defaultId = selfId || (list[0]?.id ?? "");
            setSelectedUserId((prev) => {
              if (!isManager) return defaultId;
              if (prev && list.some((u) => String(u.id) === String(prev))) return prev;
              return defaultId;
            });
          })();
          return () => {
            cancelled = true;
          };
        }, [userId, isManager]);
        useEffect(() => {
          if (!isManager) setSelectedUserId(String(userId || ""));
        }, [isManager, userId]);
        useEffect(() => {
          if (!presetDate) return;
          setStartDate(presetDate);
          setEndDate(presetDate);
          onConsumePreset?.();
        }, [presetDate, onConsumePreset]);
        useEffect(() => {
          if (!isLocalMode()) return;
          setCitsRows(getLocalCitsRequests());
        }, []);

        const citsVisibleRows = useMemo(() => {
          const all = citsRows ?? [];
          return all
            .filter((r) => canApproveRequests || String(r.user_id) === String(userId))
            .sort((a, b) => String(b.created_at || "").localeCompare(String(a.created_at || "")));
        }, [citsRows, canApproveRequests, userId]);

        function refreshLocalCitsRows() {
          const rows = getLocalCitsRequests();
          setCitsRows(rows);
          return rows;
        }

        function getTokenLink(token) {
          const base = window.location.href.split("?")[0];
          return `${base}?cits=${token}`;
        }

        async function decideLocalCits(row, decision) {
          const reason = String(decisionReason[row.id] ?? "").trim();
          const rows = getLocalCitsRequests();
          const idx = rows.findIndex((x) => String(x.id) === String(row.id));
          if (idx < 0) return;
          const nextStatus = decision === "approve" ? "approved" : "cancelled";
          rows[idx] = {
            ...rows[idx],
            status: nextStatus,
            decision_reason: reason || null,
            decided_at: new Date().toISOString(),
            decided_by: userId,
          };
          setLocalCitsRequests(rows);
          setDecisionReason((m) => ({ ...m, [row.id]: "" }));

          const types2 = getLocalTypes();
          const citsType = types2.find((t) => isCitsSaskanotsTypeName(t.name));
          const abs = getLocalAbsences();
          const pIdx = abs.findIndex(
            (x) =>
              citsType &&
              Number(x.type_id) === Number(citsType.id) &&
              String(x.user_id) === String(row.user_id) &&
              String(x.start_date) === String(row.start_date) &&
              String(x.end_date) === String(row.end_date) &&
              String(x.comment ?? "") === String(row.comment ?? "") &&
              String(x.status) === "pending"
          );
          if (decision === "approve") {
            const nowIso = new Date().toISOString();
            if (pIdx >= 0) {
              abs[pIdx] = { ...abs[pIdx], status: "approved", approved_at: nowIso, approved_by: userId };
            }
          } else if (pIdx >= 0) {
            // Noraidīts: noņemam pending ierakstu no kalendāra.
            abs.splice(pIdx, 1);
          }
          setLocalAbsences(abs);
          refreshLocalCitsRows();
          onCreated?.();
          pushChangeLog(
            decision === "approve" ? "prombutne.cits_apstiprinats" : "prombutne.cits_noraidits",
            `${row.user_id}: ${row.start_date} — ${row.end_date}${reason ? ` (${reason})` : ""}`
          );
        }
        async function handleSubmit(e) {
          e.preventDefault();
          if (!typeId || !selectedUserId) return;
          const typeObj = types.find((t) => String(t.id) === String(typeId));
          const isCitsFlow = typeObj && isCitsSaskanotsTypeName(typeObj.name);
          setBusy(true);
          try {
            if (isCitsFlow) {
              const to = notifyEmail;
              if (!to || !String(to).includes("@")) {
                alert("Nav derīga e-pasta adrese saskaņotājam (vadītājs vai apstiprinātājs).");
                return;
              }
              const nowIso = new Date().toISOString();
              // Saglabājam "Cits" tieši prombutnes_dati ar statusu "pending".
              const { data: inserted, error: insErr } = await supabase
                .from("prombutnes_dati")
                .insert({
                  "Vārds uzvārds": selectedUserId,
                  type: Number(typeId),
                  Sakuma_datums: startDate,
                  Beigu_datums: endDate,
                  Komentārs: comment.trim() || null,
                  Statuss: "pending",
                  approved_by: null,
                  created_at: nowIso,
                })
                .select("id")
                .single();
              if (insErr) {
                alert("Kļūda, saglabājot pieteikumu: " + insErr.message);
                return;
              }
              const rowId = inserted?.id;
              pushChangeLog(
                "prombutne.cits_pieteikts",
                `Darbinieks ${selectedUserId}: ${startDate} — ${endDate}`
              );
              const base = window.location.href.split("?")[0];
              const link = `${base}?citsRow=${encodeURIComponent(rowId)}`;
              try {
                await navigator.clipboard.writeText(link);
                alert(
                  "Pieteikums saglabāts.\n\nSaite uz saskaņošanu ir nokopēta starpliktuvē – ielīmē to e-pastā vadītājam:\n\n" +
                    link
                );
              } catch {
                alert(
                  "Pieteikums saglabāts.\n\nNokopē automātiski neizdevās. Izmanto šo saiti saskaņošanai (ielīmē e-pastā vadītājam):\n\n" +
                    link
                );
              }
              setStartDate("");
              setEndDate("");
              setComment("");
              setTypeId("");
              setSelectedUserId((prev) => prev || userId);
              onCreated();
              return;
            }
            if (isLocalMode()) {
              const nowIso = new Date().toISOString();
              const rows = getLocalAbsences();
              rows.push({
                id: crypto.randomUUID(),
                user_id: selectedUserId,
                type_id: Number(typeId),
                start_date: startDate,
                end_date: endDate,
                comment: comment.trim() || null,
                status: "approved",
                approved_by: userId,
                approved_at: nowIso,
                created_at: nowIso,
              });
              setLocalAbsences(rows);
              pushChangeLog(
                "prombutne.pievienota",
                `Darbinieks ${selectedUserId}: ${startDate} — ${endDate}`
              );
            } else {
              const nowIso = new Date().toISOString();
              const selectedUser = (users ?? []).find((u) => String(u?.id) === String(selectedUserId)) ?? null;
              const error = await insertAbsenceWithFallback({
                userId: selectedUserId,
                userName: selectedUser ? userDisplayName(selectedUser) : "",
                typeId: Number(typeId),
                startDate,
                endDate,
                comment: comment.trim() || null,
                status: "approved",
                approvedBy: null,
                approvedAt: nowIso,
              });
              if (error) {
                alert("Kļūda: " + error.message);
                return;
              }
            }
            setStartDate("");
            setEndDate("");
            setComment("");
            setTypeId("");
            setSelectedUserId((prev) => prev || userId);
            onCreated();
          } finally {
            setBusy(false);
          }
        }
        return html`
          <div class="list-panel">
            <h2>Prombūtnes pieteikums</h2>
            <p style=${{ margin: "0 0 0.75rem", fontSize: "0.82rem", color: "var(--muted)" }}>
              <strong>Cits (ar vadītāja saskaņojumu)</strong> — obligāta e-pasta saskaņošana: pieprasījums un saite uz
              <strong>${notifyEmail}</strong>. Pārējie veidi tiek ierakstīti kā apstiprināti un uzreiz redzami
              kalendārā (bez atsevišķa akcepta soļa šeit).
            </p>
            <form class="stack" onSubmit=${handleSubmit}>
              <div class="field">
                <label for="employee">Darbinieks</label>
                <select
                  id="employee"
                  class="select"
                  required
                  value=${selectedUserId}
                  onChange=${(ev) => setSelectedUserId(ev.target.value)}
                  disabled=${!isManager}
                >
                  ${(isManager
                    ? users
                    : (() => {
                        const selfOnly = users.filter((u) => String(u.id) === String(userId));
                        return selfOnly.length ? selfOnly : users;
                      })()).map(
                    (u) => html`
                      <option key=${u.id} value=${u.id}>${userDisplayName(u)}</option>
                    `
                  )}
                </select>
                <span style=${{ fontSize: "0.78rem", color: "var(--muted)" }}>
                  ${isManager
                    ? "Pēc noklusējuma izvēlēts tavs vārds; admin var izvēlēties citu."
                    : "Pēc noklusējuma izvēlēts tavs vārds."}
                </span>
              </div>
              <div class="field">
                <label for="ptype">Veids</label>
                <select
                  id="ptype"
                  class="select"
                  required
                  value=${typeId}
                  onChange=${(ev) => setTypeId(ev.target.value)}
                >
                  <option value="">Izvēlies veidu</option>
                  ${types.map(
                    (t) => html`
                      <option key=${t.id} value=${t.id}>${t.name}</option>
                    `
                  )}
                </select>
              </div>
              <div class="row" style=${{ gap: "0.75rem" }}>
                <div class="field" style=${{ flex: "1 1 140px" }}>
                  <label for="pstart">No</label>
                  <input
                    id="pstart"
                    type="date"
                    class="input"
                    required
                    value=${startDate}
                    onChange=${(ev) => setStartDate(ev.target.value)}
                  />
                </div>
                <div class="field" style=${{ flex: "1 1 140px" }}>
                  <label for="pend">Līdz</label>
                  <input
                    id="pend"
                    type="date"
                    class="input"
                    required
                    value=${endDate}
                    onChange=${(ev) => setEndDate(ev.target.value)}
                  />
                </div>
              </div>
              <div class="field">
                <label for="pcom">Komentārs</label>
                <textarea
                  id="pcom"
                  class="textarea"
                  placeholder="Nav obligāts"
                  value=${comment}
                  onChange=${(ev) => setComment(ev.target.value)}
                />
              </div>
              <button type="submit" class="btn btn-primary" disabled=${busy}>
                ${busy ? "Sūta…" : "Iesniegt"}
              </button>
            </form>
            ${isLocalMode()
              ? html`
                  <div class="list-panel" style=${{ marginTop: "0.9rem", background: "var(--bg)" }}>
                    <h3 style=${{ margin: "0 0 0.5rem", fontSize: "0.95rem" }}>Saskaņošanas pieprasījumi</h3>
                    <div class="table-wrap">
                      <table class="hist-table">
                        <thead>
                          <tr>
                            <th>Darbinieks</th>
                            <th>Periods</th>
                            <th>Statuss</th>
                            <th>Iemesls</th>
                            ${canApproveRequests ? html`<th>Darbība</th>` : null}
                          </tr>
                        </thead>
                        <tbody>
                          ${citsVisibleRows.length
                            ? citsVisibleRows.map((r) => {
                                const emp = users.find((u) => String(u.id) === String(r.user_id));
                                const status = localCitsStatusLabel(r.status);
                                const pending = r.status === "pending_manager";
                                return html`
                                  <tr key=${r.id}>
                                    <td>${emp ? userDisplayName(emp) : r.user_id}</td>
                                    <td>${formatDateLv(r.start_date)} — ${formatDateLv(r.end_date)}</td>
                                    <td>
                                      <span class=${`badge ${pending ? "badge-pending" : r.status === "approved" ? "badge-approved" : "badge-rejected"}`}>
                                        ${status}
                                      </span>
                                    </td>
                                    <td>${r.decision_reason ?? "—"}</td>
                                    ${canApproveRequests
                                      ? html`
                                          <td>
                                            ${pending
                                              ? html`
                                                  <div class="stack">
                                                    <input
                                                      class="input"
                                                      placeholder="Iemesls (pēc izvēles)"
                                                      value=${decisionReason[r.id] ?? ""}
                                                      onChange=${(e) =>
                                                        setDecisionReason((m) => ({ ...m, [r.id]: e.target.value }))
                                                      }
                                                    />
                                                    <div class="row" style=${{ gap: "0.35rem" }}>
                                                      <button type="button" class="btn btn-danger btn-small" onClick=${() => decideLocalCits(r, "approve")}>
                                                        Apstiprināt
                                                      </button>
                                                      <button type="button" class="btn btn-ghost btn-small" onClick=${() => decideLocalCits(r, "reject")}>
                                                        Noraidīt
                                                      </button>
                                                    </div>
                                                  </div>
                                                `
                                              : html`<span style=${{ color: "var(--muted)", fontSize: "0.82rem" }}>Apstrādāts</span>`}
                                          </td>
                                        `
                                      : null}
                                  </tr>
                                `;
                              })
                            : html`
                                <tr>
                                  <td colspan=${canApproveRequests ? 5 : 4} style=${{ color: "var(--muted)", fontStyle: "italic" }}>
                                    Nav pieprasījumu.
                                  </td>
                                </tr>
                              `}
                        </tbody>
                      </table>
                    </div>
                  </div>
                `
              : null}
          </div>
        `;
      }

      /** Izvēlnēm: kā DB — Vārds uzvārds, i-mail, loma. */
      function formatUserSelectLabel(u) {
        const name = userDisplayName(u);
        const role = u?.role && u.role !== "user" ? ` · ${u.role}` : "";
        return `${name}${role}`;
      }

      // Komanda: parādām tikai Vārds uzvārds, e-pasts un Amats.
      // Atbilstoši migrācijām `i-mail` tiek sinhronizēts no auth email (`users.email`),
      // bet UI mēs to rādām kā "e-pasts".
      const USER_TABLE_COL_DEFS = [
        { key: "role", label: "LOMA" },
        { key: COL_USER_NAME, label: "Vārds uzvārds" },
        { key: COL_USER_IMAIL, label: "e-pasts" },
        { key: COL_USER_AMATS, label: "Amats" },
      ];

      function teamUsersTableColumns(_users) {
        const labels = Object.fromEntries(USER_TABLE_COL_DEFS.map((c) => [c.key, c.label]));
        const cols = USER_TABLE_COL_DEFS.map((c) => c.key);
        return { cols, labels };
      }

      function formatUserTableCell(key, val) {
        if (val == null || val === "") return "—";
        if (key === "role") {
          const s = String(val);
          return s.length > 0 ? s[0].toUpperCase() + s.slice(1) : s;
        }
        if ((key === "email" || key === COL_USER_IMAIL) && String(val).includes("@")) return String(val);
        if (typeof val === "string" && /^\d{4}-\d{2}-\d{2}T/.test(val)) {
          return val.replace("T", " ").slice(0, 19);
        }
        return String(val);
      }

      function buildUserRowPayload(vardUzv, imail, amats, role) {
        const v = String(vardUzv ?? "").trim();
        const i = String(imail ?? "").trim();
        const a = String(amats ?? "").trim();
        return {
          [COL_USER_NAME]: v || null,
          [COL_USER_IMAIL]: i || null,
          ["e-mail"]: i || null,
          [COL_USER_AMATS]: a || null,
          // DB pusē: izmantojam tikai kolonu "role" (teksts).
          role: normalizeUserRole(role),
          full_name: v || null,
          email: i || null,
        };
      }

      function isValidUuid(s) {
        return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(
          String(s || "").trim()
        );
      }

      function TeamUsersDirectory({ users, canAdmin, currentUserId, onReload }) {
        const { cols, labels } = teamUsersTableColumns(users);
        const colCount = Math.max(cols.length, 1) + (canAdmin ? 1 : 0);
        const [page, setPage] = useState(0);
        const [editing, setEditing] = useState(null);
        const [form, setForm] = useState({
          vardUzv: "",
          imail: "",
          amats: "",
          role: "user",
        });
        const [addOpen, setAddOpen] = useState(false);
        const [addForm, setAddForm] = useState({
          id: "",
          vardUzv: "",
          imail: "",
          amats: "",
          role: "user",
        });
        const [busy, setBusy] = useState(false);
        const [delId, setDelId] = useState(null);
        const isLocalTeams = false;
        const total = users?.length ?? 0;
        const totalPages = Math.max(1, Math.ceil(total / TEAM_PAGE_SIZE) || 1);
        const safePage = Math.min(page, totalPages - 1);
        const pagedUsers = (users ?? []).slice(
          safePage * TEAM_PAGE_SIZE,
          safePage * TEAM_PAGE_SIZE + TEAM_PAGE_SIZE
        );
        const rowFrom = total ? safePage * TEAM_PAGE_SIZE + 1 : 0;
        const rowTo = total ? Math.min(total, (safePage + 1) * TEAM_PAGE_SIZE) : 0;
        useEffect(() => {
          const tp = Math.max(1, Math.ceil((users?.length ?? 0) / TEAM_PAGE_SIZE) || 1);
          setPage((p) => Math.min(p, tp - 1));
        }, [users?.length]);

        function openEdit(u) {
          setEditing(u.id);
          setForm({
            vardUzv: u[COL_USER_NAME] ?? u.full_name ?? "",
            imail: userImail(u),
            amats: u[COL_USER_AMATS] ?? "",
            role: userRoleValue(u),
          });
        }
        async function saveEdit(e) {
          e.preventDefault();
          if (!editing) return;
          setBusy(true);
          try {
            const payload = buildUserRowPayload(form.vardUzv, form.imail, form.amats, form.role);
            if (TIKAI_VIENKARSI_SKATS || !supabase) {
              window.KOMANDA?.upsertTeamUser?.({ id: editing, ...payload });
              pushChangeLog("komanda.labot", `Lietotājs ${editing} atjaunināts`);
              setEditing(null);
              await onReload();
              return;
            }
            const { error } = await supabase.from("users").update(payload).eq("id", editing);
            if (error) {
              alert(error.message);
              return;
            }
            setEditing(null);
            await onReload();
          } finally {
            setBusy(false);
          }
        }
        async function saveAdd(e) {
          e.preventDefault();
          const isLocal = TIKAI_VIENKARSI_SKATS || !supabase;
          const id = isLocal ? (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now())) : addForm.id.trim();
          if (!isLocal && !isValidUuid(id)) {
            alert("Lietotāja ID jābūt derīgam UUID (Supabase → Authentication → Users).");
            return;
          }
          setBusy(true);
          try {
            const payload = buildUserRowPayload(addForm.vardUzv, addForm.imail, addForm.amats, addForm.role);
            if (isLocal) {
              window.KOMANDA?.upsertTeamUser?.({ id, ...payload });
              pushChangeLog("komanda.pievienot", `Lietotājs ${id} pievienots`);
              setAddOpen(false);
              setAddForm({ id: "", vardUzv: "", imail: "", amats: "", role: "user" });
              await onReload();
              return;
            }
            const { error } = await supabase.from("users").insert({ id, ...payload });
            if (error) {
              alert(error.message);
              return;
            }
            setAddOpen(false);
            setAddForm({ id: "", vardUzv: "", imail: "", amats: "", role: "user" });
            await onReload();
          } finally {
            setBusy(false);
          }
        }
        async function confirmDelete() {
          if (!delId) return;
          setBusy(true);
          try {
            if (TIKAI_VIENKARSI_SKATS || !supabase) {
              window.KOMANDA?.deleteTeamUser?.(delId);
              pushChangeLog("komanda.dzest", `Lietotājs ${delId} dzēsts`);
              setDelId(null);
              await onReload();
              return;
            }
            const { error } = await supabase.from("users").delete().eq("id", delId);
            if (error) {
              alert(error.message);
              return;
            }
            setDelId(null);
            await onReload();
          } finally {
            setBusy(false);
          }
        }
        return html`
          <div class="list-panel team-users-panel">
            <h2 style=${{ margin: "0 0 0.25rem", fontSize: "1rem" }}>Komanda</h2>
            <p style=${{ margin: "0 0 0.5rem", fontSize: "0.8rem", color: "var(--muted)" }}>
              Šī ir pamata lietotāju tabula. Šeit nosaki lomas (piemēram, <code>admin</code> vai
              <code>user</code>) un piekļuves tiesības.
            </p>
            ${canAdmin
              ? html`
                  <div class="row" style=${{ marginBottom: "0.65rem" }}>
                    <button type="button" class="btn btn-primary btn-small" onClick=${() => setAddOpen(!addOpen)}>
                      ${addOpen ? "Aizvērt formu" : "+ Pievienot lietotāju"}
                    </button>
                  </div>
                  ${addOpen
                    ? html`
                        <form class="stack" style=${{ marginBottom: "1rem", padding: "0.75rem", border: "1px solid var(--border)", borderRadius: "8px" }} onSubmit=${saveAdd}>
                          ${TIKAI_VIENKARSI_SKATS
                            ? null
                            : html`
                                <div class="field">
                                  <label>Lietotāja UUID (no Supabase Authentication)</label>
                                  <input
                                    class="input"
                                    required
                                    placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
                                    value=${addForm.id}
                                    onChange=${(ev) => setAddForm((f) => ({ ...f, id: ev.target.value }))}
                                  />
                                </div>
                              `}
                          <div class="field">
                            <label>Vārds uzvārds</label>
                            <input
                              class="input"
                              value=${addForm.vardUzv}
                              onChange=${(ev) => setAddForm((f) => ({ ...f, vardUzv: ev.target.value }))}
                            />
                          </div>
                          <div class="field">
                            <label>e-pasts</label>
                            <input
                              class="input"
                              type="email"
                              value=${addForm.imail}
                              onChange=${(ev) => setAddForm((f) => ({ ...f, imail: ev.target.value }))}
                            />
                          </div>
                          <div class="field">
                            <label>Amats</label>

      function DeputyDelegePanel({
        teamUsers,
        approverCols,
        deputyUserId,
        deputyValidFrom,
        deputyValidTo,
        onDeputyChange,
        currentUserId,
      }) {
        const [sel, setSel] = useState(() => (deputyUserId ? String(deputyUserId) : DEPUTY_OPT_MANAGER));
        const [periodFrom, setPeriodFrom] = useState(deputyValidFrom ?? "");
        const [periodTo, setPeriodTo] = useState(deputyValidTo ?? "");
        const [busy, setBusy] = useState(false);
        const [msg, setMsg] = useState(null);
        useEffect(() => {
          setSel(deputyUserId ? String(deputyUserId) : DEPUTY_OPT_MANAGER);
          setPeriodFrom(deputyValidFrom ?? "");
          setPeriodTo(deputyValidTo ?? "");
        }, [deputyUserId, deputyValidFrom, deputyValidTo]);
        async function persist(nextId, fromStr, toStr) {
          setBusy(true);
          setMsg(null);
          try {
            if (isLocalMode()) {
              if (nextId) localStorage.setItem(LS_LOCAL_DEPUTY_USER_ID, nextId);
              else localStorage.removeItem(LS_LOCAL_DEPUTY_USER_ID);
              if (fromStr) localStorage.setItem(LS_LOCAL_DEPUTY_FROM, fromStr);
              else localStorage.removeItem(LS_LOCAL_DEPUTY_FROM);
              if (toStr) localStorage.setItem(LS_LOCAL_DEPUTY_TO, toStr);
              else localStorage.removeItem(LS_LOCAL_DEPUTY_TO);
              await onDeputyChange();
              setMsg(
                nextId
                  ? "Apstiprinātājs un periods saglabāti (vietējais režīms)."
                  : "Atiestatīts uz pamatvadītāju (vietējais režīms)."
              );
              return;
            }
            const managerUser = resolveManagerUser(teamUsers ?? []);
            if (!managerUser) {
              setMsg("Neizdevās atrast pamatvadītāju users tabulā.");
              return;
            }
            if (window.SASKANOSANA?.saveState) {
              const res = await window.SASKANOSANA.saveState(
                supabase,
                DEFAULT_MANAGER_NAME,
                nextId || null,
                fromStr || null,
                toStr || null
              );
              if (res?.error) {
                setMsg(res.error.message || "Neizdevās saglabāt saskaņošanu.");
                return;
              }
              await onDeputyChange();
              setMsg(nextId ? "Apstiprinātājs saglabāts norādītajam periodam." : "Atiestatīts uz pamatvadītāju.");
              return;
            }
            const colsDefault = approverCols ?? {
              status: COL_USER_APPROVER_STATUS,
              from: COL_USER_APPROVER_FROM,
              to: COL_USER_APPROVER_TO,
            };
            // Kolonnas nosakām no RAW DB rindas, nevis no normalizētā objekta.
            const probe = await supabase.from("users").select("*").limit(1);
            const cols = probe.error
              ? colsDefault
              : detectUserApproverColumns(Array.isArray(probe.data) ? probe.data : []);

            async function runUsersUpdateWithColumnPruning(buildQuery, payload) {
              const draft = { ...payload };
              let lastError = null;
              for (let i = 0; i < 6; i++) {
                const { error } = await buildQuery(draft);
                if (!error) return null;
                lastError = error;
                const msg = String(error?.message || "");
                const m =
                  /Could not find the '([^']+)' column/i.exec(msg) ||
                  /'([^']+)' column/i.exec(msg);
                const missing = m?.[1];
                if (missing && Object.prototype.hasOwnProperty.call(draft, missing)) {
                  delete draft[missing];
                  continue;
                }
                break;
              }
              return lastError;
            }

            const clearErr = await runUsersUpdateWithColumnPruning(
              (p) =>
                supabase
                  .from("users")
                  .update(p)
                  .not("id", "is", null),
              {
                [cols.status]: null,
                [cols.from]: null,
                [cols.to]: null,
              }
            );
            if (clearErr) {
              setMsg(clearErr.message);
              return;
            }

            const markMgrErr = await runUsersUpdateWithColumnPruning(
              (p) =>
                supabase
                  .from("users")
                  .update(p)
                  .eq("id", managerUser.id),
              {
                [cols.status]: "pec noklusējuma vienmēr",
                [cols.from]: null,
                [cols.to]: null,
              }
            );
            if (markMgrErr) {
              setMsg(markMgrErr.message);
              return;
            }
            const targetApproverId = nextId || managerUser?.id || null;
            if (targetApproverId && nextId) {
              const deputyErr = await runUsersUpdateWithColumnPruning(
                (p) =>
                  supabase
                    .from("users")
                    .update(p)
                    .eq("id", targetApproverId),
                {
                  [cols.status]: "uz noteikto periodu",
                  [cols.from]: fromStr,
                  [cols.to]: toStr,
                }
              );
              if (deputyErr) {
                setMsg(deputyErr.message);
                return;
              }
            }
            await onDeputyChange();
              setMsg(nextId ? "Apstiprinātājs saglabāts norādītajam periodam." : "Atiestatīts uz pamatvadītāju.");
          } finally {
            setBusy(false);
          }
        }
        async function saveForm(e) {
          e.preventDefault();
          const isMgrOpt = sel === DEPUTY_OPT_MANAGER;
          const nextId = isMgrOpt ? null : sel;
          const fromStr = isMgrOpt ? "" : periodFrom.trim();
          const toStr = isMgrOpt ? "" : periodTo.trim();
          if (!isMgrOpt) {
            if (!fromStr || !toStr) {
              alert("Apstiprinātāja termiņš ir obligāts: norādi datumus „no” un „līdz”.");
              return;
            }
            if (fromStr > toStr) {
              alert("Datums „no” nevar būt pēc „līdz”.");
              return;
            }
          }
          await persist(nextId, fromStr, toStr);
        }
        async function resetToManager() {
          if (
            !window.confirm(
              "Vai apstiprini atiestatīšanu uz pamatvadītāju " +
                DEFAULT_MANAGER_NAME +
                "? Apstiprinātāja periods un izvēlētā persona tiks notīrīti."
            )
          ) {
            return;
          }
          setSel(DEPUTY_OPT_MANAGER);
          setPeriodFrom("");
          setPeriodTo("");
          await persist(null, "", "");
        }
        const showPeriod = sel !== DEPUTY_OPT_MANAGER;
        return html`
          <div class="list-panel" style=${{ marginTop: "0.85rem" }}>
            <h3 style=${{ margin: "0 0 0.5rem", fontSize: "0.95rem" }}>Prombūtnes apstiprinātājs</h3>
            <p style=${{ margin: "0 0 0.65rem", fontSize: "0.8rem", color: "var(--muted)" }}>
              Noklusējuma apstiprinātājs — <strong>${DEFAULT_MANAGER_NAME}</strong> (termiņa lauki nerādās). Citu personu
              izvēlei obligāts derīguma periods. Pēc <code>līdz</code> datuma beigām sistēma automātiski atiestata uz
              pamatvadītāju.
            </p>
            <form class="stack" onSubmit=${saveForm}>
              <div class="field">
                <label for="deputy-sel">Persona</label>
                <select
                  id="deputy-sel"
                  class="select"
                  value=${sel}
                  onChange=${(ev) => setSel(ev.target.value)}
                >
                  <option value=${DEPUTY_OPT_MANAGER}>Vadītājs — ${DEFAULT_MANAGER_NAME}</option>
                  ${teamUsers
                    .filter((u) => userDisplayName(u).toLowerCase().trim() !== DEFAULT_MANAGER_NAME.toLowerCase().trim())
                    .map(
                      (u) => html`
                        <option key=${u.id} value=${u.id}>${formatUserSelectLabel(u)}</option>
                      `
                    )}
                </select>
              </div>
              ${showPeriod
                ? html`
                    <div class="row" style=${{ gap: "0.75rem" }}>
                      <div class="field" style=${{ flex: "1 1 140px" }}>
                        <label for="dep-from">Periods no (obligāti)</label>
                        <input
                          id="dep-from"
                          type="date"
                          class="input"
                          required
                          value=${periodFrom}
                          onChange=${(ev) => setPeriodFrom(ev.target.value)}
                        />
                      </div>
                      <div class="field" style=${{ flex: "1 1 140px" }}>
                        <label for="dep-to">līdz (obligāti)</label>
                        <input
                          id="dep-to"
                          type="date"
                          class="input"
                          required
