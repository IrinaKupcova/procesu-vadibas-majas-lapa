          if (isLocalMode()) {
            setTypesList(getLocalTypes());
            return;
          }
          supabase
            .from("prombutnes_veidi")
            .select("*")
            .order("sort_order", { ascending: true })
            .then(({ data, error }) => {
              if (error) console.error(error);
              setTypesList(data ?? []);
            });
        }, []);
        const loadTeamAndDeputy = useCallback(async () => {
          if (isLocalMode()) {
            const users = (window.KOMANDA?.loadTeamUsers?.() ?? []).map((u) => ({
              ...u,
              id: String(u.id),
              // Nodrošina atslēgas UI šablonam
              [COL_USER_NAME]: u[COL_USER_NAME] ?? u.full_name ?? localDisplayName(),
              [COL_USER_AMATS]: u[COL_USER_AMATS] ?? u.Amats ?? "",
              // i-mail kolonnai (renderēšanā izmanto userImail(), bet drošībai ieliekam)
              email: u.email ?? u["e-pasts"] ?? u["i-mail"] ?? "",
            }));
            setTeamUsers(users);
            setDeputyUserId(null);
            setDeputyValidFrom(null);
            setDeputyValidTo(null);
            return;
          }
          const { error: rpcErr } = await supabase.rpc("pdd_cleanup_expired_deputy");
          if (rpcErr) console.warn("[pdd_cleanup_expired_deputy]", rpcErr);
          const { data: urows, error: uErr } = await supabase
            .from("users")
            .select("*")
            .order(COL_USER_NAME, { ascending: true });
          if (uErr) console.error(uErr);
          setTeamUsers(urows ?? []);
          const { data: drow, error: dErr } = await supabase
            .from("pdd_deputy_state")
            .select("deputy_user_id, deputy_valid_from, deputy_valid_to")
            .eq("id", 1)
            .maybeSingle();
          if (dErr) console.error(dErr);
          setDeputyUserId(drow?.deputy_user_id ?? null);
          setDeputyValidFrom(drow?.deputy_valid_from ?? null);
          setDeputyValidTo(drow?.deputy_valid_to ?? null);
        }, []);
        useEffect(() => {
          void loadTeamAndDeputy();
        }, [loadTeamAndDeputy]);
        const deputyEffectiveId = useMemo(
          () => effectiveDeputyUserId(deputyUserId, deputyValidFrom, deputyValidTo),
          [deputyUserId, deputyValidFrom, deputyValidTo]
        );
        const notifyEmail = useMemo(
          () => resolveNotifyEmail(teamUsers, deputyEffectiveId),
          [teamUsers, deputyEffectiveId]
        );
        const deputyDisplayName = useMemo(() => {
          if (!deputyEffectiveId || !teamUsers.length) return null;
          const u = teamUsers.find((x) => String(x.id) === String(deputyEffectiveId));
          const n = userDisplayName(u);
          return n !== "—" ? n : null;
        }, [deputyEffectiveId, teamUsers]);
        const refresh = useCallback(async () => {
          setError(null);
          if (isLocalMode()) {
            const types = getLocalTypes();
            const tmap = new Map(types.map((t) => [t.id, t]));
            const ln2 = localDisplayName();
            const userStub = (uid) => ({
              id: uid,
              full_name: ln2,
              [COL_USER_NAME]: ln2,
              [COL_USER_IMAIL]: "demo@local",
              [COL_USER_AMATS]: "",
            });
            const list = getLocalAbsences()
              .map((r) => ({
                ...r,
                type: tmap.get(r.type_id) ?? null,
                employee: userStub(r.user_id),
                approver_user: r.approved_by ? userStub(r.approved_by) : null,
              }))
              .sort((a, b) => a.start_date.localeCompare(b.start_date));
            setAbsences(list);
            return;
          }
          const { data: rows, error: qErr } = await supabase
            .from("prombutnes_dati")
            .select("*, type:prombutnes_veidi(*)")
            .order("start_date", { ascending: true });
          if (qErr) {
            setError(qErr.message);
            return;
          }
          const { data: profs, error: pErr } = await supabase.from("users").select("*");
          if (pErr) setError(pErr.message);
          const pmap = new Map((profs ?? []).map((p) => [p.id, p]));
          const list = (rows ?? []).map((r) => ({
            ...r,
            type: r.type,
            employee: pmap.get(r.user_id) ?? null,
            approver_user: r.approved_by ? pmap.get(r.approved_by) ?? null : null,
          }));
          setAbsences(list);
        }, []);
        useEffect(() => {
          void refresh();
        }, [refresh]);
        const reloadUsersAndViews = useCallback(async () => {
          await loadTeamAndDeputy();
          await refresh();
        }, [loadTeamAndDeputy, refresh]);
        useEffect(() => {
          if (isLocalMode() || !supabase) return undefined;
          const bump = () => {
            void loadTeamAndDeputy();
            void refresh();
          };
          const ch = supabase
            .channel("pdd-prombutnes-live")
            .on("postgres_changes", { event: "*", schema: "public", table: "prombutnes_dati" }, bump)
            .on("postgres_changes", { event: "*", schema: "public", table: "users" }, bump)
            .on("postgres_changes", { event: "*", schema: "public", table: "pdd_deputy_state" }, bump)
            .on("postgres_changes", { event: "*", schema: "public", table: "pdd_cits_requests" }, bump)
            .subscribe();
          return () => {
            void supabase.removeChannel(ch);
          };
        }, [loadTeamAndDeputy, refresh]);
        const isManager = role === "manager" || role === "admin";
        const canApprove = userCanApproveAbsences(role, userId, deputyEffectiveId);
        useEffect(() => {
          if (promSub === "deputy" && !isManager) setPromSub("calendar");
        }, [promSub, isManager, setPromSub]);
        const promSubLabel =
          promSub === "calendar"
            ? "Kalendārs un Prombūtnes vēsture"
            : promSub === "request"
              ? "Prombūtnes pieteikums"
              : promSub === "teamUsers"
                ? "Komandas lietotāji"
                : "Apstiprinātāja maiņa";
        return html`
          <section class="stack" style=${{ gap: "1.25rem" }}>
            <div>
              <h2 style=${{ margin: 0, fontSize: "1.15rem" }}>Prombūtnes</h2>
              <p class="app-sub" style=${{ margin: "0.25rem 0 0" }}>${promSubLabel}</p>
            </div>
            ${deputyEffectiveId
              ? html`
                  <div class="banner-deputy" role="status">
                    <strong>Uzmanību:</strong> šobrīd aktīvs Prombūtnes apstiprinātājs ir
                    <strong> ${deputyDisplayName ?? "izvēlēta persona"}</strong>.
                    ${deputyValidFrom || deputyValidTo
                      ? html`<span>
                          Periods: <strong>${deputyValidFrom ?? "—"}</strong> — <strong>${deputyValidTo ?? "—"}</strong>.
                        </span>`
                      : null}
                    „Cits (ar saskaņojumu)” saskaņošanas e-pasts: <strong>${notifyEmail}</strong>.
                  </div>
                `
              : null}
            ${error
              ? html`
                  <div class="banner-warn" role="alert">Kļūda: ${error}</div>
                `
              : null}
            ${promSub === "calendar"
              ? html`
                  <div class="stack" style=${{ gap: "1rem" }}>
                    <${AbsenceCalendar}
                      month=${month}
                      onMonthChange=${setMonth}
                      absences=${absences}
                      caption="Komandas kalendārs. Parastie veidi reģistrējas uzreiz kā apstiprināti; „Cits (ar saskaņojumu)” — pēc e-pasta apstiprinājuma. Spied uz krāsainās iezīmes, lai atvērtu rindu tabulā zemāk."
                      onPickAbsence=${(a) => {
                        setPromSub("calendar");
                        setHistoryOpen(true);
                        setHighlightAbsenceId(a.id);
                      }}
                    />
                    <${PrombutnesHistoryPanel}
                      userId=${userId}
                      absences=${absences}
                      types=${typesList}
                      onRefresh=${refresh}
                      approverView=${canApprove}
                      historyOpen=${historyOpen}
                      onToggleHistory=${() => setHistoryOpen((o) => !o)}
                      highlightAbsenceId=${highlightAbsenceId}
                      onClearHighlight=${() => setHighlightAbsenceId(null)}
                    />
                  </div>
                `
              : null}
            ${promSub === "request"
              ? html`
                  <${AbsenceRequestForm}
                    userId=${userId}
                    role=${role}
                    onCreated=${() => void refresh()}
                    notifyEmail=${notifyEmail}
                  />
                `
              : null}
            ${promSub === "deputy" && isManager
              ? html`
                  <${DeputyDelegePanel}
                    teamUsers=${teamUsers}
                    deputyUserId=${deputyUserId}
                    deputyValidFrom=${deputyValidFrom}
                    deputyValidTo=${deputyValidTo}
                    onDeputyChange=${reloadUsersAndViews}
                    currentUserId=${userId}
                  />
                `
              : null}
            ${promSub === "teamUsers"
              ? html`
                  <${TeamUsersDirectory}
                    users=${teamUsers}
                    canAdmin=${TIKAI_VIENKARSI_SKATS || (isManager && !isLocalMode())}
                    currentUserId=${userId}
                    onReload=${reloadUsersAndViews}
                  />
                `
              : null}
          </section>
        `;
      }

      function App() {
        const { session, loading } = useSession();
        const { profile, loading: profileLoading } = useProfile(session?.user?.id);
        const [view, setView] = useState("home");
        const [promSub, setPromSub] = useState("calendar");
        const showPromDeputyTab = profile?.role === "manager" || profile?.role === "admin";
        const [citsToken, setCitsToken] = useState(() => readCitsTokenFromUrl());
        const title = useMemo(
          () => html`
            <div>
              <h1 class="app-title">PDD aplikācija</h1>
              <p class="app-sub">Pakalpojumu dizaina daļa — darba organizācija</p>
            </div>
          `,
          []
        );

        if (citsToken) {
          if (TIKAI_VIENKARSI_SKATS) {
            return html`
              <div class="app-shell">
                ${title}
                <${CitsPublicApprove}
                  token=${citsToken}
                  sessionUserId=${session?.user?.id ?? null}
                  profileRole=${profile?.role ?? "employee"}
                  onDone=${() => {
                    setCitsToken("");
                    stripCitsFromUrl();
                  }}
                />
              </div>
            `;
          }
          if (isLocalMode() && !localSessionActive()) {
            return html`
              <div class="app-shell">
                ${title}
                <${LocalPasswordScreen} />
              </div>
            `;
          }
          if (configured() && !isLocalMode()) {
            if (loading) {
              return html`
                <div class="app-shell">
                  ${title}
                  <p style=${{ color: "var(--muted)" }}>Ielādē…</p>
                </div>
              `;
            }
            if (!session?.user) {
              return html`
                <div class="app-shell">
                  ${title}
                  <div class="banner-warn" role="alert" style=${{ marginBottom: "1rem", fontSize: "0.9rem" }}>
                    Lai apstiprinātu „Cits (ar saskaņojumu)”, ielogojies. Apstiprināt drīkst tikai vadītājs,
                    administrators vai Prombūtnes apstiprinātājs.
                  </div>
                  <${AuthScreen} />
                </div>
              `;
            }
            if (profileLoading) {
              return html`
                <div class="app-shell">
                  ${title}
                  <p style=${{ color: "var(--muted)" }}>Ielādē profilu…</p>
                </div>
              `;
            }
          }
          return html`
            <div class="app-shell">
              ${title}
              <${CitsPublicApprove}
                token=${citsToken}
                sessionUserId=${session?.user?.id ?? null}
                profileRole=${profile?.role ?? "employee"}
                onDone=${() => {
                  setCitsToken("");
                  stripCitsFromUrl();
                }}
              />
            </div>
          `;
        }

        async function signOut() {
          if (TIKAI_VIENKARSI_SKATS) {
            setView("home");
            return;
          }
          if (isLocalMode()) {
            sessionStorage.removeItem(LS_LOCAL_OK);
            sessionStorage.removeItem(LS_LOCAL_NAME);
            setView("home");
            location.reload();
            return;
          }
          if (supabase) await supabase.auth.signOut();
          setView("home");
        }

        if (isLocalMode() && !TIKAI_VIENKARSI_SKATS && !localSessionActive()) {
          return html`
            <div class="app-shell">
              ${title}
              <${LocalPasswordScreen} />
            </div>
          `;
        }

        if (configured()) {
          if (loading) {
            return html`
              <div class="app-shell">
                ${title}
                <p style=${{ color: "var(--muted)" }}>Ielādē…</p>
              </div>
            `;
          }
          if (!session?.user) {
            return html`
              <div class="app-shell">
                ${title}
                <${AuthScreen} />
              </div>
            `;
          }
        } else {
          if (loading) {
            return html`
              <div class="app-shell">
                ${title}
                <p style=${{ color: "var(--muted)" }}>Ielādē…</p>
              </div>
            `;
          }
        }

        if (!session?.user) {
          return null;
        }

        return html`
          <${AppShellWithNav}
            view=${view}
            onChangeView=${(v) => {
              setView(v);
              if (v === "prombutnes") setPromSub("calendar");
            }}
            promSub=${promSub}
            onPromSubChange=${setPromSub}
            showPromDeputyTab=${showPromDeputyTab}
            header=${html`
              <header class="app-header">
                ${title}
                ${TIKAI_VIENKARSI_SKATS
                  ? html`<span style=${{ color: "var(--muted)", fontSize: "0.9rem" }}>Vietējā kopija — dati tikai šajā pārlūkā</span>`
                  : html`
                      <div class="row">
                        <span style=${{ color: "var(--muted)", fontSize: "0.9rem" }}>
                          ${userDisplayName(profile) !== "—" ? userDisplayName(profile) : session.user.email}
                        </span>
                        <button type="button" class="btn btn-ghost btn-small" onClick=${signOut}>Iziet</button>
                      </div>
                    `}
              </header>
            `}
          >
            ${view === "home"
              ? html`<${Dashboard}
                  onOpenPrombutnes=${() => {
                    setView("prombutnes");
                    setPromSub("calendar");
                  }}
                />`
              : html`<${PrombutnesSection}
                  userId=${session.user.id}
                  role=${profile?.role ?? "employee"}
                  promSub=${promSub}
                  setPromSub=${setPromSub}
                />`}
          </${AppShellWithNav}>
        `;
      }

      createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
