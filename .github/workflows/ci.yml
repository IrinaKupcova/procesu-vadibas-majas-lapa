name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Syntax check Resend API
        run: node --check api/pdd-resend.js
      - name: Verify epasts_sazina (Node)
        run: node scripts/verify-epasts-sazina.cjs
