# Statiska lapa: index.html (+ Supabase no GitHub Secrets) → GitHub Pages
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject Supabase un salikt lapu
        env:
          SUPA_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPA_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          mkdir -p _site
          # Kopējam visus statiskos failus, ko izmanto index.html (JS, ikonas, u.c.).
          # Apzināti nelietojam rsync (ne vienmēr pieejams runnerī).
          shopt -s dotglob
          cp -R . _site/
          rm -rf _site/.git _site/.github _site/node_modules _site/_site
          rm -f _site/*.zip
          node << 'NODE'
          const fs = require("fs");
          let h = fs.readFileSync("index.html", "utf8");
          const strip = (s) =>
            String(s || "")
              .replace(/^\uFEFF/, "")
              .replace(/[\u200B-\u200D\uFEFF]/g, "")
              .trim();
          const url = strip(process.env.SUPA_URL);
          const key = strip(process.env.SUPA_KEY);
          if (url) {
            h = h.replace(
              /const FILE_SUPABASE_URL = "https:\/\/[^"]+";/,
              "const FILE_SUPABASE_URL = " + JSON.stringify(url) + ";"
            );
          }
          if (key) {
            h = h.replace(
              /const FILE_SUPABASE_ANON_KEY = "[^"]*";/,
              "const FILE_SUPABASE_ANON_KEY = " + JSON.stringify(key) + ";"
            );
          }
          fs.writeFileSync("_site/index.html", h);
          NODE
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
