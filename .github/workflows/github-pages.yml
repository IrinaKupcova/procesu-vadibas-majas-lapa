# Statiska lapa: index.html (+ Supabase no GitHub Secrets) → GitHub Pages
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject Supabase un salikt lapu
        env:
          SUPA_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPA_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          mkdir -p _site
          node << 'NODE'
          const fs = require("fs");
          let h = fs.readFileSync("index.html", "utf8");
          const url = process.env.SUPA_URL || "";
          const key = process.env.SUPA_KEY || "";
          if (url) {
            h = h.replace(
              'const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";',
              "const SUPABASE_URL = " + JSON.stringify(url) + ";"
            );
          }
          if (key) {
            h = h.replace(
              'const SUPABASE_ANON_KEY = "YOUR_ANON_KEY";',
              "const SUPABASE_ANON_KEY = " + JSON.stringify(key) + ";"
            );
          }
          fs.writeFileSync("_site/index.html", h);
          NODE
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
